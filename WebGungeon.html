/* ---------- Collision with walls inside a room ---------- */
function isWall(room, tx, ty){
  if(tx<0||ty<0||tx>=ROOM_W||ty>=ROOM_H) return true;
  if(tx===0||tx===ROOM_W-1||ty===0||ty===ROOM_H-1){
    // door gaps
    const cx = (ROOM_W-1)/2, cy = (ROOM_H-1)/2;
    if(ty===0 && room.doors.n && (tx===Math.floor(cx)||tx===Math.floor(cx)+1)) return false;
    if(ty===ROOM_H-1 && room.doors.s && (tx===Math.floor(cx)||tx===Math.floor(cx)+1)) return false;
    if(tx===0 && room.doors.w && (ty===Math.floor(cy)||ty===Math.floor(cy)+1)) return false;
    if(tx===ROOM_W-1 && room.doors.e && (ty===Math.floor(cy)||ty===Math.floor(cy)+1)) return false;
    return true;
  }
  // irregular interior wall tiles (room shape variants)
  if(room && room.extraWalls){
    for(const w of room.extraWalls){
      if(w.x===tx && w.y===ty) return true;
    }
  }
  return false;
}

// tile is blocked for pathfinding/LoS — walls + alive tables/barrels/crates
function tileBlocked(room, tx, ty){
  if(isWall(room, tx, ty)) return true;
  if(room && room.props){
    const px = tx*TILE, py = ty*TILE;
    for(const p of room.props){
      if(!(p.type==='table' || p.type==='barrel')) continue;
      if(p.hp<=0 || p.broken) continue;
      if(px+TILE > p.x && px < p.x+(p.w||16) && py+TILE > p.y && py < p.y+(p.h||16)) return true;
    }
  }
  return false;
}
// is the line from (x1,y1) to (x2,y2) clear (no walls / no blocking props)?
function losClear(room, x1, y1, x2, y2){
  const ddx = x2-x1, ddy = y2-y1;
  const dist = Math.hypot(ddx, ddy);
  const steps = Math.max(2, Math.ceil(dist/8));
  for(let i=1;i<steps;i++){
    const t = i/steps;
    const x = x1 + ddx*t, y = y1 + ddy*t;
    if(tileBlocked(room, Math.floor(x/TILE), Math.floor(y/TILE))) return false;
  }
  return true;
}
// BFS pathfinding — returns [dx, dy] cardinal step toward goal, or null
function findPathStep(room, sxPx, syPx, gxPx, gyPx){
  const sx = Math.floor(sxPx/TILE), sy = Math.floor(syPx/TILE);
  const gx = Math.floor(gxPx/TILE), gy = Math.floor(gyPx/TILE);
  if(sx===gx && sy===gy) return null;
  const W = ROOM_W, H = ROOM_H;
  const idx = (x,y)=>y*W+x;
  const parent = new Int8Array(W*H); parent.fill(-1);
  const visited = new Uint8Array(W*H);
  visited[idx(sx,sy)] = 1; parent[idx(sx,sy)] = 4;
  const queue = [sx + sy*W];
  let qh = 0;
  const dirs = [[1,0,0],[-1,0,1],[0,1,2],[0,-1,3]];
  let found = false;
  while(qh < queue.length){
    const cur = queue[qh++];
    const cx = cur % W, cy = (cur/W)|0;
    if(cx===gx && cy===gy){ found = true; break; }
    for(const [dx,dy,d] of dirs){
      const nx = cx+dx, ny = cy+dy;
      if(nx<0||ny<0||nx>=W||ny>=H) continue;
      const ni = idx(nx,ny);
      if(visited[ni]) continue;
      // allow the goal tile even if blocked (player might stand near a table)
      if(!(nx===gx && ny===gy) && tileBlocked(room, nx, ny)) continue;
      visited[ni] = 1; parent[ni] = d;
      queue.push(nx + ny*W);
    }
  }
  if(!found) return null;
  // walk back from goal to find the FIRST step taken from start
  let cx = gx, cy = gy;
  const REV = [[1,0],[-1,0],[0,1],[0,-1]];
  let firstStep = null;
  while(!(cx===sx && cy===sy)){
    const d = parent[idx(cx,cy)];
    if(d===4 || d<0) break;
    const [pdx,pdy] = REV[d];
    const px = cx - pdx, py = cy - pdy;
    if(px===sx && py===sy){ firstStep = [pdx, pdy]; break; }
    cx = px; cy = py;
  }
  return firstStep;
}

// After a teleport, make sure the player isn't standing inside a wall or solid prop.
// Tries the current spot first, then spirals outward looking for a clear tile.
function ensureSafeLanding(room){
  if(!room || !player) return;
  const pw = player.w || 8, ph = player.h || 12;
  const test = (cx, cy) => entityCanMove(room, cx - pw/2, cy - ph/2, pw, ph, 'all');
  if(test(player.x, player.y)) return;
  // search outward in expanding rings of tiles
  for(let radius = 1; radius <= 8; radius++){
    for(let oy = -radius; oy <= radius; oy++){
      for(let ox = -radius; ox <= radius; ox++){
        if(Math.abs(ox)!==radius && Math.abs(oy)!==radius) continue; // ring only
        const nx = player.x + ox * TILE;
        const ny = player.y + oy * TILE;
        // keep inside the room
        if(nx < TILE || nx > ROOM_PX_W - TILE) continue;
        if(ny < TILE || ny > ROOM_PX_H - TILE) continue;
        if(test(nx, ny)){ player.x = nx; player.y = ny; return; }
      }
    }
  }
  // Last resort: room center
  player.x = ROOM_PX_W/2; player.y = ROOM_PX_H/2;
}

// tableMode: 'all' = block on every alive table (enemies),
//            'flippedOnly' = only block on flipped tables (player default)
//            'none' = ignore tables entirely (dashing over non-flipped only)
function entityCanMove(room, x, y, w, h, tableMode){
  const pts = [
    [x, y], [x+w-1, y], [x, y+h-1], [x+w-1, y+h-1],
    [x+w/2, y+h/2]
  ];
  for(const [px,py] of pts){
    const tx = Math.floor(px/TILE), ty = Math.floor(py/TILE);
    if(isWall(room, tx, ty)) return false;
  }
  if(tableMode !== 'none' && room && room.props){
    for(const p of room.props){
      // tables (cover)
      if(p.type==='table' && p.hp>0){
        if(tableMode==='flippedOnly' && !p.flipped) continue;
        if(x < p.x+p.w-1 && x+w > p.x+1 && y < p.y+p.h-1 && y+h > p.y+2) return false;
        continue;
      }
      // chests block like solid props — broken chests no longer block, but opened ones still do
      if(p.type==='chest' && !p.broken){
        const cw = p.w||14, ch = p.h||12;
        if(x < p.x+cw && x+w > p.x && y < p.y+ch && y+h > p.y) return false;
        continue;
      }
    }
  }
  return true;
}

// can a table be moved to (nx, ny)? — checks walls, no overlap with another table or large entity
function tableCanMoveTo(room, table, nx, ny){
  // walls
  const corners = [[nx, ny],[nx+table.w-1, ny],[nx, ny+table.h-1],[nx+table.w-1, ny+table.h-1]];
  for(const [px,py] of corners){
    const tx = Math.floor(px/TILE), ty = Math.floor(py/TILE);
    if(isWall(room, tx, ty)) return false;
  }
  // other tables
  for(const p of room.props){
    if(p===table || p.type!=='table' || p.hp<=0) continue;
    if(nx < p.x+p.w-1 && nx+table.w > p.x+1 && ny < p.y+p.h-1 && ny+table.h > p.y+1) return false;
  }
  return true;
}

function moveEntity(room, e, dx, dy){
  let mode = 'all';
  if(e===player){
    // dodge-rolling vaults over UNFLIPPED tables only — flipped tables are tall cover and still block
    mode = (player.dashT>0) ? 'flippedOnly' : 'all';
  }
  // X axis
  const ex = e.x + dx;
  if(entityCanMove(room, ex - e.w/2, e.y - e.h/2, e.w, e.h, mode)){
    e.x = ex;
    if(e===player) tryRollBarrels(room, dx, 0);
  } else if(e===player && player.dashT<=0){
    // try push flipped tables horizontally (slow)
    const amt = tryPushTables(room, dx, 0);
    if(amt) e.x += dx*amt;
    else tryRollBarrels(room, dx, 0);
  }
  // Y axis
  const ey = e.y + dy;
  if(entityCanMove(room, e.x - e.w/2, ey - e.h/2, e.w, e.h, mode)){
    e.y = ey;
    if(e===player) tryRollBarrels(room, 0, dy);
  } else if(e===player && player.dashT<=0){
    const amt = tryPushTables(room, 0, dy);
    if(amt) e.y += dy*amt;
    else tryRollBarrels(room, 0, dy);
  }
}

// flipped tables can be shoved slowly when blocked by them — returns the fraction (0..1) actually moved
function tryPushTables(room, dx, dy){
  if(!room || !room.props) return 0;
  const slow = 0.35;
  let amount = 0;
  // expand player AABB slightly toward intent so contact registers when blocked
  const px1 = player.x - player.w/2 + dx;
  const py1 = player.y - player.h/2 + dy;
  const px2 = player.x + player.w/2 + dx;
  const py2 = player.y + player.h/2 + dy;
  for(const p of room.props){
    if(p.type!=='table' || p.hp<=0 || !p.flipped) continue;
    if(px1 < p.x+p.w && px2 > p.x && py1 < p.y+p.h && py2 > p.y){
      const nx = p.x + dx*slow, ny = p.y + dy*slow;
      if(tableCanMoveTo(room, p, nx, ny)){
        p.x = nx; p.y = ny;
        amount = slow;
      }
    }
  }
  return amount;
}

// roll a barrel the player walks into — gives it velocity and a brief rolling state
function tryRollBarrels(room, dx, dy){
  if(!room || !room.props) return;
  if(dx===0 && dy===0) return;
  const px1 = player.x - player.w/2;
  const py1 = player.y - player.h/2;
  const px2 = player.x + player.w/2;
  const py2 = player.y + player.h/2;
  for(const p of room.props){
    if(p.type!=='barrel' || p.hp<=0 || p.broken) continue;
    if(p.rolling > 0) continue; // already rolling — let physics carry it
    if(px1 < p.x+p.w && px2 > p.x && py1 < p.y+p.h && py2 > p.y){
      // give it a kick in the player's movement direction (dominant axis)
      const ax = Math.abs(dx), ay = Math.abs(dy);
      const speed = 110; // px/sec
      if(ax >= ay){
        p.vx = Math.sign(dx) * speed; p.vy = 0;
      } else {
        p.vy = Math.sign(dy) * speed; p.vx = 0;
      }
      p.rolling = 1.4; // seconds remaining of rolling
      p.spin = (p.spin||0);
    }
  }
}

/* ---------- Weapon swap (2 slots) ---------- */
// Swaps the active weapon with the stowed slot. ETG-style — keeps each slot's
// own ammo/mag count so reloading one doesn't dump the other.
function swapWeapon(){
  if(!player || !player.weapon2) return;
  const w1 = player.weapon, m1 = player.mag, a1 = player.ammo;
  const w2 = player.weapon2, m2 = player.mag2, a2 = player.ammo2;
  player.weapon = w2; player.mag = m2; player.ammo = a2;
  player.weapon2 = w1; player.mag2 = m1; player.ammo2 = a1;
  player.reloading = false; player.reloadT = 0;
  if(typeof sfxClick === 'function') sfxClick();
  if(typeof spawnBanner === 'function') spawnBanner((WEAPON_BY_ID[player.weapon]||{}).name||'', '', 0.9);
}
// Called from pickup paths. If slot 2 is empty, the picked-up weapon goes
// straight to the stowed slot (so the player keeps their current gun out).
// If both slots are full, the new weapon SWAPS with the currently equipped
// weapon (slot 1), and the old gun is dropped on the floor at dropX/dropY.
function acquireWeapon(wid, dropX, dropY){
  const wp = WEAPON_BY_ID[wid]; if(!wp) return;
  if(!player.weapon2){
    player.weapon2 = wid; player.mag2 = wp.mag; player.ammo2 = wp.mag;
    if(typeof spawnBanner === 'function') spawnBanner('STOWED · '+wp.name, 'TAB / SCROLL TO SWAP', 1.4);
  } else {
    // Drop the currently equipped gun on the floor before swapping in the new one
    const oldWid = player.weapon;
    if(oldWid && dropX !== undefined && dropY !== undefined){
      spawnWeaponPickup(dropX, dropY, oldWid);
    }
    player.weapon = wid; player.mag = wp.mag; player.ammo = wp.mag;
    player.reloading = false; player.reloadT = 0;
    const oldName = (oldWid && WEAPON_BY_ID[oldWid]) ? WEAPON_BY_ID[oldWid].name+' DROPPED' : '';
    if(typeof spawnBanner === 'function') spawnBanner('EQUIPPED · '+wp.name, oldName, 1.2);
  }
}

function curRoom(){ return dungeon[curRoomKey]; }

function tryEnterDoor(){
  const r = curRoom();
  if(!r.cleared) return;
  const cx = (ROOM_W-1)/2, cy = (ROOM_H-1)/2;
  const px = player.x, py = player.y;
  // near edge tiles in door
  const margin = 4;
  if(r.doors.n && py < TILE+4 && Math.abs(px - (cx*TILE+TILE/2)) < TILE) doTransition('n');
  else if(r.doors.s && py > ROOM_PX_H-TILE-4 && Math.abs(px - (cx*TILE+TILE/2)) < TILE) doTransition('s');
  else if(r.doors.w && px < TILE+4 && Math.abs(py - (cy*TILE+TILE/2)) < TILE) doTransition('w');
  else if(r.doors.e && px > ROOM_PX_W-TILE-4 && Math.abs(py - (cy*TILE+TILE/2)) < TILE) doTransition('e');
}

function doTransition(dir){
  // INSTANT transition — hallways are part of the map, not a separate
  // animation. Player walks straight from one room to the next without a
  // cinematic corridor pan. (Enter the Gungeon style: rooms are linked by
  // physical doorways the player just steps through.)
  transitionDir = dir; transitionT = 0;
  sfxDoor();
  finishTransition();
}
function finishTransition(){
  const r = curRoom();
  let dx=0,dy=0;
  if(transitionDir==='n') dy=-1;
  if(transitionDir==='s') dy=1;
  if(transitionDir==='w') dx=-1;
  if(transitionDir==='e') dx=1;
  const nk = (r.x+dx)+','+(r.y+dy);
  if(dungeon[nk]){
    savePickupsToRoom(curRoomKey);
    curRoomKey = nk;
    const nr = dungeon[nk];
    nr.visited = true;
    buildRoom(nr);
    restorePickupsFromRoom(nr);
    runStats.rooms++;
    // place player on opposite side
    const cx = (ROOM_W-1)/2, cy = (ROOM_H-1)/2;
    if(transitionDir==='n'){ player.x = cx*TILE+TILE/2; player.y = (ROOM_H-2)*TILE; }
    if(transitionDir==='s'){ player.x = cx*TILE+TILE/2; player.y = TILE+8; }
    if(transitionDir==='w'){ player.x = (ROOM_W-2)*TILE; player.y = cy*TILE+TILE/2; }
    if(transitionDir==='e'){ player.x = TILE+8; player.y = cy*TILE+TILE/2; }
    bullets.length = 0;
    if(nr.type === RT.BOSS && !nr.cleared){
      sfxBoss();
    }
  }
  transitionT = 0; transitionDir = null;
}

/* ---------- Update ---------- */
let last = performance.now();
let lastError = null;
let _bgMusicPlaying = false;
function loop(now){
  const dt = Math.min(0.05, (now - last)/1000);
  last = now;
  // Music: play during active gameplay states, mute on menu/death/win
  const _bgm = document.getElementById('bgMusic');
  if(_bgm){
    const _inGame = state===STATE.RUN||state===STATE.SHOP||state===STATE.AUG||state===STATE.PAUSE||state===STATE.HUB||state===STATE.INTRO;
    if(_inGame && !_bgMusicPlaying){ _bgm.play().catch(()=>{}); _bgMusicPlaying=true; }
    else if(!_inGame && _bgMusicPlaying){ _bgm.pause(); _bgm.currentTime=0; _bgMusicPlaying=false; }
  }
  try {
    update(dt);
    render();
    if(lastError){ drawErrorOverlay(); }
  } catch(err){
    lastError = (err && (err.stack || err.message)) || String(err);
    try { drawErrorOverlay(); } catch(_){}
  }
  requestAnimationFrame(loop);
}
function drawErrorOverlay(){
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, H-60, W, 60);
  ctx.fillStyle = '#d7263d';
  ctx.fillRect(0, H-60, W, 1);
  ctx.font = '8px monospace';
  ctx.textBaseline = 'top';
  ctx.fillStyle = '#ff9aa2';
  const lines = String(lastError).split('\n').slice(0,6);
  lines.forEach((l,i)=>{
    ctx.fillStyle = i===0 ? '#ffdde0' : '#bbb';
    ctx.fillText(l.slice(0,80), 4, H-56+i*9);
  });
}

  // Total content height
  const contentW = COL*CARD + (COL+1)*GAP;
  let contentH = 16;
  for(const sec of allSections){
    contentH += SECTION_H;
    const rows = Math.ceil(sec.list.length / COL);
    contentH += rows*(CARD + GAP) + GAP;
  }
  const big = document.createElement('canvas');
  big.width = contentW; big.height = contentH;
  const bctx = big.getContext('2d');
  bctx.imageSmoothingEnabled = false;

  function drawTextBig(t, x, y, sz, color, align){
    bctx.fillStyle = color;
    bctx.font = `${sz}px monospace`;
    bctx.textAlign = align || 'left';
    bctx.textBaseline = 'top';
    bctx.fillText(t, x, y);
  }

  function renderBestiary(){
    // background
    bctx.fillStyle = '#120a08'; bctx.fillRect(0,0,contentW,contentH);
    // title bar
    drawTextBig('BESTIARY', contentW/2, 4, 14, '#f0b429', 'center');
    let cy = SECTION_H;
    for(const sec of allSections){
      // section header
      bctx.fillStyle = '#3a2818'; bctx.fillRect(GAP, cy, contentW-GAP*2, 16);
      drawTextBig(sec.title, GAP+6, cy+3, 10, '#fff5c2', 'left');
      cy += SECTION_H;
      // cards
      for(let i=0;i<sec.list.length;i++){
        const e = sec.list[i];
        const col = i % COL;
        const row = Math.floor(i / COL);
        const x = GAP + col*(CARD+GAP);
        const y = cy + row*(CARD+GAP);
        // card frame
        bctx.fillStyle = '#1a0e08'; bctx.fillRect(x, y, CARD, CARD);
        bctx.strokeStyle = '#5a4a36'; bctx.lineWidth = 1;
        bctx.strokeRect(x+0.5, y+0.5, CARD-1, CARD-1);
        // sprite area
        const spr = getSpr(e.spr);
        drawSpriteBig(spr, x+4, y+4, CARD-8-22, bctx);
        // separator
        bctx.fillStyle = '#3a2818'; bctx.fillRect(x+4, y+CARD-22, CARD-8, 1);
        // name + hp
        drawTextBig(e.name, x+CARD/2, y+CARD-19, 8, '#fff', 'center');
        drawTextBig('HP '+e.hp, x+CARD/2, y+CARD-10, 7, '#f47878', 'center');
      }
      const rows = Math.ceil(sec.list.length / COL);
      cy += rows*(CARD+GAP) + GAP;
    }
  }
  renderBestiary();

  // Resize the page canvas (`cv`) to fill the viewport for the bestiary view.
  function bestiaryFit(){
    cv.style.width = '100vw';
    cv.style.height = '100vh';
    cv.style.imageRendering = 'pixelated';
    cv.style.boxShadow = 'none';
    cv.style.cursor = 'default';
    cv.width = Math.min(contentW, Math.max(320, window.innerWidth));
    cv.height = Math.max(240, window.innerHeight);
  }
  bestiaryFit();
  window.addEventListener('resize', bestiaryFit);
  // hide the page's hint footer + reset the wrap div so the canvas can fill
  // the viewport completely without the original radial background showing.
  const _hint = document.getElementById('hint'); if(_hint) _hint.style.display = 'none';
  const _wrap = document.getElementById('wrap');
  if(_wrap){ _wrap.style.background = 'none'; _wrap.style.position = 'static'; }
  document.body.style.background = '#0a0604';

  let scroll = 0;
  const maxScroll = () => Math.max(0, contentH - cv.height);
  function paint(){
    const c = cv.getContext('2d');
    c.imageSmoothingEnabled = false;
    c.fillStyle = '#0a0604'; c.fillRect(0,0,cv.width,cv.height);
    const sx = Math.floor(Math.max(0, (contentW - cv.width)/2));
    const sw = Math.min(cv.width, contentW);
    const sh = Math.min(cv.height, contentH - scroll);
    c.drawImage(big, sx, scroll, sw, sh, 0, 0, sw, sh);
    // scroll hint
    if(maxScroll() > 0){
      c.fillStyle = 'rgba(0,0,0,0.55)';
      c.fillRect(cv.width-8, 0, 8, cv.height);
      const barH = Math.max(20, cv.height * (cv.height/contentH));
      const barY = (scroll/maxScroll()) * (cv.height - barH);
      c.fillStyle = '#f0b429';
      c.fillRect(cv.width-7, barY, 6, barH);
    }
  }
  window.addEventListener('wheel', (ev)=>{
    scroll = Math.max(0, Math.min(maxScroll(), scroll + ev.deltaY));
    paint(); ev.preventDefault();
  }, { passive: false });
  window.addEventListener('keydown', (ev)=>{
    if(ev.key === 'ArrowDown' || ev.key === 'PageDown') scroll = Math.min(maxScroll(), scroll + 60);
    else if(ev.key === 'ArrowUp' || ev.key === 'PageUp') scroll = Math.max(0, scroll - 60);
    else if(ev.key === 'Home') scroll = 0;
    else if(ev.key === 'End') scroll = maxScroll();
    paint();
  });
  window.addEventListener('resize', ()=>{ bestiaryFit(); paint(); });
  paint();
  // Mark this so the wrapper iframe knows we're up, and so we skip the game
  // loop below (the game continues to exist in memory but never animates,
  // leaving our static gallery on the visible canvas).
  try { window.BESTIARY_READY = true; window.__BESTIARY_MODE__ = true; } catch(_){}
})();

if(!window.__BESTIARY_MODE__) requestAnimationFrame(loop);

function update(dt){
  bootTime += dt;
  if(state === STATE.BOOT){
    if(bootTime > 1.0 || mouse.justDown || Object.keys(keys).some(k=>keys[k])) {
      state = STATE.MENU;
    }
    mouse.justDown = false;
    return;
  }
  if(state === STATE.MENU){ updateMenu(dt); mouse.justDown = false; return; }
  if(state === STATE.INTRO){ updateIntro(dt); mouse.justDown = false; return; }
  if(state === STATE.HUB){ updateRun(dt, true); mouse.justDown = false; return; }
  if(state === STATE.PAUSE){ updatePause(dt); mouse.justDown = false; return; }
  if(state === STATE.DEATH){ updateDeath(dt); mouse.justDown = false; return; }
  if(state === STATE.WIN){ updateWin(dt); mouse.justDown = false; return; }
  if(state === STATE.SHOP){ updateShop(dt); mouse.justDown = false; return; }
  if(state === STATE.AUG){ updateAug(dt); mouse.justDown = false; return; }
  if(state === STATE.RUN){ updateRun(dt, false); mouse.justDown = false; return; }
  mouse.justDown = false;
}

/* ---------- Menu ---------- */
let menuSel = 0;
const MENU_OPTS = ['BEGIN OPERATION','SELECT GUNSLINGER','HOW TO PLAY','CREDITS'];
let menuSubState = 'main'; // main, select, controls, credits
let charSel = 0;
function updateMenu(dt){
  if(menuSubState === 'select'){
    if(keys['arrowleft']||keys['a']){ keys['arrowleft']=keys['a']=false; charSel=(charSel+CHARACTERS.length-1)%CHARACTERS.length; sfxClick(); }
    if(keys['arrowright']||keys['d']){ keys['arrowright']=keys['d']=false; charSel=(charSel+1)%CHARACTERS.length; sfxClick(); }
    // mouse over character cards
    for(let i=0;i<CHARACTERS.length;i++){
      const cw = 84, gap = 12, total = CHARACTERS.length*cw + (CHARACTERS.length-1)*gap;
      const x0 = (W - total)/2 + i*(cw+gap);
      if(mouse.x>x0 && mouse.x<x0+cw && mouse.y>120 && mouse.y<220){
        if(charSel!==i) sfxClick();
        charSel = i;
        if(mouse.justDown){ selectedCharId = CHARACTERS[charSel].id; sfxClick(); menuSubState='main'; }
      }
    }
    if(keys['enter']||keys[' ']){ keys['enter']=keys[' ']=false; selectedCharId=CHARACTERS[charSel].id; sfxClick(); menuSubState='main'; }
    if(keys['escape']){ keys['escape']=false; menuSubState='main'; sfxClick(); }
    return;
  }
  if(menuSubState !== 'main'){
    if(keys['escape'] || mouse.justDown){ menuSubState='main'; sfxClick(); }
    return;
  }
  // mouse hover selection
  for(let i=0;i<MENU_OPTS.length;i++){
    const y = 140 + i*20;
    if(mouse.x>160 && mouse.x<320 && mouse.y>y-6 && mouse.y<y+10){
      if(menuSel!==i) sfxClick();
      menuSel = i;
      if(mouse.justDown){ menuSelect(); }
    }
  }
  if(keys['arrowup']||keys['w']){ keys['arrowup']=keys['w']=false; menuSel=(menuSel+MENU_OPTS.length-1)%MENU_OPTS.length; sfxClick(); }
  if(keys['arrowdown']||keys['s']){ keys['arrowdown']=keys['s']=false; menuSel=(menuSel+1)%MENU_OPTS.length; sfxClick(); }
  if(keys['enter']||keys[' ']){ keys['enter']=keys[' ']=false; menuSelect(); }
}
function menuSelect(){
  sfxClick();
  if(menuSel===0){ startIntro(); }
  else if(menuSel===1){ menuSubState='select'; charSel = Math.max(0, CHARACTERS.findIndex(c=>c.id===selectedCharId)); }
  else if(menuSel===2){ menuSubState='controls'; }
  else if(menuSel===3){ menuSubState='credits'; }
}

/* ---------- Active ability ---------- */
function useAbility(){
  const ch = CHARACTERS.find(c=>c.id===player.charId) || CHARACTERS[0];
  const ab = ch.ability;
  const ang = Math.atan2(player.aimy-player.y, player.aimx-player.x);
  if(ab==='molotov'){
    // lobs an explosive rocket-bullet (mortar style)
    spawnBullet({x:player.x, y:player.y, vx:Math.cos(ang)*140, vy:Math.sin(ang)*140, life:0.9, dmg:4, friendly:true, color:'#f0b429', type:'rocket', sz:2});
    player.abilityCool = 6.0; player.abilityCharges--;
    sfxShoot(); shakeCam(1);
  } else if(ab==='cloak'){
    player.cloakT = 3.0; player.invul = Math.max(player.invul, 0.4);
    player.abilityCool = 8.0; player.abilityCharges--;
    sfxDash();
    for(let i=0;i<20;i++) spawnPart(player.x, player.y, {vx:rand(-30,30),vy:rand(-30,30),life:0.5,c:'#888',sz:1});
  } else if(ab==='crossbow'){
    // piercing high-damage bolt
    spawnBullet({x:player.x, y:player.y, vx:Math.cos(ang)*260, vy:Math.sin(ang)*260, life:0.9, dmg:5, friendly:true, color:'#39c0ed', type:'pierce', sz:2});
    player.abilityCool = 4.5; player.abilityCharges--;
    sfxShoot();
  } else if(ab==='supply'){
    // drop ammo + heart at feet
    spawnPickup('ammo', player.x-6, player.y+6, 1);
    spawnPickup('heart', player.x+6, player.y+6, 1);
    player.fireBoostT = 2.0; player.ammo = player.mag; player.reloading=false;
    player.abilityCool = 10.0; player.abilityCharges--;
    sfxReload();
  }
}

// BLANK — clears all enemy bullets on the screen, knocks enemies away
// from the player, brief invuln + screen flash + screen shake.
// Mirrors the Enter the Gungeon "blank" item.
function useBlank(){
  if(player.blanks<=0) return;
  player.blanks--;
  player.invul = Math.max(player.invul, 0.6);
  player.blankFlashT = 0.35;
  shakeCam(6);
  sfxBoom();
  // wipe every hostile bullet
  for(let i=bullets.length-1;i>=0;i--){
    const b = bullets[i];
    if(!b.friendly){
      // spark burst at the bullet's location for visual feedback
      for(let k=0;k<3;k++) spawnPart(b.x, b.y, {vx:rand(-50,50),vy:rand(-50,50),life:0.4,c:'#fff',sz:1});
      bullets.splice(i,1);
    }
  }
  // expanding shockwave ring (drawn via particles)
  for(let i=0;i<48;i++){
    const a = (i/48)*Math.PI*2;
    spawnPart(player.x, player.y, {
      vx: Math.cos(a)*180, vy: Math.sin(a)*180,
      life: 0.45, c:'#9be7ff', sz:2,
    });
  }
  for(let i=0;i<24;i++){
    const a = Math.random()*Math.PI*2;
    spawnPart(player.x, player.y, {
      vx: Math.cos(a)*90, vy: Math.sin(a)*90,
      life: 0.6, c:'#fff5c2', sz:1,
    });
  }
  // push every enemy away from the player + tiny stun damage
  const r = curRoom();
  if(r){
    for(const e of r.entities){
      if(e.dead) continue;
      const dx = e.x - player.x, dy = e.y - player.y;
      const d = Math.max(8, Math.hypot(dx,dy));
      const push = 220 / Math.max(1, d/40);
      e.vx = (e.vx||0) + (dx/d) * push;
      e.vy = (e.vy||0) + (dy/d) * push;
      // small chip damage for the satisfying "everything reels back"
      if(typeof e.hp === 'number'){
        e.hp -= 1;
        if(e.hp<=0){ e.dead = true; }
      }
      // brief stun — push enemies out of any wind-up state
      if('chargeT'  in e) e.chargeT  = 0;
      if('fireT'    in e) e.fireT    = Math.max(e.fireT||0, 1.4);
      if('attackT'  in e) e.attackT  = Math.max(e.attackT||0, 1.4);
      e.flashT = 0.25;
    }
  }
  spawnBanner('BLANK', '', 0.8);
}
