<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WebGungeon v12.3</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/Ren23447/Web-Gungeon-/refs/heads/main/ICON.png">
<style>
  html,body{margin:0;padding:0;background:#000;color:#e8edf2;font-family:'Courier New',monospace;overflow:hidden;height:100%;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000;}
  canvas{image-rendering:pixelated;image-rendering:crisp-edges;background:#000;box-shadow:0 0 8px rgba(0,0,0,.8);cursor:crosshair;}
  #hint{position:fixed;bottom:6px;left:8px;font-size:11px;color:#445;letter-spacing:1px;}
</style>
</head>
<body>
<audio id="bgMusic" src="https://raw.githubusercontent.com/Ren23447/Web-Gungeon-/main/Ingame.mp3" loop preload="auto" style="display:none"></audio>
<div id="wrap"><canvas id="g" width="480" height="270"></canvas></div>
<div id="hint">ENEMY · CYCLOPS DUNGEON REFORGED · WASD MOVE · MOUSE AIM · SPACE DASH · R RELOAD · Q ABILITY · B BLANK · F FLIP TABLES</div>
<script>
"use strict";
/* =========================================================
   CYCLOPS DUNGEON — single-file roguelite shooter
   Created by Ren
   ========================================================= */

const cv = document.getElementById('g');
const ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = false;
const W = cv.width, H = cv.height;

// scale canvas to viewport
function fit(){
  const s = Math.max(1, Math.min(Math.floor(window.innerWidth/W), Math.floor(window.innerHeight/H)));
  cv.style.width = (W*s)+'px';
  cv.style.height = (H*s)+'px';
}
window.addEventListener('resize', fit); fit();

/* ---------- Input ---------- */
const keys = {};
const mouse = {x:W/2, y:H/2, down:false, justDown:false};
addEventListener('keydown', e=>{ keys[e.key.toLowerCase()] = true; if(['w','a','s','d',' ','tab'].includes(e.key.toLowerCase()))e.preventDefault(); });
// MOUSE WHEEL — swap between weapon slots (Enter the Gungeon style).
// Using "wheel" not the deprecated "mousewheel". Direction-agnostic: any
// scroll triggers a swap (we only have 2 slots).
let _wheelCool = 0;
addEventListener('wheel', e=>{
  if(performance.now() < _wheelCool) return;
  _wheelCool = performance.now() + 220;
  if(typeof swapWeapon === 'function') swapWeapon();
}, {passive:true});
addEventListener('keyup', e=>{ keys[e.key.toLowerCase()] = false; });
cv.addEventListener('mousemove', e=>{
  const r = cv.getBoundingClientRect();
  mouse.x = (e.clientX - r.left) * (W/r.width);
  mouse.y = (e.clientY - r.top) * (H/r.height);
});
cv.addEventListener('mousedown', e=>{ mouse.down = true; mouse.justDown = true; ensureAudio(); });
cv.addEventListener('mouseup', ()=>{ mouse.down = false; });
addEventListener('keydown', ensureAudio, {once:true});

/* ---------- Audio (procedural) ---------- */
let AC=null, masterGain=null;
function ensureAudio(){
  if(AC) return;
  try{
    AC = new (window.AudioContext||window.webkitAudioContext)();
    masterGain = AC.createGain();
    masterGain.gain.value = 0.35;
    masterGain.connect(AC.destination);
    startMusic();
  }catch(e){}
}
function blip(freq, dur, type='square', vol=0.3, slide=0){
  if(!AC) return;
  const t = AC.currentTime;
  const o = AC.createOscillator(); const g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(40,freq+slide), t+dur);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+dur);
  o.connect(g).connect(masterGain);
  o.start(t); o.stop(t+dur+0.02);
}
function noiseHit(dur=0.08, vol=0.4, freq=2000){
  if(!AC) return;
  const buf = AC.createBuffer(1, AC.sampleRate*dur, AC.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1) * (1 - i/d.length);
  const s = AC.createBufferSource(); s.buffer = buf;
  const f = AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=freq;
  const g = AC.createGain(); g.gain.value=vol;
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+dur);
  s.connect(f).connect(g).connect(masterGain); s.start();
}
function sfxShoot(){ blip(680, 0.06, 'square', 0.18, -300); noiseHit(0.04, 0.15, 3000); }
function sfxHit(){ noiseHit(0.05, 0.25, 1500); blip(220, 0.05, 'square', 0.15, -100); }
function sfxEnemyHit(){ blip(140, 0.08, 'sawtooth', 0.18, -60); }
function sfxKill(){ blip(80, 0.18, 'sawtooth', 0.22, -40); noiseHit(0.12, 0.2, 800); }
function sfxPickup(){ blip(880, 0.07, 'square', 0.18); blip(1320, 0.08, 'square', 0.18); }
function sfxDoor(){ noiseHit(0.18, 0.25, 600); blip(120, 0.18, 'sawtooth', 0.18, -40); }
function sfxDash(){ noiseHit(0.12, 0.18, 1800); blip(420, 0.1, 'square', 0.12, 200); }
function sfxReload(){ blip(440, 0.05, 'square', 0.12); setTimeout(()=>blip(660,0.05,'square',0.12), 90); }
function sfxBoom(){ noiseHit(0.45, 0.5, 800); blip(60, 0.4, 'sawtooth', 0.3, -20); }
function sfxClick(){ blip(820, 0.04, 'square', 0.12); }
function sfxDeny(){ blip(140, 0.12, 'sawtooth', 0.2, -80); }
function sfxWin(){ [523,659,784,1046].forEach((f,i)=>setTimeout(()=>blip(f,0.18,'square',0.2), i*120)); }
function sfxLose(){ [330,247,196,165].forEach((f,i)=>setTimeout(()=>blip(f,0.25,'sawtooth',0.2), i*180)); }
function sfxBoss(){ noiseHit(0.6,0.5,500); blip(50,0.6,'sawtooth',0.35,-10); }
function sfxFlip(){ noiseHit(0.18,0.3,1200); blip(160,0.12,'square',0.18,80); }
function sfxBigDoor(){ noiseHit(0.5,0.4,400); blip(80,0.5,'sawtooth',0.3,-30); blip(180,0.3,'square',0.15,-60); }
function sfxLockOpen(){ blip(440,0.06,'square',0.18); blip(660,0.06,'square',0.18); blip(880,0.1,'square',0.2); }
function sfxCorpse(){ noiseHit(0.18,0.18,500); blip(90,0.15,'sawtooth',0.14,-20); }

// simple looping music (bass + arp)
let musicTimer=0;
function startMusic(){
  if(!AC) return;
  // background drone
  const o = AC.createOscillator(); const g = AC.createGain();
  o.type='sawtooth'; o.frequency.value=55;
  g.gain.value=0.04;
  const f = AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=200;
  o.connect(f).connect(g).connect(masterGain); o.start();

  const o2 = AC.createOscillator(); const g2=AC.createGain();
  o2.type='sine'; o2.frequency.value=110; g2.gain.value=0.03;
  o2.connect(g2).connect(masterGain); o2.start();
}
// pulses with combat intensity
function musicTick(dt, intensity){
  if(!AC) return;
  musicTimer -= dt;
  if(musicTimer<=0){
    musicTimer = 0.45 - intensity*0.18;
    const notes = [110,131,165,196];
    const f = notes[Math.floor(Math.random()*notes.length)];
    blip(f, 0.12, 'triangle', 0.05 + intensity*0.05);
    if(intensity>0.4 && Math.random()<0.5) noiseHit(0.05, 0.04+intensity*0.06, 2500);
  }
}

/* ---------- Helpers ---------- */
const TAU = Math.PI*2;
const rand = (a=1,b=0)=> b===0 ? Math.random()*a : a + Math.random()*(b-a);
const irand = (a,b)=> Math.floor(rand(a,b+1));
const clamp = (v,a,b)=> v<a?a:(v>b?b:v);
const dist = (ax,ay,bx,by)=> Math.hypot(ax-bx, ay-by);
const lerp = (a,b,t)=> a+(b-a)*t;
function aabb(a,b){ return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }

/* ---------- Game state ---------- */
const STATE = { BOOT:'boot', MENU:'menu', INTRO:'intro', HUB:'hub', RUN:'run', PAUSE:'pause', DEATH:'death', WIN:'win', SHOP:'shop', AUG:'aug' };
let state = STATE.BOOT;
let bootTime = 0;

// zoom 2.4 — closer to the player so the room can no longer be taken in at a glance,
// matching the cinematic Enter-the-Gungeon framing the player asked for.
let cam = {x:0,y:0,shake:0,shakeX:0,shakeY:0,offX:Math.floor((W-17*16)/2),offY:Math.floor((H-11*16)/2)+8,zoom:2.4};
function shakeCam(v){ cam.shake = Math.min(12, cam.shake+v); }

/* ---------- Pixel art helpers ---------- */
// Sprites are drawn procedurally so there are no external assets.
const SPR = {};
// Mirror onto window so the editor (loaded as a parent of this page in an
// iframe) can introspect the live registry. `const` at script top-level is
// NOT a window property by default, so this assignment is required.
window.SPR = SPR;
function makeSprite(w, h, drawFn){
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const x = c.getContext('2d');
  x.imageSmoothingEnabled = false;
  drawFn(x, w, h);
  return c;
}

// floor/wall tiles per sector theme — high-detail painted stone, top-down dungeon look
function buildTiles(){
  SPR.tiles = {};
  const themes = [
    // 0 KEEP OF THE LEAD LORD — warm tan flagstone, dark warm-brown brick walls
    { fbase:'#9a7a52', fmid:'#7d5e3c', fdark:'#4d3520', fhi:'#c8a072', fhi2:'#dab788', fmortar:'#1a1009',
      wface:'#5a3d24', wfaceMid:'#7a5230', wfaceHi:'#a8763d', wfaceLow:'#3a2410', wmortar:'#150c06', wbottom:'#000',
      ceiling:'#000', topHi:'#a8763d', accent:'#d7263d' },
    // 1 OUBLIETTE — wet mossy slate flagstone, dark slate walls
    { fbase:'#6a7864', fmid:'#4d5b48', fdark:'#2a3526', fhi:'#8a988a', fhi2:'#a6b29e', fmortar:'#0a120a',
      wface:'#3a4836', wfaceMid:'#506050', wfaceHi:'#7a8a72', wfaceLow:'#1f2a1c', wmortar:'#0a120a', wbottom:'#000',
      ceiling:'#000', topHi:'#7a8a72', accent:'#29c46d' },
    // 2 HOLLOW — pale violet flagstone, dark mauve walls
    { fbase:'#80708a', fmid:'#5d4f6e', fdark:'#37294a', fhi:'#a094b0', fhi2:'#bbb1ca', fmortar:'#0e0918',
      wface:'#3d3450', wfaceMid:'#5a4e72', wfaceHi:'#8474a8', wfaceLow:'#241a36', wmortar:'#0e0918', wbottom:'#000',
      ceiling:'#000', topHi:'#8474a8', accent:'#39c0ed' },
  ];
  themes.forEach((th,ti)=>{
    const floors = [];
    // 8 organic flagstone variants — irregular polygon stones with chamfered bevels
    // each tile holds 2-3 stones of different shapes so they don't tile into a perfect grid
    for(let v=0; v<8; v++){
      floors.push(makeSprite(16,16,(x)=>{
        // base mortar layer
        x.fillStyle = th.fmortar; x.fillRect(0,0,16,16);
        // pick a shape variant
        // each variant defines stones as rectangles with chamfered (1px-cut) corners
        const stones = [];
        switch(v){
          case 0: // 4 stones, diagonal split
            stones.push({x:1,y:1,w:8,h:6}); stones.push({x:10,y:1,w:5,h:8});
            stones.push({x:1,y:8,w:5,h:7}); stones.push({x:7,y:9,w:8,h:6}); break;
          case 1: // 3 stones — long horizontal
            stones.push({x:1,y:1,w:14,h:5}); stones.push({x:1,y:7,w:7,h:8}); stones.push({x:9,y:7,w:6,h:8}); break;
          case 2: // 3 stones — long vertical
            stones.push({x:1,y:1,w:5,h:14}); stones.push({x:7,y:1,w:8,h:7}); stones.push({x:7,y:9,w:8,h:6}); break;
          case 3: // 4 small stones
            stones.push({x:1,y:1,w:6,h:6}); stones.push({x:8,y:1,w:7,h:7});
            stones.push({x:1,y:8,w:7,h:7}); stones.push({x:9,y:9,w:6,h:6}); break;
          case 4: // 5 mixed stones
            stones.push({x:1,y:1,w:9,h:4}); stones.push({x:11,y:1,w:4,h:9});
            stones.push({x:1,y:6,w:5,h:5}); stones.push({x:7,y:6,w:7,h:4});
            stones.push({x:1,y:12,w:14,h:3}); break;
          case 5: // 2 big stones
            stones.push({x:1,y:1,w:9,h:8}); stones.push({x:11,y:1,w:4,h:8});
            stones.push({x:1,y:10,w:14,h:5}); break;
          case 6: // 4 stones — offset grid
            stones.push({x:1,y:1,w:5,h:7}); stones.push({x:7,y:1,w:8,h:5});
            stones.push({x:7,y:7,w:8,h:4}); stones.push({x:1,y:9,w:14,h:6}); break;
          default: // 7 — 4 stones — two on top, one big bottom
            stones.push({x:1,y:1,w:7,h:8}); stones.push({x:9,y:1,w:6,h:5});
            stones.push({x:9,y:6,w:6,h:8}); stones.push({x:1,y:10,w:7,h:5});
        }
        // draw each stone with: base, chamfer corners, bevel highlights, bevel shadows
        for(const s of stones){
          // base fill (alternate base and mid for variation)
          const useMid = ((s.x + s.y) % 4) > 1;
          x.fillStyle = useMid ? th.fmid : th.fbase;
          x.fillRect(s.x, s.y, s.w, s.h);
          // chamfer the four corners (clip 1px notch)
          x.fillStyle = th.fmortar;
          x.fillRect(s.x, s.y, 1, 1);
          x.fillRect(s.x+s.w-1, s.y, 1, 1);
          x.fillRect(s.x, s.y+s.h-1, 1, 1);
          x.fillRect(s.x+s.w-1, s.y+s.h-1, 1, 1);
          // top + left bevel highlight (inset 1px from the chamfered corners)
          x.fillStyle = th.fhi;
          x.fillRect(s.x+1, s.y, s.w-2, 1);
          x.fillRect(s.x, s.y+1, 1, s.h-2);
          // brightest pixel near top-left
          x.fillStyle = th.fhi2;
          x.fillRect(s.x+1, s.y, Math.min(2, s.w-2), 1);
          // bottom + right bevel shadow
          x.fillStyle = th.fdark;
          x.fillRect(s.x+1, s.y+s.h-1, s.w-2, 1);
          x.fillRect(s.x+s.w-1, s.y+1, 1, s.h-2);
          // sparse grain inside the stone
          if(s.w>4 && s.h>4){
            x.fillStyle = useMid ? th.fbase : th.fmid;
            x.fillRect(s.x+irand(2,s.w-3), s.y+irand(2,s.h-3), 1, 1);
            x.fillStyle = th.fdark;
            x.fillRect(s.x+irand(2,s.w-3), s.y+irand(2,s.h-3), 1, 1);
          }
        }
      }));
    }
    // WALL — Enter-the-Gungeon-style north-facing wall: pitch-black ceiling cap
    // with perspective top-face sheen, brilliant chiseled lip, and richly
    // detailed brick face with tight mortar courses, warm highlights,
    // and cool base shadows for strong 3D read.
    const wall = makeSprite(16,16,(x)=>{
      // ---- PITCH-BLACK ceiling cap (top 5px — thicker than before) ----
      x.fillStyle = th.ceiling; x.fillRect(0,0,16,5);
      // subtle horizontal perspective sheen: the top face of the wall catches
      // a tiny bit of ambient light so it reads as a solid surface, not a void
      x.fillStyle = 'rgba(255,255,255,0.06)'; x.fillRect(0,0,16,1);
      x.fillStyle = 'rgba(255,255,255,0.03)'; x.fillRect(0,1,16,1);
      // thin dark inner-edge to separate the cap from the lip cleanly
      x.fillStyle = 'rgba(0,0,0,0.45)'; x.fillRect(0,4,16,1);
      // ---- LIT TOP LIP — two-tone chiseled bevel ----
      x.fillStyle = th.wfaceMid; x.fillRect(0,5,16,1);   // lip bevel
      x.fillStyle = th.wfaceMid; x.fillRect(0,6,16,1);  // softer sub-bevel
      // ---- BRICK FACE — three courses with masonry offset splits ----
      x.fillStyle = th.wface; x.fillRect(0,7,16,9);
      // horizontal mortar joints
      x.fillStyle = th.wmortar;
      x.fillRect(0,10,16,1);   // course 1 mortar
      x.fillRect(0,13,16,1);   // course 2 mortar
      x.fillRect(0,15,16,1);   // base mortar
      // vertical brick splits — classic 1/2-bond offset masonry
      x.fillRect(5,7,1,3);  x.fillRect(11,7,1,3);   // top course
      x.fillRect(2,11,1,2); x.fillRect(8,11,1,2); x.fillRect(13,11,1,2);  // mid course
      x.fillRect(5,14,1,1); x.fillRect(11,14,1,1);   // bottom course
      // top-of-brick highlights (warm chiseled edge on each exposed brick top)
      x.fillStyle = th.wfaceMid;
      x.fillRect(0,7,5,1);  x.fillRect(6,7,5,1);  x.fillRect(12,7,4,1);
      x.fillRect(0,11,2,1); x.fillRect(3,11,5,1); x.fillRect(9,11,4,1); x.fillRect(14,11,2,1);
      x.fillRect(0,14,5,1); x.fillRect(6,14,5,1); x.fillRect(12,14,4,1);
      // brightest single-pixel top-edge sparkle on each brick (ETG hallmark)
      x.fillStyle = th.wfaceHi;
      x.fillRect(1,7,3,1); x.fillRect(7,7,3,1); x.fillRect(13,7,2,1);
      x.fillRect(1,11,1,1); x.fillRect(4,11,3,1); x.fillRect(10,11,2,1);
      // bottom-of-brick shadow lines (deep sub-mortar shadow)
      x.fillStyle = th.wfaceLow;
      x.fillRect(0,9,16,1); x.fillRect(0,12,16,1); x.fillRect(0,15,16,1);
      // right-edge column shadow — wall appears lit from the left
      x.fillStyle = 'rgba(0,0,0,0.18)'; x.fillRect(15,7,1,9);
      // grain speckles — stone surface texture
      for(let i=0;i<7;i++){ x.fillStyle = th.wmortar; x.fillRect(irand(1,14), irand(8,15), 1, 1); }
      for(let i=0;i<4;i++){ x.fillStyle = th.wfaceHi; x.fillRect(irand(1,13), irand(8,13), 1, 1); }
      for(let i=0;i<3;i++){ x.fillStyle = th.wfaceLow; x.fillRect(irand(1,13), irand(8,15), 1, 1); }
    });
    // wall TOP CAP for thicker ceiling stretches above interior columns
    const top = makeSprite(16,8,(x)=>{
      x.fillStyle = th.ceiling; x.fillRect(0,0,16,8);
      x.fillStyle = th.wfaceHi; x.fillRect(0,7,16,1);
    });
    // 9-pixel ceiling drop-shadow strip — taller than before for a heavier,
    // more volumetric ETG-style shadow that projects further onto the floor.
    // Three-stop gradient: dense black at the wall edge fading to nothing.
    const ceilingShadow = makeSprite(16,9,(x)=>{
      const grad = x.createLinearGradient(0,0,0,9);
      grad.addColorStop(0,   'rgba(0,0,0,0.75)');
      grad.addColorStop(0.25,'rgba(0,0,0,0.50)');
      grad.addColorStop(0.60,'rgba(0,0,0,0.18)');
      grad.addColorStop(1,   'rgba(0,0,0,0)');
      x.fillStyle = grad;
      x.fillRect(0,0,16,9);
    });
    // ─────────────────────────────────────────────────────────────────────────
    // WALL SPRITE HELPERS
    // Strip layout uses a 5px dark "top-face" strip + 2px bevel + 9px brick.
    // In ETG the dark strip is on the INNER edge (facing the room).
    // ─────────────────────────────────────────────────────────────────────────

    // Draw a full 16-tall column of brick starting at pixel x=bx, width bw.
    // Horizontal mortar courses + offset brick bond + per-brick highlights.
    function brickCol(x, bx, bw){
      if(bw <= 0) return;
      x.fillStyle = th.wface; x.fillRect(bx,0,bw,16);
      // mortar courses
      x.fillStyle = th.wmortar;
      x.fillRect(bx,4,bw,1); x.fillRect(bx,8,bw,1);
      x.fillRect(bx,12,bw,1); x.fillRect(bx,15,bw,1);
      // vertical splits — offset 1/2-bond per course
      const S = bx;
      x.fillRect(S+5,0,1,4);  x.fillRect(S+11,0,1,4);           // row 0
      x.fillRect(S+2,5,1,3);  x.fillRect(S+8,5,1,3);            // row 1
      x.fillRect(S+5,9,1,3);  x.fillRect(S+11,9,1,3);           // row 2
      x.fillRect(S+2,13,1,2); x.fillRect(S+8,13,1,2);           // row 3
      // per-brick top highlight
      x.fillStyle = th.wfaceMid;
      x.fillRect(S,0,5,1);   x.fillRect(S+6,0,5,1);
      x.fillRect(S,5,2,1);   x.fillRect(S+3,5,5,1); x.fillRect(S+9,5,bw-9>0?bw-9:1,1);
      x.fillRect(S,9,5,1);   x.fillRect(S+6,9,5,1);
      x.fillRect(S,13,2,1);  x.fillRect(S+3,13,5,1);x.fillRect(S+9,13,bw-9>0?bw-9:1,1);
      // sparkle pixel (single brightest pixel per brick)
      x.fillStyle = th.wfaceHi;
      x.fillRect(S+1,0,2,1); x.fillRect(S+7,0,2,1);
      x.fillRect(S+1,5,1,1); x.fillRect(S+4,5,2,1);
      x.fillRect(S+1,9,2,1); x.fillRect(S+7,9,2,1);
      // per-brick bottom shadow
      x.fillStyle = th.wfaceLow;
      x.fillRect(bx,3,bw,1); x.fillRect(bx,7,bw,1);
      x.fillRect(bx,11,bw,1); x.fillRect(bx,14,bw,1);
      // grain
      for(let i=0;i<4;i++){ x.fillStyle=th.wmortar; x.fillRect(bx+irand(1,bw-1),irand(1,14),1,1); }
      for(let i=0;i<2;i++){ x.fillStyle=th.wfaceHi;  x.fillRect(bx+irand(1,bw-1),irand(1,12),1,1); }
    }

    // Draw a full 16-wide row of brick starting at pixel y=by, height bh.
    // Used by top/bottom wall sprites.
    function brickRow(x, by, bh){
      if(bh <= 0) return;
      x.fillStyle = th.wface; x.fillRect(0,by,16,bh);
      // vertical mortar splits
      x.fillStyle = th.wmortar;
      x.fillRect(4,by,1,bh); x.fillRect(10,by,1,bh); x.fillRect(14,by,1,bh);
      // per-brick left highlight
      x.fillStyle = th.wfaceMid;
      x.fillRect(0,by,4,1); x.fillRect(5,by,5,1); x.fillRect(11,by,3,1); x.fillRect(15,by,1,1);
      x.fillStyle = th.wfaceHi;
      x.fillRect(0,by,2,1); x.fillRect(5,by,2,1); x.fillRect(11,by,1,1);
      // bottom shadow of the course
      x.fillStyle = th.wfaceLow;
      x.fillRect(0,by+bh-1,16,1);
    }

    // Shared: draw the 5-px dark "depth" strip + 2-px chiseled bevel,
    // oriented left-to-right (for a vertical wall edge facing the room).
    // call with xStart = left pixel of the 7-px zone.
    function depthStripL(x, xStart){ // dark on LEFT, bevel to the right
      x.fillStyle = th.ceiling;           x.fillRect(xStart,   0, 5, 16); // dark
      x.fillStyle = 'rgba(255,255,255,0.07)'; x.fillRect(xStart,0, 1, 16); // outer sheen
      x.fillStyle = 'rgba(0,0,0,0.60)';  x.fillRect(xStart+4, 0, 1, 16); // inner shadow
      x.fillStyle = th.wfaceMid;          x.fillRect(xStart+5, 0, 1, 16); // bevel
      x.fillStyle = th.wfaceMid;         x.fillRect(xStart+6, 0, 1, 16); // sub-bevel
    }
    function depthStripR(x, xEnd){ // dark on RIGHT (xEnd = rightmost dark pixel+1)
      x.fillStyle = th.wfaceMid;         x.fillRect(xEnd-7, 0, 1, 16);   // sub-bevel
      x.fillStyle = th.wfaceMid;          x.fillRect(xEnd-6, 0, 1, 16);   // bevel
      x.fillStyle = 'rgba(0,0,0,0.60)';  x.fillRect(xEnd-5, 0, 1, 16);   // inner shadow
      x.fillStyle = th.ceiling;          x.fillRect(xEnd-4, 0, 5, 16);   // dark
      x.fillStyle = 'rgba(255,255,255,0.07)'; x.fillRect(xEnd-1,0, 1, 16); // outer sheen
    }

    // ── WEST WALL (floorRight: room is to the RIGHT, inner edge on RIGHT) ───
    // The dark depth strip lives on the RIGHT side of the tile (x=9..15).
    // Brick face occupies the LEFT (x=0..8). This matches ETG exactly.
    const wallRight = makeSprite(16,16,(x)=>{
      brickCol(x, 0, 9);
      // slight overall dimming (west face gets indirect light)
      x.fillStyle = 'rgba(0,0,0,0.06)'; x.fillRect(0,0,9,16);
      depthStripR(x, 16); // dark on right, bevel at x=9..10
    });

    // ── EAST WALL (floorLeft: room is to the LEFT, inner edge on LEFT) ───
    // The dark depth strip lives on the LEFT side (x=0..6).
    // Brick face occupies the RIGHT (x=7..15).
    const wallLeft = makeSprite(16,16,(x)=>{
      depthStripL(x, 0); // dark on left, bevel at x=5..6
      brickCol(x, 7, 9);
      // east face is slightly darker (further from upper-left light)
      x.fillStyle = 'rgba(0,0,0,0.10)'; x.fillRect(7,0,9,16);
    });

    // Keep wallSide as a fallback alias
    const wallSide = wallRight;

    // ── SOUTH / BOTTOM WALL (floorAbove: room is ABOVE, wall base below) ──
    // Shows the foot of the wall structure. In ETG: standard brick face,
    // bright top edge (floor-bounce light), darkening toward the bottom,
    // plus a hard ground-contact line at y=15.
    const wallBottom = makeSprite(16,16,(x)=>{
      // 3 full brick courses, running the full 16px width
      brickRow(x, 0, 5);
      brickRow(x, 5, 5);
      brickRow(x, 10, 6);
      // Top edge brightening (floor light bouncing from above)
      x.fillStyle = th.wfaceMid;
      x.fillRect(0,0,16,1);
      x.fillRect(1,0,3,1); x.fillRect(6,0,3,1); x.fillRect(11,0,3,1); // sparkle
      // Progressive darkening toward bottom (wall base, less lit)
      x.fillStyle = 'rgba(0,0,0,0.06)'; x.fillRect(0,4,16,12);
      x.fillStyle = 'rgba(0,0,0,0.10)'; x.fillRect(0,8,16,8);
      x.fillStyle = 'rgba(0,0,0,0.18)'; x.fillRect(0,12,16,4);
      // Ground-contact — darkest line at the very bottom
      x.fillStyle = 'rgba(0,0,0,0.70)'; x.fillRect(0,15,16,1);
      // grain
      for(let i=0;i<5;i++){ x.fillStyle=th.wmortar; x.fillRect(irand(1,14),irand(1,13),1,1); }
    });

    // ─────────────────────────────────────────────────────────────────────────
    // ROOM CORNER SPRITES — where two wall faces meet.
    // Each corner is named for the compass direction of the open room space:
    //   wallNW → NW corner of the room (wall tile where room floor is SE of it)
    //            floorBelow && floorRight
    //   wallNE → NE corner  (floor is SW of tile)  floorBelow && floorLeft
    //   wallSW → SW corner  (floor is NE of tile)  floorAbove && floorRight
    //   wallSE → SE corner  (floor is NW of tile)  floorAbove && floorLeft
    //
    // Layout principle:
    //   North wall face  → ceiling cap (dark, y=0..5) runs full width
    //   West/East face   → depth strip on R or L edge, below the ceiling cap
    //   The two dark regions share the same ceiling colour → seamless L-shape
    // ─────────────────────────────────────────────────────────────────────────

    // ── NW CORNER (floorBelow && floorRight) ─────────────────────────────────
    // Room opens to the SOUTH and EAST. This tile is the top-left enclosure.
    // Shows: ceiling cap (top, full width) + west depth strip (right, below cap).
    // Brick face fills the bottom-left quadrant only.
    // Layout:  y=0..5  → full-width ceiling cap (dark)
    //          y=6     → horizontal bevel under cap (bright, over brick region)
    //          y=7     → sub-bevel
    //          x=9..15 → west depth strip (continuing downward from cap)
    //          x=8     → inner shadow of strip (the vertical "edge")
    //          x=7..8  → vertical bevel of strip (bright → sub)
    //          x=0..6, y=8..15 → brick face
    const wallNW = makeSprite(16,16,(x)=>{
      // Brick face — lower-left quadrant (x=0..8, y=8..15)
      x.fillStyle = th.wface; x.fillRect(0,8,9,8);
      x.fillStyle = th.wmortar;
      x.fillRect(0,12,9,1); x.fillRect(0,15,9,1);
      x.fillRect(5,8,1,4); x.fillRect(0,13,1,3); x.fillRect(7,13,1,3);
      x.fillStyle = th.wfaceMid;
      x.fillRect(0,8,5,1); x.fillRect(6,8,3,1);
      x.fillRect(0,13,5,1);
      x.fillStyle = th.wfaceHi; x.fillRect(1,8,3,1); x.fillRect(7,8,1,1);
      x.fillStyle = th.wfaceLow; x.fillRect(0,11,9,1); x.fillRect(0,14,9,1);
      // Ceiling cap — full width, 6px
      x.fillStyle = th.ceiling; x.fillRect(0,0,16,6);
      x.fillStyle = 'rgba(255,255,255,0.07)'; x.fillRect(0,0,16,1);
      x.fillStyle = 'rgba(0,0,0,0.55)'; x.fillRect(0,5,9,1);  // shadow under cap (brick zone only)
      // Horizontal bevel under cap (over brick region x=0..8)
      x.fillStyle = th.wfaceHi;  x.fillRect(0,6,9,1);
      x.fillStyle = th.wfaceMid; x.fillRect(0,7,9,1);
      // West depth strip — continues seamlessly from ceiling cap downward (x=9..15, y=6..15)
      x.fillStyle = th.ceiling; x.fillRect(9,6,7,10);           // dark strip
      x.fillStyle = 'rgba(255,255,255,0.07)'; x.fillRect(15,6,1,10); // outer sheen
      // Vertical bevel between brick and depth strip (x=7..8, y=8..15)
      x.fillStyle = 'rgba(0,0,0,0.55)'; x.fillRect(8,8,1,8);   // inner shadow
      x.fillStyle = th.wfaceHi;          x.fillRect(7,8,1,8);   // bright vertical bevel
      // Corner transition pixel at (x=8..9, y=6..7): junction of horizontal + vertical bevels
      x.fillStyle = th.wfaceHi; x.fillRect(7,6,1,8);
      x.fillStyle = th.wfaceMid; x.fillRect(8,6,1,2);
    });

    // ── NE CORNER (floorBelow && floorLeft) ──────────────────────────────────
    // Room opens to the SOUTH and WEST. Top-right enclosure.
    // Ceiling cap (top, full width) + east depth strip (left, below cap).
    // Brick face fills the bottom-right quadrant.
    const wallNE = makeSprite(16,16,(x)=>{
      // Brick face — lower-right quadrant (x=7..15, y=8..15)
      x.fillStyle = th.wface; x.fillRect(7,8,9,8);
      x.fillStyle = th.wmortar;
      x.fillRect(7,12,9,1); x.fillRect(7,15,9,1);
      x.fillRect(12,8,1,4); x.fillRect(7,13,1,3); x.fillRect(14,13,1,3);
      x.fillStyle = th.wfaceMid;
      x.fillRect(7,8,5,1); x.fillRect(13,8,3,1);
      x.fillRect(7,13,5,1);
      x.fillStyle = th.wfaceHi; x.fillRect(8,8,3,1); x.fillRect(14,8,1,1);
      x.fillStyle = th.wfaceLow; x.fillRect(7,11,9,1); x.fillRect(7,14,9,1);
      // Ceiling cap — full width
      x.fillStyle = th.ceiling; x.fillRect(0,0,16,6);
      x.fillStyle = 'rgba(255,255,255,0.07)'; x.fillRect(0,0,16,1);
      x.fillStyle = 'rgba(0,0,0,0.55)'; x.fillRect(7,5,9,1);  // shadow under cap (brick zone)
      // Horizontal bevel under cap (over brick region x=7..15)
      x.fillStyle = th.wfaceHi;  x.fillRect(7,6,9,1);
      x.fillStyle = th.wfaceMid; x.fillRect(7,7,9,1);
      // East depth strip — continues from cap downward (x=0..6, y=6..15)
      x.fillStyle = th.ceiling; x.fillRect(0,6,7,10);
      x.fillStyle = 'rgba(255,255,255,0.07)'; x.fillRect(0,6,1,10);
      // Vertical bevel between depth strip and brick (x=7..8, y=8..15)
      x.fillStyle = 'rgba(0,0,0,0.55)'; x.fillRect(7,8,1,8);
      x.fillStyle = th.wfaceHi;          x.fillRect(8,8,1,8);
      // Corner junction
      x.fillStyle = th.wfaceHi; x.fillRect(8,6,1,8);
      x.fillStyle = th.wfaceMid; x.fillRect(7,6,1,2);
    });

    // ── SW CORNER (floorAbove && floorRight) ─────────────────────────────────
    // Room opens to the NORTH and EAST. Bottom-left enclosure.
    // South-wall brick (left, x=0..8) + west depth strip (right, x=9..15).
    const wallSW = makeSprite(16,16,(x)=>{
      // Brick body left side — south-wall treatment
      brickCol(x, 0, 9);
      x.fillStyle = th.wfaceHi; x.fillRect(0,0,9,1);             // floor-bounce top edge
      x.fillStyle = 'rgba(0,0,0,0.06)'; x.fillRect(0,4,9,12);
      x.fillStyle = 'rgba(0,0,0,0.14)'; x.fillRect(0,9,9,7);
      x.fillStyle = 'rgba(0,0,0,0.24)'; x.fillRect(0,13,9,3);
      x.fillStyle = 'rgba(0,0,0,0.70)'; x.fillRect(0,15,9,1);    // ground contact
      // West depth strip on RIGHT — use same geometry as wallRight
      depthStripR(x, 16);
    });

    // ── SE CORNER (floorAbove && floorLeft) ──────────────────────────────────
    // Room opens to the NORTH and WEST. Bottom-right enclosure.
    // East depth strip (left, x=0..6) + south-wall brick (right, x=7..15).
    const wallSE = makeSprite(16,16,(x)=>{
      // East depth strip on LEFT — same geometry as wallLeft
      depthStripL(x, 0);
      // Brick body right side — south-wall treatment
      brickCol(x, 7, 9);
      x.fillStyle = th.wfaceHi; x.fillRect(7,0,9,1);             // floor-bounce top edge
      x.fillStyle = 'rgba(0,0,0,0.06)'; x.fillRect(7,4,9,12);
      x.fillStyle = 'rgba(0,0,0,0.14)'; x.fillRect(7,9,9,7);
      x.fillStyle = 'rgba(0,0,0,0.24)'; x.fillRect(7,13,9,3);
      x.fillStyle = 'rgba(0,0,0,0.70)'; x.fillRect(7,15,9,1);    // ground contact
    });
    // COLUMN PILLAR (interior block) — Enter-the-Gungeon style volumetric stone
    // pillar. Redesigned from the 3-band cap/shadow/base to a fully-textured
    // pillar face with:
    //   • perspective top-face (dark 3px cap) showing the pillar has depth
    //   • bright chiseled bevel lip beneath the cap (ETG hallmark)
    //   • fully detailed brick face with tight 1/2-bond masonry
    //   • left-edge highlight column (lit from upper-left)
    //   • right-edge deep shadow column (cast from self-shading)
    //   • per-brick top highlights and bottom shadow lines for strong relief
    const wallCorner = makeSprite(16,16,(x)=>{
      // ---- COLUMN PILLAR redesigned: dark depth spine runs vertically through the
      // CENTER of the tile (x=6..9), connecting top to bottom. This reads as the
      // column's core reaching up to the ceiling — immersive ETG-style pillar. ----
      // Full brick face on left slab (x=0..5) and right slab (x=10..15)
      x.fillStyle = th.wface;
      x.fillRect(0,0,6,16); x.fillRect(10,0,6,16);
      // ---- MORTAR COURSES on left slab ----
      x.fillStyle = th.wmortar;
      x.fillRect(0,4,6,1); x.fillRect(0,8,6,1); x.fillRect(0,12,6,1); x.fillRect(0,15,6,1);
      x.fillRect(3,0,1,4);  x.fillRect(1,5,1,3);  x.fillRect(4,9,1,3);  x.fillRect(2,13,1,2);
      // ---- MORTAR COURSES on right slab ----
      x.fillRect(10,4,6,1); x.fillRect(10,8,6,1); x.fillRect(10,12,6,1); x.fillRect(10,15,6,1);
      x.fillRect(13,0,1,4); x.fillRect(11,5,1,3); x.fillRect(14,9,1,3); x.fillRect(12,13,1,2);
      // per-brick top highlights left slab
      x.fillStyle = th.wfaceMid;
      x.fillRect(0,0,3,1); x.fillRect(4,0,2,1);
      x.fillRect(0,5,1,1); x.fillRect(2,5,2,1); x.fillRect(5,5,1,1);
      x.fillRect(0,9,4,1); x.fillRect(5,9,1,1);
      x.fillRect(0,13,2,1); x.fillRect(3,13,3,1);
      // sparkles left
      x.fillStyle = th.wfaceHi;
      x.fillRect(0,0,2,1); x.fillRect(4,0,1,1);
      x.fillRect(0,9,2,1);
      // bottom shadow left
      x.fillStyle = th.wfaceLow;
      x.fillRect(0,3,6,1); x.fillRect(0,7,6,1); x.fillRect(0,11,6,1); x.fillRect(0,14,6,1);
      // per-brick top highlights right slab
      x.fillStyle = th.wfaceMid;
      x.fillRect(10,0,3,1); x.fillRect(14,0,2,1);
      x.fillRect(10,5,1,1); x.fillRect(12,5,2,1); x.fillRect(15,5,1,1);
      x.fillRect(10,9,4,1); x.fillRect(15,9,1,1);
      x.fillRect(10,13,2,1); x.fillRect(13,13,3,1);
      x.fillStyle = th.wfaceHi;
      x.fillRect(10,0,2,1); x.fillRect(14,0,1,1);
      x.fillRect(10,9,2,1);
      x.fillStyle = th.wfaceLow;
      x.fillRect(10,3,6,1); x.fillRect(10,7,6,1); x.fillRect(10,11,6,1); x.fillRect(10,14,6,1);
      // ---- LEFT EDGE HIGHLIGHT (lit from upper-left) ----
      x.fillStyle = th.wfaceHi; x.fillRect(0,0,1,16);
      x.fillStyle = 'rgba(255,255,255,0.10)'; x.fillRect(1,0,1,16);
      // ---- RIGHT EDGE SHADOW ----
      x.fillStyle = th.wfaceLow; x.fillRect(15,0,1,16);
      x.fillStyle = 'rgba(0,0,0,0.20)'; x.fillRect(14,0,1,16);
      // ---- CENTER DARK SPINE — only at the TOP, connecting to ceiling cap ----
      // The spine reaches down only ~5px so it visually connects the pillar to
      // the ceiling above without creating an ugly full-height black bar.
      x.fillStyle = th.ceiling; x.fillRect(6,0,4,5);
      // faint ambient glint on the very top of the spine (ceiling contact point)
      x.fillStyle = 'rgba(255,255,255,0.07)'; x.fillRect(6,0,4,1);
      // inner edge bevel — left side of spine (bright lit edge), top only
      x.fillStyle = th.wfaceHi; x.fillRect(5,0,1,6);
      x.fillStyle = 'rgba(0,0,0,0.50)'; x.fillRect(6,0,1,6);
      // inner edge bevel — right side of spine (shadow edge), top only
      x.fillStyle = 'rgba(0,0,0,0.50)'; x.fillRect(9,0,1,6);
      x.fillStyle = th.wfaceMid; x.fillRect(10,0,1,6);
      // grain speckles on left and right faces
      for(let i=0;i<3;i++){ x.fillStyle = th.wmortar; x.fillRect(irand(1,4), irand(1,14), 1, 1); }
      for(let i=0;i<3;i++){ x.fillStyle = th.wmortar; x.fillRect(irand(11,14), irand(1,14), 1, 1); }
      for(let i=0;i<2;i++){ x.fillStyle = th.wfaceHi; x.fillRect(irand(1,4), irand(1,12), 1, 1); }
      for(let i=0;i<2;i++){ x.fillStyle = th.wfaceHi; x.fillRect(irand(11,14), irand(1,12), 1, 1); }
    });
    // ── OUTER BOUNDARY WALL — solid pitch-black with faint stone edge ──────────
    // Used for the extreme left/right columns (x=0, x=ROOM_W-1) that are
    // "outside" the visible dungeon space. No brick face, just void + edge.
    const wallOuter = makeSprite(16,16,(x)=>{
      x.fillStyle = '#000'; x.fillRect(0,0,16,16);
      // faint inner edge where the room begins
      x.fillStyle = 'rgba(90,60,36,0.25)'; x.fillRect(15,0,1,16);
    });
    // ── DOOR-JAMB WALL — boundary wall tile immediately adjacent to a door ────
    // Looks like `wall` (north cap) but adds a clean stone jamb edge on the
    // side that faces the door opening, so the gap reads as an archway, not
    // an abrupt brick cut.
    const wallDoorJambL = makeSprite(16,16,(x)=>{
      // full north-wall face (same as tile.wall)
      x.drawImage(wall, 0, 0);
      // right-side jamb edge — bright inner stone reveal
      x.fillStyle = th.wfaceHi; x.fillRect(15,5,1,11);
      x.fillStyle = th.wfaceMid; x.fillRect(14,5,1,11);
      x.fillStyle = 'rgba(0,0,0,0.50)'; x.fillRect(13,7,1,9);
    });
    const wallDoorJambR = makeSprite(16,16,(x)=>{
      x.drawImage(wall, 0, 0);
      // left-side jamb edge — bright inner stone reveal
      x.fillStyle = th.wfaceHi; x.fillRect(0,5,1,11);
      x.fillStyle = th.wfaceMid; x.fillRect(1,5,1,11);
      x.fillStyle = 'rgba(0,0,0,0.50)'; x.fillRect(2,7,1,9);
    });
    SPR.tiles[ti] = { floors, wall, wallSide,
                     // Swap left/right so dark depth strip faces OUTSIDE (away from room)
                     wallLeft: wallRight, wallRight: wallLeft,
                     wallBottom, wallCorner,
                     wallNW, wallNE, wallSW, wallSE,
                     wallOuter, wallDoorJambL, wallDoorJambR,
                     top, ceilingShadow, accent: th.accent };
  });
}

// torch sprite frames
function buildTorch(){
  SPR.torch = [0,1,2,3].map(f=>makeSprite(8,16,(x)=>{
    // Wall bracket — dark iron mount at bottom of sprite (top of wall mount)
    x.fillStyle='#1a1620'; x.fillRect(0,11,8,5);
    x.fillStyle='#2e2838'; x.fillRect(1,12,6,3);
    x.fillStyle='rgba(255,255,255,0.08)'; x.fillRect(1,11,6,1); // top sheen
    x.fillStyle='#100e14'; x.fillRect(3,10,2,2); // pin into wall
    // Torch handle — wooden stick, 2px wide
    x.fillStyle='#5c3412'; x.fillRect(3,5,2,7);
    x.fillStyle='#7a4a20'; x.fillRect(3,5,1,6); // left highlight
    x.fillStyle='#2e1a08'; x.fillRect(4,6,1,6); // right shadow
    // Cloth wrap at top of handle
    x.fillStyle='#8a5a2e'; x.fillRect(2,4,4,2);
    x.fillStyle='#b07840'; x.fillRect(2,4,2,1); // highlight
    x.fillStyle='#5a3818'; x.fillRect(4,4,2,1); // shadow
    // Animated flame — 4-frame cycle
    const fl = f % 2; // flicker toggle
    const fl2 = (f >= 2) ? 1 : 0; // second toggle
    // Outer fire base (widest, red-orange)
    x.fillStyle='#a81808'; x.fillRect(1,3,6,2);
    x.fillStyle='#d7360e'; x.fillRect(2,2,4,3);
    // Mid fire (orange)
    x.fillStyle='#e06010'; x.fillRect(2-fl,1+fl2,4,2+fl);
    x.fillStyle='#f08020'; x.fillRect(2,1,3,2);
    // Inner fire (yellow-orange)
    x.fillStyle='#f0b020'; x.fillRect(3-fl,0+fl2*fl,2+fl,2);
    // Bright core
    x.fillStyle='#ffde60'; x.fillRect(3,0,2,1+fl2);
    // White-hot tip
    if(fl===0){ x.fillStyle='#ffffe0'; x.fillRect(3,0,1,1); }
    // Wispy side sparks (alternate frames)
    if(f===1){ x.fillStyle='rgba(240,160,30,0.7)'; x.fillRect(1,1,1,1); x.fillRect(6,2,1,1); }
    if(f===3){ x.fillStyle='rgba(240,160,30,0.7)'; x.fillRect(6,1,1,1); x.fillRect(1,2,1,1); }
    // Soft flame glow halo
    x.fillStyle='rgba(220,100,20,0.13)'; x.fillRect(0,0,8,5);
  }));
}

// Chest variants — six tiers matching the brown / blue / green / red / black /
// rainbow chests from the reference image. Each chest has a CLOSED and an OPEN
// frame. Loot tier scales with rarity:
//   brown    — common  (small cash)
//   blue     — uncommon
//   green    — rare    (often weapons)
//   red      — epic    (gold-trim, devil)
//   black    — boss    (skull-locked, big rewards)
//   rainbow  — legendary (multi-pickup)
function buildChest(){
  // Helper that paints the standard chest silhouette (lid arc + body + lock).
  // bodyDark/bodyLight = chest body palette, trim = metal banding,
  // lockColor = lock plate color. Variants apply additional flair on top.
  function chestBase(x, bodyDark, bodyLight, bodyMid, trim, lockColor){
    // ground shadow
    x.fillStyle='rgba(0,0,0,0.4)'; x.fillRect(1,15,14,1);
    // lower body
    x.fillStyle=bodyDark; x.fillRect(0,7,16,8);
    x.fillStyle=bodyMid;  x.fillRect(1,8,14,7);
    x.fillStyle=bodyLight;x.fillRect(1,8,14,2);
    // body shadow at base
    x.fillStyle='#0a0604'; x.fillRect(0,14,16,1);
    // curved lid (rounded top)
    x.fillStyle=bodyDark; x.fillRect(0,3,16,5); x.fillRect(1,2,14,1); x.fillRect(2,1,12,1);

    // lid seam (between lid and body)
    x.fillStyle='#0a0604'; x.fillRect(0,7,16,1);
    // metal banding (sides + top)
    x.fillStyle=trim; x.fillRect(0,5,1,9); x.fillRect(15,5,1,9);
    x.fillStyle=trim; x.fillRect(2,5,1,1); x.fillRect(13,5,1,1);
    // central lock plate
    x.fillStyle=lockColor; x.fillRect(7,5,2,5);

    // keyhole
    x.fillStyle='#0a0604'; x.fillRect(7,8,2,1);

    x.fillStyle=trim; x.fillRect(7,1,2,5);
  }
  function chestOpenBase(x, bodyDark, bodyLight, bodyMid, trim){
    x.fillStyle='rgba(0,0,0,0.4)'; x.fillRect(1,15,14,1);

    x.fillStyle=bodyDark; x.fillRect(0,7,16,8);

    // bands
    x.fillStyle=trim; x.fillRect(0,5,1,3); x.fillRect(15,5,1,3);
  }
  // ----- BROWN (common) -----
  SPR.chest_brown = makeSprite(16,16,(x)=>{

    // dark hex outline (recessed metal hex frame)

    // hex shape (pointy-side flat-top hex)

    x.fillRect(6,3,8,1);
    // upper sloping sides
    x.fillRect(4,4,2,2); x.fillRect(14,4,2,2);
    x.fillRect(3,5,1,2); x.fillRect(16,5,1,2);
    // long vertical sides
    x.fillRect(2,6,2,8); x.fillRect(16,6,2,8);
    // lower sloping sides
    x.fillRect(3,13,1,2); x.fillRect(16,13,1,2);
    x.fillRect(4,14,2,2); x.fillRect(14,14,2,2);
    // bottom edge
    x.fillRect(6,16,8,1);
    // inner hex face (bright green pad surface)
    x.fillStyle='#0a4028';
    for(let yy=4; yy<16; yy++){
      let inset = 0;
      if(yy<=5)       inset = 5 - (yy-4)*2; // sloping top
      else if(yy>=14) inset = 5 - (15-yy)*2;
      else            inset = 1;
      x.fillRect(4+inset, yy, 12-inset*2, 1);
    }
    // green pad highlight (top-left bevel)
    x.fillStyle='#1a8a4a';
    x.fillRect(6,4,8,1);
    x.fillRect(4,6,1,8);
    // soft inner ambient glow
    x.fillStyle='rgba(60,220,120,0.25)';
    x.fillRect(5,6,10,8);
    // SIX GLOWING GREEN DOTS arranged in hex pattern (rotates / pulses)
    const pulse = (f===0)?0:(f===1)?1:0;
    const dots = [
      // perimeter hex dots (6 around)
      {x:9, y:5},   // top
      {x:13, y:7},  // top-right
      {x:13, y:11}, // bot-right
      {x:9, y:13},  // bottom
      {x:5, y:11},  // bot-left
      {x:5, y:7},   // top-left
    ];
    dots.forEach((d,i)=>{
      // dot core
      x.fillStyle = '#9cff8a';
      x.fillRect(d.x, d.y, 2, 2);
      x.fillStyle = '#3aff60';
      x.fillRect(d.x, d.y, 1, 1);
      // pulse halo on every other frame
      if((i+f)%2===0){
        x.fillStyle = 'rgba(60,255,100,0.55)';
        x.fillRect(d.x-1, d.y, 1, 2);
        x.fillRect(d.x+2, d.y, 1, 2);
        x.fillRect(d.x, d.y-1, 2, 1);
        x.fillRect(d.x, d.y+2, 2, 1);
      }
    });
    // center marker dot (subtle)
    x.fillStyle='#39c046';
    x.fillRect(9,9,2,2);
    x.fillStyle='#9cff8a'; x.fillRect(9,9,1,1);
    // tiny green sparks rising on some frames (motion)
    x.fillStyle='rgba(120,255,140,0.7)';
    if(f===0){ x.fillRect(8,2,1,1); x.fillRect(14,3,1,1); }
    else if(f===1){ x.fillRect(10,1,1,1); x.fillRect(5,2,1,1); }
    else { x.fillRect(7,2,1,1); x.fillRect(13,1,1,1); x.fillRect(11,2,1,1); }
  }));
}

function buildPlayer(){
  // CONVICT — ETG-faithful remaster.
  // Palette lifted from the actual Enter the Gungeon sprite sheet:
  //   skin    #e8b48c / #c8845c / #a86038
  //   hair    #1a0a04 / #3a1c08
  //   suit    #e07820 / #c05010 / #803008   (vivid prison orange)
  //   pants   #0c1828 / #18283c / #2a3a50
  //   boots   #1a0e06 / #3a2214 / #5a3620
  //   shades  #050508 / #101828 (lens tint)

/* ---------- Extra sprites: tables, doors, characters, more enemies, corpses ---------- */
function buildTable(){
  // upright table (top-down view, before flip) — chunky wood top with iron rim & bolts
  SPR.tableUp = makeSprite(20,14,(x)=>{
    // shadow under table
    x.fillStyle='rgba(0,0,0,0.35)'; x.fillRect(1,12,18,2);
    // wood top
    x.fillStyle='#6e4427'; x.fillRect(0,1,20,12);
    // plank gradient
    x.fillStyle='#7c4f2c'; x.fillRect(0,2,20,9);
    x.fillStyle='#8a5a36'; x.fillRect(0,3,20,2);
    x.fillStyle='#a36a3c'; x.fillRect(1,3,18,1);
    // plank seams
    x.fillStyle='#3a2818'; x.fillRect(6,1,1,12); x.fillRect(13,1,1,12);
    // dark grain spots
    x.fillStyle='#5a3a20'; x.fillRect(2,6,2,1); x.fillRect(10,8,3,1); x.fillRect(15,5,2,1);
    // iron rim top + bottom
    x.fillStyle='#1a1209'; x.fillRect(0,0,20,2); x.fillRect(0,11,20,2);
    x.fillStyle='#3a3a40'; x.fillRect(0,1,20,1); x.fillRect(0,12,20,1);
    // bolts
    x.fillStyle='#cfd2d6';
    [2,9,17].forEach(rx=>{ x.fillRect(rx,1,1,1); x.fillRect(rx,12,1,1); });
    // visible legs at corners
    x.fillStyle='#1a1209'; x.fillRect(0,13,3,1); x.fillRect(17,13,3,1);
    x.fillStyle='#3a2818'; x.fillRect(0,12,3,1); x.fillRect(17,12,3,1);
  });
  // 4 directional flipped sprites — table tipped that way to provide cover from that side
  function flipBase(x, w, h, edgeSide){
    // common: wood plank wall flipped, with reinforced edge facing outward
    x.fillStyle='rgba(0,0,0,0.45)'; x.fillRect(1,h-2,w-2,2);
    // back leg shadow
    x.fillStyle='#1a1209'; x.fillRect(0,0,w,h);
    x.fillStyle='#5a3a20'; x.fillRect(1,1,w-2,h-2);
    x.fillStyle='#7c4f2c'; x.fillRect(1,2,w-2,h-4);
    // plank lines
    x.fillStyle='#3a2818';
    for(let i=4;i<w-2;i+=4) x.fillRect(i,2,1,h-4);
    // iron rim on the outward edge
    x.fillStyle='#222';
    if(edgeSide==='top'){ x.fillRect(0,0,w,3); x.fillStyle='#3a3a40'; x.fillRect(0,2,w,1); }
    if(edgeSide==='bottom'){ x.fillRect(0,h-3,w,3); x.fillStyle='#3a3a40'; x.fillRect(0,h-3,w,1); }
    if(edgeSide==='left'){ x.fillRect(0,0,3,h); x.fillStyle='#3a3a40'; x.fillRect(2,0,1,h); }
    if(edgeSide==='right'){ x.fillRect(w-3,0,3,h); x.fillStyle='#3a3a40'; x.fillRect(w-3,0,1,h); }
    // bolts on rim
    x.fillStyle='#cfd2d6';
    if(edgeSide==='top'){ x.fillRect(2,1,1,1); x.fillRect(Math.floor(w/2),1,1,1); x.fillRect(w-3,1,1,1); }
    if(edgeSide==='bottom'){ x.fillRect(2,h-2,1,1); x.fillRect(Math.floor(w/2),h-2,1,1); x.fillRect(w-3,h-2,1,1); }
    if(edgeSide==='left'){ x.fillRect(1,2,1,1); x.fillRect(1,Math.floor(h/2),1,1); x.fillRect(1,h-3,1,1); }
    if(edgeSide==='right'){ x.fillRect(w-2,2,1,1); x.fillRect(w-2,Math.floor(h/2),1,1); x.fillRect(w-2,h-3,1,1); }
    // bullet pockmarks
    x.fillStyle='#1a1209';
    x.fillRect(Math.floor(w*0.3),Math.floor(h*0.5),1,1);
    x.fillRect(Math.floor(w*0.7),Math.floor(h*0.4),1,1);
  }
  // up = outward edge faces up (cover from north)
  SPR.tableFlipUp    = makeSprite(20,14,(x)=>flipBase(x,20,14,'top'));
  SPR.tableFlipDown  = makeSprite(20,14,(x)=>flipBase(x,20,14,'bottom'));
  SPR.tableFlipLeft  = makeSprite(14,20,(x)=>flipBase(x,14,20,'left'));

// carpet / rug overlay tiles — purple weave with gold border
function buildCarpet(){
  SPR.carpetCenter = makeSprite(16,16,(x)=>{
    x.fillStyle='#4a1c2a'; x.fillRect(0,0,16,16);

    x.fillStyle='#3a1422';
    for(let i=0;i<16;i+=2){ x.fillRect(0,i,16,1); }
    x.fillStyle='#82304a'; x.fillRect(2,2,12,1); x.fillRect(2,13,12,1);
    // diamond motif
    x.fillStyle='#d2a23c'; x.fillRect(7,4,2,1); x.fillRect(6,5,4,1); x.fillRect(7,6,2,1);
    x.fillStyle='#f0c84a'; x.fillRect(7,5,2,1);
    x.fillStyle='#d2a23c'; x.fillRect(7,9,2,1); x.fillRect(6,10,4,1); x.fillRect(7,11,2,1);
    x.fillStyle='#f0c84a'; x.fillRect(7,10,2,1);
  });
  // edges
  function edge(side){
    return makeSprite(16,16,(x)=>{
      x.fillStyle='#4a1c2a'; x.fillRect(0,0,16,16);
      x.fillStyle='#6b2638'; x.fillRect(1,1,14,14);
      x.fillStyle='#3a1422';
      for(let i=0;i<16;i+=2){ x.fillRect(0,i,16,1); }
      // gold border on requested side
      x.fillStyle='#d2a23c';
      if(side==='top'){ x.fillRect(0,0,16,2); x.fillStyle='#f0c84a'; x.fillRect(0,1,16,1); }
      if(side==='bottom'){ x.fillRect(0,14,16,2); x.fillStyle='#f0c84a'; x.fillRect(0,14,16,1); }
      if(side==='left'){ x.fillRect(0,0,2,16); x.fillStyle='#f0c84a'; x.fillRect(1,0,1,16); }
      if(side==='right'){ x.fillRect(14,0,2,16); x.fillStyle='#f0c84a'; x.fillRect(14,0,1,16); }
    });
  }
  SPR.carpetTop = edge('top');
  SPR.carpetBottom = edge('bottom');
  SPR.carpetLeft = edge('left');
  SPR.carpetRight = edge('right');
  function corner(sx, sy){
    return makeSprite(16,16,(x)=>{
      x.fillStyle='#4a1c2a'; x.fillRect(0,0,16,16);
      x.fillStyle='#6b2638'; x.fillRect(1,1,14,14);
      x.fillStyle='#3a1422';
      for(let i=0;i<16;i+=2){ x.fillRect(0,i,16,1); }
      x.fillStyle='#d2a23c';
      if(sy==='top') x.fillRect(0,0,16,2);
      if(sy==='bottom') x.fillRect(0,14,16,2);
      if(sx==='left') x.fillRect(0,0,2,16);
      if(sx==='right') x.fillRect(14,0,2,16);
      x.fillStyle='#f0c84a';
      if(sx==='left' && sy==='top') x.fillRect(1,1,2,1);
      if(sx==='right' && sy==='top') x.fillRect(13,1,2,1);
      if(sx==='left' && sy==='bottom') x.fillRect(1,14,2,1);
      if(sx==='right' && sy==='bottom') x.fillRect(13,14,2,1);
    });
  }
  SPR.carpetTL = corner('left','top');
  SPR.carpetTR = corner('right','top');
  SPR.carpetBL = corner('left','bottom');
  SPR.carpetBR = corner('right','bottom');
}

// Bullet styles per attack pattern
function buildBulletSprites(){
  // GLOWING RED BALL — bright Enter-the-Gungeon "lead" spheres with a hot
  // white-yellow core, saturated red body, and a fiery translucent halo.
  function makeGlowBall(size){
    return makeSprite(size, size, (x)=>{
      const c = (size-1)/2;
      // outer halo (semi-transparent fiery red)
      for(let py=0; py<size; py++){
        for(let px=0; px<size; px++){
          const dd = Math.hypot(px-c, py-c);
          if(dd <= size/2 && dd > size/2 - 2.0){
            x.fillStyle = 'rgba(255,72,72,0.55)';
            x.fillRect(px,py,1,1);
          }
        }
      }
      // outer ring — saturated dark red rim
      for(let py=0; py<size; py++){
        for(let px=0; px<size; px++){
          const dd = Math.hypot(px-c, py-c);
          if(dd <= size/2 - 1.6){ x.fillStyle = '#a8121a'; x.fillRect(px,py,1,1); }
        }
      }
      // body — bright pure red
      for(let py=0; py<size; py++){
        for(let px=0; px<size; px++){
          const dd = Math.hypot(px-c, py-c);
          if(dd <= size/2 - 2.2){ x.fillStyle = '#ff1430'; x.fillRect(px,py,1,1); }
        }
      }
      // inner — vivid red-orange
      for(let py=0; py<size; py++){
        for(let px=0; px<size; px++){
          const dd = Math.hypot(px-c, py-c);
          if(dd <= size/2 - 3.0){ x.fillStyle = '#ff5a30'; x.fillRect(px,py,1,1); }
        }
      }
      // hot yellow-white core
      for(let py=0; py<size; py++){
        for(let px=0; px<size; px++){
          const dd = Math.hypot(px-c, py-c);
          if(dd <= Math.max(1, size/2 - 3.8)){ x.fillStyle = '#fff3b0'; x.fillRect(px,py,1,1); }
        }
      }
      // pure white pinpoint
      x.fillStyle = '#ffffff';
      x.fillRect(Math.floor(c), Math.floor(c-1), 1, 1);
      x.fillRect(Math.floor(c-1), Math.floor(c), 1, 1);
    });
  }
  // BASIC BULLET — Enter the Gungeon style. Yellow brass casing body with a
  // silver dome tip on top (matches the BasicBullet reference image). Small
  // black-outlined sprite that the projectile rotates around its center.
  function makeBasicBullet(){
    return makeSprite(12, 14, (x)=>{
      // outline
      x.fillStyle='#0a0604';
      x.fillRect(3,1,6,12); x.fillRect(2,2,8,10); x.fillRect(4,0,4,1);
      x.fillRect(2,11,1,2); x.fillRect(9,11,1,2);
      // brass casing body (yellow)
      x.fillStyle='#a37410'; x.fillRect(3,7,6,5);
      x.fillStyle='#f0b429'; x.fillRect(3,6,6,5);
      x.fillStyle='#ffd96b'; x.fillRect(4,6,1,5); // left highlight
      x.fillStyle='#7a5410'; x.fillRect(8,7,1,4); // right shadow
      // tiny sad/blank face
      x.fillStyle='#0a0604'; x.fillRect(5,9,1,1); x.fillRect(7,9,1,1);
      // silver dome tip
      x.fillStyle='#6a737e'; x.fillRect(3,2,6,4);
      x.fillStyle='#a8b0bc'; x.fillRect(3,2,6,3);
      x.fillStyle='#cfd6dc'; x.fillRect(4,1,4,3);
      x.fillStyle='#e8eef4'; x.fillRect(4,1,3,1);
      x.fillStyle='#ffffff'; x.fillRect(5,1,2,1);
      // dome shadow on right
      x.fillStyle='#3a3f47'; x.fillRect(8,3,1,3);
      // crimp ring under the dome
      x.fillStyle='#3a2818'; x.fillRect(3,6,6,1);
      // little prong feet
      x.fillStyle='#0a0604'; x.fillRect(3,12,1,1); x.fillRect(8,12,1,1);
    });
  }
  // PISTOL — glowing red ball (per user request)
  SPR.bulletStd = makeGlowBall(8);
  SPR.bulletEnemy = makeGlowBall(10);

  // SMG — tiny bright cyan spark pellet
  SPR.bulletSMG = makeSprite(5,3,(x)=>{
    x.fillStyle='rgba(80,220,255,0.45)'; x.fillRect(0,0,5,3);
    x.fillStyle='#1090c0'; x.fillRect(1,0,3,3);
    x.fillStyle='#30d0ff'; x.fillRect(1,0,3,2);
    x.fillStyle='#a0f0ff'; x.fillRect(1,0,2,1);
    x.fillStyle='#ffffff'; x.fillRect(1,0,1,1);
  });

  // RIFLE — flat brass shell with silver tip (standard gungeon round)
  SPR.bulletRifle = makeSprite(8,4,(x)=>{
    x.fillStyle='#0a0604'; x.fillRect(0,0,8,4); // outline
    x.fillStyle='#7a5410'; x.fillRect(1,1,5,2); // brass body
    x.fillStyle='#f0b429'; x.fillRect(1,1,5,1); // brass hi
    x.fillStyle='#ffd96b'; x.fillRect(1,1,2,1); // left shine
    x.fillStyle='#7a8898'; x.fillRect(6,1,1,2); // tip dark
    x.fillStyle='#b8c4d0'; x.fillRect(6,1,1,1); // tip hi
  });

  // SHOTGUN — fat lead pellet cluster (single large round)
  SPR.bulletShot = makeSprite(7,6,(x)=>{
    x.fillStyle='rgba(200,80,0,0.35)'; x.fillRect(0,0,7,6);
    x.fillStyle='#601808'; x.fillRect(1,1,5,4);
    x.fillStyle='#c04018'; x.fillRect(1,1,5,3);
    x.fillStyle='#e06030'; x.fillRect(1,1,4,2);
    x.fillStyle='#ff9060'; x.fillRect(1,1,2,1);
    x.fillStyle='#fff0c0'; x.fillRect(1,1,1,1);
  });

  // CROSSBOW — long dark bolt with pointed tip and feather tail
  SPR.bulletBolt = makeSprite(12,3,(x)=>{
    x.fillStyle='#0a0604'; x.fillRect(0,1,12,1); // shaft
    x.fillStyle='#2a1a0d'; x.fillRect(1,0,9,3); // wood body
    x.fillStyle='#4a2a10'; x.fillRect(1,1,9,1); // top grain
    x.fillStyle='#1a1a20'; x.fillRect(9,0,3,3); // steel tip dark
    x.fillStyle='#6a737e'; x.fillRect(9,0,3,2); // tip mid
    x.fillStyle='#cfd6dc'; x.fillRect(10,0,2,1); // tip shine
    x.fillStyle='#c8a870'; x.fillRect(0,0,2,3); // feather tail
    x.fillStyle='#fff8e0'; x.fillRect(0,0,1,2); // feather hi
  });
  // small bullet for HUD pip — single static frame (used as health icon)
  SPR.healthBullet = makeBasicBullet();
  SPR.healthBulletEmpty = makeSprite(12,14,(x)=>{
    // empty silhouette outline
    x.fillStyle='#1a1209';
    x.fillRect(3,1,6,12); x.fillRect(2,2,8,10); x.fillRect(4,0,4,1);
    // dim grey interior
    x.fillStyle='#2a2620'; x.fillRect(3,2,6,10);
    x.fillStyle='#3a352c'; x.fillRect(3,2,6,4);
  });
  // ── ETG-STYLE SINGLE UPRIGHT BULLET SPRITE ───────────────────────────────────
  // One sprite = one upright red bullet (7 wide × 13 tall).
  // Two of these are drawn per heart in the HUD, rotated inward so their tips
  // spread apart at the top and their bases converge at the bottom — making a V / ♥.
  //
  //   *       *   ← dome tips (top outer corners)
  //   |\     /|
  //   | \   / |   ← bodies angling inward via canvas rotation
  //   |  \ /  |
  //   |   X   |   ← bases meet at centre-bottom (the V point)
  //
  // heartFull  = bright red bullet
  // heartEmpty = near-black dim silhouette

  function makeUprightBullet(full){
    return makeSprite(7,13,(x)=>{
      if(full){
        x.fillStyle='#ff88aa'; x.fillRect(2,0,1,1);   // brightest tip pixel
        x.fillStyle='#ff4455'; x.fillRect(2,0,3,1);   // dome tip  (3 px)
        x.fillStyle='#e83040'; x.fillRect(1,1,5,1);   // dome shoulder
        x.fillStyle='#ff6688'; x.fillRect(0,2,1,8);   // left highlight strip
        x.fillStyle='#d7263d'; x.fillRect(1,2,4,8);   // main red body
        x.fillStyle='#a01828'; x.fillRect(5,2,1,8);   // right shadow
        x.fillStyle='#6a0010'; x.fillRect(6,2,1,8);   // right dark edge
        x.fillStyle='#3a0008'; x.fillRect(0,10,7,1);  // crimp ring
        x.fillStyle='#8a0a18'; x.fillRect(0,11,7,1);  // base rim
        x.fillStyle='#6a0010'; x.fillRect(0,12,7,1);  // flat base
      } else {
        x.fillStyle='#1a0408'; x.fillRect(2,0,3,1);
        x.fillStyle='#150306'; x.fillRect(1,1,5,1);
        x.fillStyle='#200608'; x.fillRect(0,2,7,8);
        x.fillStyle='#0e0204'; x.fillRect(0,10,7,1);
        x.fillStyle='#180408'; x.fillRect(0,11,7,2);
      }
    });
  }

  SPR.heartFull  = makeUprightBullet(true);
  SPR.heartEmpty = makeUprightBullet(false);
  // CULT/MAGE BULLET — glowing purple orb with cyan core
  SPR.bulletCult = makeSprite(8,8,(x)=>{
    // outer glow
    x.fillStyle='rgba(157,92,214,0.4)'; x.fillRect(0,1,8,6); x.fillRect(1,0,6,8);
    // body
    x.fillStyle='#5b2a8c'; x.fillRect(1,2,6,4); x.fillRect(2,1,4,6);
    // mid
    x.fillStyle='#9c5cd6'; x.fillRect(2,2,4,4);
    // core
    x.fillStyle='#39c0ed'; x.fillRect(3,3,2,2);
    x.fillStyle='#fff'; x.fillRect(3,3,1,1);
  });
  // SHOTGUN PELLET — short brass slug, multiple fire as a spread
  SPR.bulletShell = makeSprite(8,5,(x)=>{
    x.fillStyle='#1a1009'; x.fillRect(0,2,1,1);     // primer dot
    x.fillStyle='#a37410'; x.fillRect(1,1,3,3);     // brass case
    x.fillStyle='#f0b429'; x.fillRect(1,2,3,1);
    x.fillStyle='#fff5c2'; x.fillRect(2,2,2,1);
    x.fillStyle='#3a2818'; x.fillRect(4,1,1,3);     // case mouth
    x.fillStyle='#7c4f2c'; x.fillRect(5,2,3,1);     // copper pellet
    x.fillStyle='#a36a3c'; x.fillRect(5,2,2,1);
    x.fillStyle='#3a2818'; x.fillRect(7,2,1,1);
  });
  // ICE PELLET — cyan/blue version for slimeB shotgun spread
  SPR.bulletIce = makeSprite(8,5,(x)=>{
    x.fillStyle='#0a1430'; x.fillRect(0,2,1,1);
    x.fillStyle='#1a3a70'; x.fillRect(1,1,3,3);

// Boss tier rotation — bosses are grouped by difficulty, then picked by floor sector.
// No repeats within a run until a tier's pool is exhausted.
// Boss tiers — each tier has multiple options so two consecutive sectors in the
// same tier can still field a different boss. Tiers gradually overlap so the
// difficulty ramps without locking us into a single arena.
const BOSS_TIERS = {
  0: ['bossBlobu', 'bossTwin'],                                  // Extremely Easy
  1: ['bossTwin', 'bossBlobu', 'bossMine'],                      // Easy
  2: ['boss', 'bossMine', 'bossKraken', 'bossTwin'],             // Difficult
  3: ['bossTread', 'bossDuke', 'boss', 'bossKraken'],            // Hard
  4: ['bossLich', 'bossTread', 'bossDuke']                       // Hardest
};
// Master list across all tiers — used as a fall-back so we NEVER repeat a boss
// inside one run as long as there is any unused boss left.
const ALL_BOSSES = ['bossBlobu','bossTwin','bossMine','boss','bossKraken','bossTread','bossDuke','bossLich'];
function bossTierForSector(s){
  if(s<=2) return 0;
  if(s<=4) return 1;
  if(s<=6) return 2;
  if(s<=8) return 3;
  return 4;
}
function chooseBossType(sector){
  const tier = bossTierForSector(sector);
  const pool = BOSS_TIERS[tier] || ['boss'];
  const faced = (runStats && runStats.bossesFaced) || [];
  // 1) Prefer a fresh boss from the current tier
  let pick = pool.filter(b => !faced.includes(b));
  // 2) If the tier is exhausted, allow ANY unused boss (no in-run repeats)
  if(!pick.length) pick = ALL_BOSSES.filter(b => !faced.includes(b));
  // 3) Last resort: fall back to the tier pool (only happens after every boss
  //    has been faced — extremely deep runs)
  if(!pick.length) pick = pool;
  const choice = pick[Math.floor(Math.random()*pick.length)];
  runStats.bossesFaced.push(choice);
  return choice;
}
let intensity = 0; // music

function makeDungeon(sector){
  // grid of rooms, simple connected layout: spawn + ~10 rooms + chest + shop + boss
  const grid = {};
  const placed = [{x:0,y:0,type:RT.START}];
  grid['0,0'] = { type:RT.START, doors:{}, x:0, y:0 };
  const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
  function neighbors(x,y){ return dirs.map(d=>[x+d[0],y+d[1]]); }
  function key(x,y){ return x+','+y; }
  // grow corridor of combat rooms
  let cur = {x:0,y:0};
  while(placed.length < 9){
    const opts = neighbors(cur.x,cur.y).filter(([x,y])=> !grid[key(x,y)]);
    if(!opts.length){ cur = placed[irand(0, placed.length-1)]; continue; }
    const [nx,ny] = opts[irand(0, opts.length-1)];
    grid[key(nx,ny)] = {type:RT.COMBAT, doors:{}, x:nx, y:ny};
    placed.push({x:nx,y:ny,type:RT.COMBAT});
    cur = {x:nx,y:ny};
  }
  // add 2 branch combats for variety
  for(let i=0;i<2;i++){
    const base = placed[irand(0, placed.length-1)];
    const opts = neighbors(base.x,base.y).filter(([x,y])=> !grid[key(x,y)]);
    if(!opts.length) continue;
    const [nx,ny] = opts[irand(0, opts.length-1)];
    grid[key(nx,ny)] = {type:RT.COMBAT, doors:{}, x:nx, y:ny};
    placed.push({x:nx,y:ny,type:RT.COMBAT});
  }
  // pick farthest room → boss. CRITICAL: we must guarantee a boss room exists
  // on every floor, including the first. We pick the room with the greatest
  // Manhattan distance from origin (the START). Ties are broken in favor of
  // rooms that have only one connection (leaves) so the boss feels like a
  // "dead end" climax.
  function manhattan(p){ return Math.abs(p.x)+Math.abs(p.y); }
  function neighborCount(p){ let c=0; neighbors(p.x,p.y).forEach(([x,y])=> { if(grid[key(x,y)]) c++; }); return c; }
  let far = null, farD = -1, farLeafTie = false;
  for(const p of placed){
    if(p.type === RT.START) continue; // never overwrite start
    const d = manhattan(p);
    const isLeafP = neighborCount(p) <= 1;
    if(d > farD || (d === farD && isLeafP && !farLeafTie)){
      farD = d; far = p; farLeafTie = isLeafP;
    }
  }
  // Fallback: if for some reason no candidate was found (degenerate dungeon),
  // promote the very first non-start room so the boss room ALWAYS exists.
  if(!far){ far = placed.find(p => p.type !== RT.START) || placed[0]; }
  grid[key(far.x,far.y)].type = RT.BOSS;
  far.type = RT.BOSS; // keep `placed` in sync so leaf-picker can't overwrite boss

  // pick a leaf for shop and one for chest, and one for augment.
  // We re-check `grid[key].type` (not `p.type`) so this is robust even if the
  // placed array drifts out of sync.
  function isLeaf(p){ return neighborCount(p) <= 1; }
  const leaves = placed.filter(p => {
    const g = grid[key(p.x,p.y)];
    return g && g.type === RT.COMBAT && isLeaf(p);
  });
  function takeLeaf(type){
    if(!leaves.length) return;
    const i = irand(0, leaves.length-1);
    const p = leaves.splice(i,1)[0];
    grid[key(p.x,p.y)].type = type;
    p.type = type; // keep placed in sync
  }
  takeLeaf(RT.SHOP);
  takeLeaf(RT.CHEST);
  takeLeaf(RT.AUG);
  // assign doors
  Object.keys(grid).forEach(k=>{
    const r = grid[k];
    dirs.forEach(([dx,dy])=>{
      if(grid[key(r.x+dx,r.y+dy)]){
        const d = (dx===1?'e':dx===-1?'w':dy===1?'s':'n');
        r.doors[d] = true;
      }
    });
    r.cleared = (r.type===RT.START || r.type===RT.SHOP);
    r.visited = (r.type===RT.START);
    r.entities = null;
    r.props = null;
    r.theme = (sector-1)%3;
    r.sector = sector;
  });
  return grid;
}

/* ---------- Build entities for room ---------- */
function buildRoom(room){
  if(room.entities) return; // already built
  room.entities = [];
  room.props = [];
  // ---- irregular room shape: corner cutouts + occasional center pillar ----
  // Boss rooms stay open. Combat rooms get random shape variations.
  room.extraWalls = [];
  // Default shape for boss / non-combat rooms is plain rectangle.
  room.shapeKind = 'rect';
  if(room.type === RT.COMBAT && Math.random() < 0.85){
    const shapeRoll = Math.random();
    // Tag the room with its shape kind so the minimap can hint at the layout.
    room.shapeKind =
      shapeRoll < 0.18 ? 'corner' :
      shapeRoll < 0.30 ? 'pillars' :
      shapeRoll < 0.42 ? 'L' :
      shapeRoll < 0.54 ? 'plus' :
      shapeRoll < 0.66 ? 'scatter' :
      shapeRoll < 0.76 ? 'T' :
      shapeRoll < 0.85 ? 'octagon' :
      shapeRoll < 0.93 ? 'snake' : 'cubby';
    if(shapeRoll < 0.18){
      // corner cutouts (1-3 corners) — irregular octagonal feel
      const corners = [
        {bx:1, by:1, dx:1, dy:1},
        {bx:ROOM_W-2, by:1, dx:-1, dy:1},
        {bx:1, by:ROOM_H-2, dx:1, dy:-1},
        {bx:ROOM_W-2, by:ROOM_H-2, dx:-1, dy:-1},
      ];
      for(let i=corners.length-1;i>0;i--){ const j=irand(0,i); [corners[i],corners[j]]=[corners[j],corners[i]]; }
      const n = irand(2,4);
      for(let i=0;i<n;i++){
        const c = corners[i];
        const sw = irand(2,3), sh = irand(2,3);
        for(let dx=0;dx<sw;dx++){
          for(let dy=0;dy<sh;dy++){
            const tx = c.bx + c.dx*dx, ty = c.by + c.dy*dy;
            if(tx>0 && tx<ROOM_W-1 && ty>0 && ty<ROOM_H-1)
              room.extraWalls.push({x:tx, y:ty});
          }
        }
      }
    } else if(shapeRoll < 0.30){
      // four corner pillars (single tile each)
      const cx = Math.floor(ROOM_W/2), cy = Math.floor(ROOM_H/2);
      const positions = [{x:cx-3,y:cy-1},{x:cx+3,y:cy-1},{x:cx-3,y:cy+2},{x:cx+3,y:cy+2}];
      for(const p of positions){
        room.extraWalls.push({x:p.x, y:p.y});
        room.extraWalls.push({x:p.x, y:p.y+1});
      }
    } else if(shapeRoll < 0.42){
      // BIG L-shape (carve a wedge out of one corner)
      const which = irand(0,3);
      const lw = irand(4,6), lh = irand(3,4);
      const ax = (which%2===0)? 1 : ROOM_W-1-lw;
      const ay = (which<2)? 1 : ROOM_H-1-lh;
      for(let dx=0;dx<lw;dx++) for(let dy=0;dy<lh;dy++)
        room.extraWalls.push({x:ax+dx, y:ay+dy});
    } else if(shapeRoll < 0.54){
      // PLUS / CROSS — narrow center corridor
      const my = Math.floor(ROOM_H/2), mx = Math.floor(ROOM_W/2);
      for(let dx=1; dx<5; dx++){
        room.extraWalls.push({x:dx, y:my-2});
        room.extraWalls.push({x:dx, y:my+2});
        room.extraWalls.push({x:ROOM_W-1-dx, y:my-2});
        room.extraWalls.push({x:ROOM_W-1-dx, y:my+2});
      }
    } else if(shapeRoll < 0.66){
      // SCATTERED PILLARS — 4-7 single-tile cover columns
      const n = irand(4,7);
      for(let i=0;i<n;i++){
        const px = irand(3, ROOM_W-4), py = irand(3, ROOM_H-4);
        room.extraWalls.push({x:px, y:py});
      }
    } else if(shapeRoll < 0.76){
      // T-SHAPE — center column block hanging from top
      const cx = Math.floor(ROOM_W/2);
      for(let dy=1; dy<4; dy++){
        room.extraWalls.push({x:cx-1, y:dy});
        room.extraWalls.push({x:cx,   y:dy});
        room.extraWalls.push({x:cx+1, y:dy});
      }
      // plus two side cubbies
      for(let dx=0;dx<2;dx++){
        room.extraWalls.push({x:1+dx, y:ROOM_H-3});
        room.extraWalls.push({x:ROOM_W-2-dx, y:ROOM_H-3});
      }
    } else if(shapeRoll < 0.85){
      // DIAMOND / OCTAGON — chamfer all four corners with stepped diagonal
      for(let s=0; s<3; s++){
        for(let d=0; d<=s; d++){
          const fx = 1+d, fy = 1+(s-d);
          if(fx<ROOM_W-1 && fy<ROOM_H-1) room.extraWalls.push({x:fx, y:fy});
          const fx2 = ROOM_W-2-d, fy2 = 1+(s-d);
          if(fx2>0 && fy2<ROOM_H-1) room.extraWalls.push({x:fx2, y:fy2});
          const fx3 = 1+d, fy3 = ROOM_H-2-(s-d);
          if(fx3<ROOM_W-1 && fy3>0) room.extraWalls.push({x:fx3, y:fy3});
          const fx4 = ROOM_W-2-d, fy4 = ROOM_H-2-(s-d);
          if(fx4>0 && fy4>0) room.extraWalls.push({x:fx4, y:fy4});
        }
      }
    } else if(shapeRoll < 0.93){
      // SNAKE — two staggered wall bars splitting the room into a winding path
      const my1 = Math.floor(ROOM_H/2)-1, my2 = Math.floor(ROOM_H/2)+1;
      for(let dx=2; dx<ROOM_W-4; dx++) room.extraWalls.push({x:dx, y:my1});
      for(let dx=4; dx<ROOM_W-2; dx++) room.extraWalls.push({x:dx, y:my2});
    } else {
      // ASYMMETRIC double-cubby — two wall blocks of different sizes on opposite sides
      const w1 = irand(3,4), h1 = irand(2,3);
      for(let dx=0;dx<w1;dx++) for(let dy=0;dy<h1;dy++)
        room.extraWalls.push({x:1+dx, y:1+dy});
      const w2 = irand(2,3), h2 = irand(3,4);
      for(let dx=0;dx<w2;dx++) for(let dy=0;dy<h2;dy++)
        room.extraWalls.push({x:ROOM_W-1-w2+dx, y:ROOM_H-1-h2+dy});
    }
    // never block tiles directly in front of doorways
    const cx = Math.floor((ROOM_W-1)/2), cy = Math.floor((ROOM_H-1)/2);
    const safe = new Set();
    if(room.doors && room.doors.n){ for(let dy=1;dy<3;dy++){ safe.add(cx+','+dy); safe.add((cx+1)+','+dy); } }
    if(room.doors && room.doors.s){ for(let dy=ROOM_H-3;dy<=ROOM_H-2;dy++){ safe.add(cx+','+dy); safe.add((cx+1)+','+dy); } }
    if(room.doors && room.doors.w){ for(let dx=1;dx<3;dx++){ safe.add(dx+','+cy); safe.add(dx+','+(cy+1)); } }
    if(room.doors && room.doors.e){ for(let dx=ROOM_W-3;dx<=ROOM_W-2;dx++){ safe.add(dx+','+cy); safe.add(dx+','+(cy+1)); } }
    // also keep center spawn safe
    safe.add(Math.floor(ROOM_W/2)+','+Math.floor(ROOM_H/2));
    room.extraWalls = room.extraWalls.filter(w=>!safe.has(w.x+','+w.y));
  }
  // ---- carpet under combat & boss & shop & chest rooms ----
  if(room.type !== RT.START){
    if(room.type === RT.SHOP || room.type === RT.AUG || room.type === RT.CHEST || Math.random() < 0.45){
      const cw = (room.type === RT.BOSS) ? 9 : irand(5,7);
      const ch = (room.type === RT.BOSS) ? 5 : irand(3,4);
      const cx = Math.floor((ROOM_W - cw)/2), cy = Math.floor((ROOM_H - ch)/2);
      room.carpet = {x:cx, y:cy, w:cw, h:ch};
    }
  }
  // place props (torches on walls)
  for(let i=0;i<irand(2,4);i++){
    const tx = irand(2, ROOM_W-3);
    const ty = 0;
    room.props.push({type:'torch', x:tx*TILE, y:ty*TILE+8, frame:irand(0,3)});
  }
  // skulls/barrels on floor
  for(let i=0;i<irand(2,5);i++){
    let placed=false;
    for(let tries=0;tries<6 && !placed;tries++){
      const tx = irand(2, ROOM_W-3), ty = irand(2, ROOM_H-3);
      if(isWall(room, tx, ty)) continue;
      if(Math.random()<0.5) room.props.push({type:'skull', x:tx*TILE, y:ty*TILE});
      else if(Math.random()<0.5) room.props.push({type:'barrel', x:tx*TILE, y:ty*TILE, hp:1, w:10, h:12});
      else room.props.push({type:'barrel', x:tx*TILE, y:ty*TILE, hp:1, w:10, h:12});
      placed=true;
    }
  }
  if(room.type === RT.COMBAT || room.type === RT.BOSS){
    // === TABLES FIRST so enemies can spawn around them, never inside them ===
    const tableCount = (room.type===RT.BOSS) ? 2 : irand(1,3);
    const placedTables = [];
    for(let i=0;i<tableCount;i++){
      let attempts = 0;
      while(attempts++<10){
        const tx = irand(3, ROOM_W-5), ty = irand(3, ROOM_H-4);
        if(isWall(room, tx, ty) || isWall(room, tx+1, ty) || isWall(room, tx, ty+1)) continue;
        const px = tx*TILE, py = ty*TILE;
        const cdx = Math.abs(px+10 - ROOM_PX_W/2), cdy = Math.abs(py+8 - ROOM_PX_H/2);
        if(cdx<28 && cdy<28) continue;
        let ok = true;
        for(const t of placedTables){
          if(Math.abs(t.x-px)<28 && Math.abs(t.y-py)<22){ ok=false; break; }
        }
        if(!ok) continue;
        const t = {type:'table', x:px, y:py, w:20, h:14, hp:42, maxHp:42, flipped:false, flipDir:null};
        room.props.push(t);
        placedTables.push(t);
        break;
      }
    }
    // helper: tile (tx,ty) overlaps any placed table?
    function tileOnTable(tx, ty){
      const px = tx*TILE, py = ty*TILE;
      for(const t of placedTables){
        if(px+TILE > t.x && px < t.x+t.w && py+TILE > t.y && py < t.y+t.h) return true;
      }
      return false;
    }
    if(room.type===RT.BOSS){
      // tier-based, no-repeat boss selection
      const pick = (room.bossType) || chooseBossType(room.sector || 1);
      room.bossType = pick;
      if(pick==='bossTwin'){
        room.entities.push(makeEnemy('bossTwin', ROOM_PX_W/2 - 36, ROOM_PX_H/2));
        room.entities.push(makeEnemy('bossTwin', ROOM_PX_W/2 + 36, ROOM_PX_H/2));
      } else {
        room.entities.push(makeEnemy(pick, ROOM_PX_W/2, ROOM_PX_H/2));
      }
    } else {
      const sector = room.sector || 1;
      const count = irand(2, 4) + Math.floor(sector/2);
      // pool grows with sector
      let pool = ['slimeG','bat'];
      if(sector>=1) pool.push('eye','skel','slimeR');
      if(sector>=2) pool.push('veteran','shroom','slimeR','slimeB','bigShroom');
      if(sector>=3) pool.push('charger','drone','mage','tank','slimeR','slimeB');
      if(sector>=4) pool.push('tank','charger','mage','slimeB');
      for(let i=0;i<count;i++){
        const t = pool[irand(0,pool.length-1)];
        let ex=0, ey=0, found=false;
        for(let tries=0;tries<48;tries++){
          const tx = irand(3, ROOM_W-4), ty = irand(3, ROOM_H-4);
          // check center tile AND all 4 neighbours so enemies never spawn flush against a column
          if(isWall(room,tx,ty)||isWall(room,tx-1,ty)||isWall(room,tx+1,ty)||isWall(room,tx,ty-1)||isWall(room,tx,ty+1)) continue;
          if(tileOnTable(tx, ty)) continue; // never inside a table
          // never spawn on top of any prop (skull/barrel/crate/teleporter/chest/pedestal/shopkeep)
          let onProp = false;
          if(room.props){
            const ax = tx*TILE, ay = ty*TILE;
            for(const p of room.props){
              if(p.broken) continue;
              const pw = p.w || 16, ph = p.h || 16;
              if(ax + TILE > p.x && ax < p.x + pw && ay + TILE > p.y && ay < p.y + ph){ onProp = true; break; }
            }
          }
          if(onProp) continue;
          // not on a door tile
          if(tx<=1 || ty<=1 || tx>=ROOM_W-2 || ty>=ROOM_H-2) continue;
          ex = tx*TILE; ey = ty*TILE; found=true; break;
        }
        if(!found){ ex = Math.floor(ROOM_W/2)*TILE; ey = Math.floor(ROOM_H/2)*TILE; }
        room.entities.push(makeEnemy(t, ex, ey));
      }
    }
  }
  if(room.type === RT.CHEST){
    // Chest tier — weighted toward common/brown, rarer for higher tiers.
    // Sector progress nudges the odds toward rainbow/black later in a run.
    const sec = (runStats && runStats.sector) || 1;
    const roll = Math.random() * 100;
    let tier = 'brown';
    if(roll > 95 - sec*2) tier = 'rainbow';
    else if(roll > 88 - sec*2) tier = 'black';
    else if(roll > 75 - sec) tier = 'red';
    else if(roll > 55) tier = 'green';
    else if(roll > 30) tier = 'blue';
    room.props.push({type:'chest', x: ROOM_PX_W/2-8, y: ROOM_PX_H/2-8, opened:false, tier});
  }
  if(room.type === RT.SHOP){
    room.props.push({type:'shopkeep', x: ROOM_PX_W/2-7, y: ROOM_PX_H/2-14});
    // 3 items on pedestals
    const items = [];
    items.push({kind:'heart', cost:8, x: ROOM_PX_W/2-40, y: ROOM_PX_H/2+10});
    const wpns = WEAPONS.filter(w=>w.id!==player.weapon);
    items.push({kind:'weapon', wid: wpns[irand(0,wpns.length-1)].id, cost:18, x: ROOM_PX_W/2, y: ROOM_PX_H/2+10});
    items.push({kind:'aug', aid: AUGMENTS[irand(0,AUGMENTS.length-1)].id, cost:14, x: ROOM_PX_W/2+40, y: ROOM_PX_H/2+10});
    room.shopItems = items;
  }
  if(room.type === RT.AUG){
    room.props.push({type:'pedestal', x: ROOM_PX_W/2-7, y: ROOM_PX_H/2-6});
    // pick 3 augments not owned
    const choices = AUGMENTS.filter(a=>!hasAug(a.id));
    const c = [];
    for(let i=0;i<3 && choices.length;i++){
      const k = irand(0, choices.length-1);
      c.push(choices.splice(k,1)[0]);
    }
    room.augChoices = c;
    room.augTaken = false;
  }
}

/* ---------- Enemies ---------- */
function makeEnemy(type, x, y){
  const base = { type, x, y, w:10, h:10, vx:0, vy:0, hp:10, maxHp:10, dmg:1, speed:30, hit:0, atkT:0, frame:0, anim:0, dropMul:1, fireCool:rand(0.4,1.4), id: Math.random().toString(36).slice(2) };
  switch(type){
    // base kin — 5 pistol shots (5×14=70)
    case 'slimeG': return Object.assign(base, {hp:70, maxHp:70, speed:35, w:12, h:10, dmg:1, ai:'shooter', shotPattern:'single', shotColor:'#d7263d'});
    // shotgun kin — tankier, 10 pistol shots
    case 'slimeR': return Object.assign(base, {hp:140, maxHp:140, speed:28, w:14, h:12, dmg:2, ai:'shooter', shotPattern:'spread', shotColor:'#d7263d'});
    // ice shotgun kin — toughest basic, 13 pistol shots
    case 'slimeB': return Object.assign(base, {hp:182, maxHp:182, speed:30, w:14, h:12, dmg:2, ai:'shooter', shotPattern:'spread', shotColor:'#39c0ed', iceShot:true});
    // bullat — dies in 1 pistol shot
    case 'bat':    return Object.assign(base, {hp:12, maxHp:12, speed:65, w:12, h:8,  dmg:1, fly:true, ai:'rusher'});
    // cultist eye — 6 shots
    case 'eye':    return Object.assign(base, {hp:84, maxHp:84, speed:22, w:12, h:10, dmg:1, ai:'caster', shotColor:'#5b2a8c'});
    // skeleton kin — 8 shots
    case 'skel':   return Object.assign(base, {hp:112, maxHp:112, speed:38, w:10, h:14, dmg:2, ai:'arcer', shotColor:'#d4cfa3'});
    // veteran — 12 shots
    case 'veteran':return Object.assign(base, {hp:168, maxHp:168, speed:40, w:11, h:14, dmg:2, ai:'burst', burstLeft:0, shotColor:'#f0b429'});
    // tank kin — 25 shots, very durable
    case 'tank':   return Object.assign(base, {hp:350, maxHp:350, speed:18, w:18, h:18, dmg:3, ai:'mortar', shotColor:'#3a3a40'});
    // shroomer — 5 shots
    case 'shroom': return Object.assign(base, {hp:70, maxHp:70, speed:24, w:11, h:12, dmg:1, ai:'rusher', sporeExplode:true});
    case 'bigShroom': return Object.assign(base, {hp:350, maxHp:350, speed:14, w:20, h:22, dmg:2, ai:'bigshroom', sporeCool:rand(1.5,2.5), wanderVx:0, wanderVy:0, wanderT:0, dropMul:2});
    // homing drone — 3 shots (quick to kill, it's fast)
    case 'drone':  return Object.assign(base, {hp:42, maxHp:42, speed:55, w:10, h:8, dmg:1, fly:true, ai:'homer', shotColor:'#39c0ed'});
    // charger — 9 shots
    case 'charger':return Object.assign(base, {hp:126, maxHp:126, speed:30, w:14, h:12, dmg:2, ai:'charger', chargeT:0, windT:rand(1.0,2.0)});
    // mage — 6 shots
    case 'mage':   return Object.assign(base, {hp:84, maxHp:84, speed:30, w:12, h:14, dmg:2, ai:'mage', tpCool:rand(2,4), shotColor:'#39c0ed'});
