        ctx.fillRect(W/2-92,my-9,184,18);
        // Left accent bar
        ctx.fillStyle='#e85030'; ctx.fillRect(W/2-92,my-9,2,18);
        // Right accent bar
        ctx.fillRect(W/2+90,my-9,2,18);
        // Pixel borders top/bottom
        ctx.fillStyle='rgba(232,80,48,0.28)';
        ctx.fillRect(W/2-92,my-9,184,1); ctx.fillRect(W/2-92,my+8,184,1);
      }
      // Bullet cursor — ETG-style casing pointing right
      if(sel){
        const cx=W/2-80, cy=my;
        ctx.fillStyle='#f0c840'; // gold casing body
        ctx.fillRect(cx,   cy-2, 9, 5);
        ctx.fillStyle='#d8a820';
        ctx.fillRect(cx,   cy+1, 9, 1);   // bottom shadow
        ctx.fillStyle='#f8e060';
        ctx.fillRect(cx,   cy-2, 2, 2);   // primer cap
        ctx.fillStyle='#c87828'; // tip
        ctx.fillRect(cx+9, cy-1, 3, 3);
        ctx.fillRect(cx+12,cy,   2, 1);
        ctx.fillStyle='rgba(255,200,80,0.25)'; // shell glint
        ctx.fillRect(cx+2, cy-2, 5, 1);
      }
      // Menu text
      const col=sel?'#f4cc44':'#706050';
      drawText(MENU_OPTS[i], W/2+5, my, true, 8, col);
      if(sel){
        ctx.globalAlpha=0.11+pulse*0.07;
        drawText(MENU_OPTS[i], W/2+5, my, true, 8, '#ffe888');
        ctx.globalAlpha=1.0;
      }
    }
    drawText('CREATED BY REN  ·  v2', W/2, H-10, true, 5, '#281e28');

  } else if(menuSubState==='select'){
    drawText('SELECT YOUR GUNSLINGER', W/2, ruleY+10, true, 9, '#f4d872');
    drawText('A / D   ENTER TO CONFIRM', W/2, ruleY+22, true, 5, '#60504a');
    const cw=76, gap=10, total=CHARACTERS.length*cw+(CHARACTERS.length-1)*gap;
    for(let i=0;i<CHARACTERS.length;i++){
      const ch=CHARACTERS[i];
      const x0=Math.floor((W-total)/2)+i*(cw+gap);
      const isSel=(i===charSel);
      ctx.save();
      ctx.fillStyle=isSel?'rgba(232,80,48,0.14)':'rgba(10,8,18,0.78)';
      ctx.fillRect(x0,ruleY+30,cw,96);
      ctx.strokeStyle=isSel?'#e85030':'#221830'; ctx.lineWidth=isSel?2:1;
      ctx.strokeRect(Math.round(x0)+0.5,ruleY+30.5,cw-1,95);
      if(isSel){ ctx.fillStyle='#e85030'; ctx.fillRect(x0,ruleY+30,2,96); }
      const sprArr=(SPR.chars&&SPR.chars[ch.id])?SPR.chars[ch.id]:SPR.player;
      const spr=Array.isArray(sprArr)?sprArr[0]:sprArr;
      if(spr){ ctx.imageSmoothingEnabled=false; ctx.drawImage(spr,x0+cw/2-14,ruleY+38,28,36); }
      drawText(ch.name.toUpperCase(), x0+cw/2, ruleY+80, true, 6, isSel?'#f4cc44':'#c8b8b0');
      const w=WEAPON_BY_ID[ch.weapon]||{name:ch.weapon};
      drawText(w.name.toUpperCase(),x0+cw/2,ruleY+91,true,4,'#706060');
      drawText('Q: '+ch.abilityName.toUpperCase(),x0+cw/2,ruleY+101,true,4,'#46a8c8');
      drawText('HP '+ch.maxHp+'  SPD '+(ch.speedMul.toFixed(1)),x0+cw/2,ruleY+111,true,4,'#504848');
      ctx.restore();
    }
    const selC=CHARACTERS[charSel];
    drawText(selC.desc,W/2,ruleY+132,true,5,'#a89898');
    drawText(selC.abilityDesc,W/2,ruleY+143,true,5,'#46a8c8');
    drawText('ESC TO CANCEL',W/2,H-10,true,5,'#3a2a38');

  } else if(menuSubState==='controls'){
    drawText('CONTROLS', W/2, ruleY+10, true, 9, '#f4d872');
    ctx.fillStyle='rgba(232,80,48,0.08)'; ctx.fillRect(W/2-100,ruleY+4,200,14);
    const lines=[
      'MOVE        ·   W A S D',

      'DASH        ·   SPACE / SHIFT',
      'RELOAD      ·   R',
      'INTERACT    ·   E',
      'FLIP TABLE  ·   F   (COVER)',
      'ABILITY     ·   Q   (CHARACTER POWER)',
      'PAUSE       ·   ESC',
    ];
    lines.forEach((l,i)=>{
      const ly=ruleY+26+i*13;
      ctx.fillStyle=`rgba(232,80,48,${0.05+pulse*0.03})`; ctx.fillRect(W/2-100,ly-8,200,12);
      drawText(l,W/2,ly,true,6,i%2===0?'#b8a8a0':'#a09090');
    });
    drawText('CLICK / ESC TO RETURN',W/2,H-10,true,5,'#3a2a38');

  } else if(menuSubState==='credits'){
    drawText('CREDITS', W/2, ruleY+10, true, 9, '#f4d872');
    ctx.fillStyle='rgba(232,80,48,0.08)'; ctx.fillRect(W/2-80,ruleY+4,160,14);
    [
      ['#e85030','CYCLOPS DUNGEON REFORGED'],

    drawText('CLICK / ESC TO RETURN',W/2,H-10,true,5,'#3a2a38');
  }

function renderRoom(){
  const r = curRoom();
  if(!r) return;
  const offX = cam.offX + cam.shakeX;
  const offY = cam.offY + cam.shakeY;
  const themeIdx = ((r.theme|0) % 3 + 3) % 3;
  const tile = SPR.tiles[themeIdx] || SPR.tiles[0];
  if(!tile) return;
  // black backdrop for any area outside the room (revealed by zoomed camera)
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 18, W, H-26-18);
  // begin zoomed/world-space rendering
  ctx.save();
  ctx.scale(cam.zoom, cam.zoom);

  // Build a fast Set of interior column positions so we can skip them
  // in the first pass and draw them AFTER the player (depth overlay).
  const extraWallSet = new Set((r.extraWalls||[]).map(w=>w.x+','+w.y));

  // floor + walls — pick wall sprite based on neighbors so we don't
  // get a black "ceiling" cap on every side. Only walls with floor
  // immediately BELOW them get the dark ceiling band (north walls).
  for(let y=0;y<ROOM_H;y++){
    for(let x=0;x<ROOM_W;x++){
      if(isWall(r,x,y)){
        // Columns (extraWalls) are deferred — render floor under them now,
        // draw the column sprite after player for depth sorting.
        if(extraWallSet.has(x+','+y)){
          const f = tile.floors[(x*7+y*13) % tile.floors.length];
          ctx.drawImage(f, offX + x*TILE, offY + y*TILE);
          continue;
        }
        const floorBelow = !isWall(r,x,y+1);
        const floorAbove = !isWall(r,x,y-1);
        const floorLeft  = !isWall(r,x-1,y);
        const floorRight = !isWall(r,x+1,y);
        let spr;
        // ── Boundary wall tiles (x/y at room edge) ──────────────────────────
        // Boundary walls must never use corner sprites because door gaps on the
        // edge make adjacent tiles falsely appear as corners (door is "floor"
        // but it's not really an interior corner). Use simple face sprites only.
        const isBoundary = (x===0 || x===ROOM_W-1 || y===0 || y===ROOM_H-1);
        if(isBoundary){
          // floorBelow wins first — north-boundary tiles always use ceiling cap
          if(floorBelow) spr = tile.wall;
          // floorAbove wins for south boundary
          else if(floorAbove) spr = tile.wallBottom || tile.wall;
          else if(floorRight && !floorLeft) spr = tile.wallRight || tile.wallSide || tile.wall;
          else if(floorLeft && !floorRight) spr = tile.wallLeft || tile.wallSide || tile.wall;
          else spr = tile.wall;
        // ── Room boundary corners (most specific — check FIRST) ──────────────
        } else if(floorBelow && floorRight && !floorLeft && !floorAbove){
          // NW corner: ceiling cap + west strip (strip on RIGHT, cap on TOP)
          spr = tile.wallNW || tile.wall;
        } else if(floorBelow && floorLeft && !floorRight && !floorAbove){
          // NE corner: ceiling cap + east strip (strip on LEFT, cap on TOP)
          spr = tile.wallNE || tile.wall;
        } else if(floorAbove && floorRight && !floorLeft && !floorBelow){
          // SW corner: south base + west strip on RIGHT
          spr = tile.wallSW || tile.wallBottom || tile.wall;
        } else if(floorAbove && floorLeft && !floorRight && !floorBelow){
          // SE corner: south base + east strip on LEFT
          spr = tile.wallSE || tile.wallBottom || tile.wall;
        // ── Single-face walls ────────────────────────────────────────────────
        } else if(floorBelow && !floorLeft && !floorRight){
          // Pure north wall — iconic ceiling cap, no side strip
          spr = tile.wall;
        } else if(floorBelow){
          // North wall that also touches a side — still use ceiling cap
          spr = tile.wall;
        } else if(floorAbove){
          // South/bottom wall
          spr = tile.wallBottom || tile.wall;
        } else if(floorRight && !floorLeft){
          // WEST wall (room to the right) — depth strip on RIGHT
          spr = tile.wallRight || tile.wallSide || tile.wall;
        } else if(floorLeft && !floorRight){
          // EAST wall (room to the left) — depth strip on LEFT
          spr = tile.wallLeft || tile.wallSide || tile.wall;
        } else if(floorLeft || floorRight){
          // Thin wall exposed on both sides
          spr = tile.wallSide || tile.wall;
        } else {
          // Interior block / column
          spr = tile.wallCorner || tile.wallSide || tile.wall;
        }
        ctx.drawImage(spr, offX + x*TILE, offY + y*TILE);
      } else {
        const f = tile.floors[(x*7+y*13) % tile.floors.length];
        ctx.drawImage(f, offX + x*TILE, offY + y*TILE);
        // Gungeon-style floor accents (deterministic by tile coord + room id) —
        // sprinkled cracks, blood splats, debris dots so the floor doesn't
        // feel uniform. Skips entry tiles near the room center.
        const seed = ((r.x*131 + r.y*977) ^ (x*73 + y*191)) >>> 0;
        const roll = seed % 100;
        const px = offX + x*TILE, py = offY + y*TILE;
        if(roll < 6){
          // diagonal hairline crack
          ctx.fillStyle = 'rgba(8,4,2,0.55)';
          const o = (seed >> 8) & 3;
          ctx.fillRect(px+2+o, py+3, 1,1);
          ctx.fillRect(px+3+o, py+4, 1,1);
          ctx.fillRect(px+4+o, py+5, 1,1);
          ctx.fillRect(px+5+o, py+6, 1,1);
        } else if(roll < 9){
          // small bloodstain
          ctx.fillStyle = 'rgba(122,20,36,0.55)';
          const sx = (seed>>4)%5, sy = (seed>>9)%5;
          ctx.fillRect(px+sx, py+sy, 2,2); ctx.fillRect(px+sx+2, py+sy+1, 1,1);
          ctx.fillRect(px+sx-1, py+sy+1, 1,1);
        } else if(roll < 13){
          // pebble / debris cluster
          ctx.fillStyle = 'rgba(58,40,24,0.85)';
          const sx = (seed>>5)%5, sy = (seed>>12)%5;
          ctx.fillRect(px+sx, py+sy, 1,1);
          ctx.fillRect(px+sx+2, py+sy+1, 1,1);
          ctx.fillRect(px+sx+1, py+sy+3, 1,1);
        } else if(roll < 16){
          // ornate floor inlay (small diamond)
          ctx.fillStyle = 'rgba(212,201,131,0.30)';
          ctx.fillRect(px+3, py+3, 2,2); ctx.fillRect(px+3, py+3, 2,2);
          ctx.fillStyle = 'rgba(0,0,0,0.4)';
          ctx.fillRect(px+3, py+3, 1,1); ctx.fillRect(px+4, py+4, 1,1);
        } else if(roll < 18){
          // scorch mark
          ctx.fillStyle = 'rgba(0,0,0,0.45)';
          ctx.fillRect(px+2, py+2, 4,4);
          ctx.fillStyle = 'rgba(40,30,20,0.4)';
          ctx.fillRect(px+1, py+3, 6,2);
        }
      }
    }
  }
  // Gungeon-style drop shadow under every wall tile that has floor immediately below
  // (wall projects ceiling shadow onto the floor)
  for(let y=0;y<ROOM_H-1;y++){
    for(let x=0;x<ROOM_W;x++){
      if(isWall(r,x,y) && !isWall(r,x,y+1)){
        if(tile.ceilingShadow){
          ctx.drawImage(tile.ceilingShadow, offX + x*TILE, offY + (y+1)*TILE);
        }
      }
    }
  }
  // ETG-style SIDE-WALL shadow casting:
  //  West walls (floorRight) cast an eastward shadow onto adjacent floor tiles.
  //  East walls (floorLeft) cast a smaller westward shadow (counter-light-source).
  //  These shadows are gradient-filled and fade over ~10px into the room.
  for(let y=0;y<ROOM_H;y++){
    for(let x=0;x<ROOM_W;x++){
      if(!isWall(r,x,y)) continue;
      const fl = !isWall(r,x-1,y);
      const fr = !isWall(r,x+1,y);
      // West wall: casts shadow to the RIGHT into the room — only onto floor tiles
      if(fr && !isWall(r,x+1,y)){
        const sx = offX + (x+1)*TILE, sy = offY + y*TILE;
        const sg = ctx.createLinearGradient(sx, sy, sx+12, sy);
        sg.addColorStop(0, 'rgba(0,0,0,0.48)');
        sg.addColorStop(0.5,'rgba(0,0,0,0.18)');
        sg.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = sg;
        ctx.fillRect(sx, sy, 12, TILE);
      }
      // East wall: casts a lighter shadow to the LEFT — only onto floor tiles
      if(fl && !isWall(r,x-1,y)){
        const sx = offX + (x-1)*TILE + TILE - 8, sy = offY + y*TILE;
        const sg = ctx.createLinearGradient(sx+8, sy, sx, sy);
        sg.addColorStop(0, 'rgba(0,0,0,0.28)');
        sg.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = sg;
        ctx.fillRect(sx, sy, 8, TILE);
      }
    }
  }
  // Cast shadow on the floor BELOW each interior column (extraWalls).
  // The column sprite itself now has a black middle band so we no longer
  // need to fake mass with a band above. Instead we drop a soft elliptical
  // shadow on the floor right below each column for grounded depth.
  if(r.extraWalls){
    for(const w of r.extraWalls){
      const cellX = offX + w.x*TILE;
      const cellY = offY + w.y*TILE;
      // only cast a shadow if there's an open floor tile directly below
      const belowIsWall = isWall(r, w.x, w.y+1);
      if(!belowIsWall){
        const grad = ctx.createLinearGradient(cellX, cellY+TILE, cellX, cellY+TILE+5);
        grad.addColorStop(0, 'rgba(0,0,0,0.55)');
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(cellX, cellY+TILE, TILE, 5);
      }
    }
  }
  // ── ETG-STYLE PLAYER SHADOW CASTING ──────────────────────────────────────────
  // Wall and column tiles cast directional shadows onto the floor tiles
  // immediately "away from the player" — classic Gungeon grounded-light look.
  {
    const ptx = Math.floor(player.x / TILE);
    const pty = Math.floor(player.y / TILE);
    const shadowRange = 6;
    for(let dy = -shadowRange; dy <= shadowRange; dy++){
      for(let dx = -shadowRange; dx <= shadowRange; dx++){
        const wx = ptx + dx, wy = pty + dy;
        // must be a real in-bounds wall tile
        if(wx < 0 || wy < 0 || wx >= ROOM_W || wy >= ROOM_H) continue;
        if(!isWall(r, wx, wy)) continue;
        const dlen = Math.hypot(dx, dy);
        if(dlen > shadowRange || dlen < 0.5) continue;
        // Direction from player toward wall centre (shadow goes BEYOND wall)
        const wallCx = wx * TILE + TILE * 0.5;
        const wallCy = wy * TILE + TILE * 0.5;
        const dvx = wallCx - player.x, dvy = wallCy - player.y;
        const dvLen = Math.hypot(dvx, dvy) || 1;
        const dnx = dvx / dvLen, dny = dvy / dvLen;
        // Shadow lands on the floor tile immediately beyond the wall
        // in the player→wall direction. Must be in-bounds and not a wall.
        const sfx2 = wx + Math.round(dnx);
        const sfy2 = wy + Math.round(dny);
        if(sfx2 < 0 || sfy2 < 0 || sfx2 >= ROOM_W || sfy2 >= ROOM_H) continue;
        if(isWall(r, sfx2, sfy2)) continue;
        // Alpha fades with distance — strong close, gone at edge of range
        const alpha = Math.max(0, (shadowRange - dlen) / shadowRange) * 0.65;
        const startX = offX + wallCx;
        const startY = offY + wallCy;
        const endX = startX + dnx * TILE * 1.2;
        const endY = startY + dny * TILE * 1.2;
        const sg2 = ctx.createLinearGradient(startX, startY, endX, endY);
        sg2.addColorStop(0,   `rgba(0,0,0,${alpha.toFixed(3)})`);
        sg2.addColorStop(0.6, `rgba(0,0,0,${(alpha*0.4).toFixed(3)})`);
        sg2.addColorStop(1,   'rgba(0,0,0,0)');
        ctx.fillStyle = sg2;
        ctx.fillRect(offX + sfx2 * TILE, offY + sfy2 * TILE, TILE, TILE);
      }
    }
    // Radial falloff — ambient darkness outside the player's lantern radius,
    // reinforcing the "local torch" feel of ETG floors.
    const pgx = offX + player.x;
    const pgy = offY + player.y;
    const lightR = TILE * 5;
    const playerLightGrad = ctx.createRadialGradient(pgx, pgy, TILE*1.2, pgx, pgy, lightR);
    playerLightGrad.addColorStop(0,    'rgba(0,0,0,0)');
    playerLightGrad.addColorStop(0.55, 'rgba(0,0,0,0.10)');
    playerLightGrad.addColorStop(1,    'rgba(0,0,0,0.50)');
    ctx.fillStyle = playerLightGrad;
    ctx.fillRect(offX, offY, ROOM_PX_W, ROOM_PX_H);
  }
  // ─────────────────────────────────────────────────────────────────────────────

  // carpet/rug overlay (drawn over floor, under everything else)
  if(r.carpet && SPR.carpetCenter){
    const c = r.carpet;
    for(let yy=0; yy<c.h; yy++){
      for(let xx=0; xx<c.w; xx++){
        const tx = c.x + xx, ty = c.y + yy;
        if(isWall(r, tx, ty)) continue; // skip walls under irregular shapes
        let spr;
        const left = (xx===0), right = (xx===c.w-1);
        const top = (yy===0), bot = (yy===c.h-1);
        if(top && left) spr = SPR.carpetTL;
        else if(top && right) spr = SPR.carpetTR;
        else if(bot && left) spr = SPR.carpetBL;
        else if(bot && right) spr = SPR.carpetBR;
        else if(top) spr = SPR.carpetTop;
        else if(bot) spr = SPR.carpetBottom;
        else if(left) spr = SPR.carpetLeft;
        else if(right) spr = SPR.carpetRight;
        else spr = SPR.carpetCenter;
        if(spr) ctx.drawImage(spr, offX + tx*TILE, offY + ty*TILE);
      }
    }
  }
  // gungeon-style stone doors at room edges
  const dCx = (ROOM_W-1)/2, dCy = (ROOM_H-1)/2;
  function neighborType(dir){
    let dx=0,dy=0;
    if(dir==='n') dy=-1; else if(dir==='s') dy=1;
    else if(dir==='w') dx=-1; else if(dir==='e') dx=1;
    const nk = (r.x+dx)+','+(r.y+dy);
    return dungeon[nk] ? dungeon[nk].type : null;
  }
  function drawDoor(dir){
    if(!r.doors[dir]) return;
    const nType = neighborType(dir);
    const isBossDoor = (nType === RT.BOSS) && !(dungeon[(r.x+(dir==='e'?1:dir==='w'?-1:0))+','+(r.y+(dir==='s'?1:dir==='n'?-1:0))]?.cleared);
    const horizontal = (dir==='n' || dir==='s');
    let spr;
    if(!r.cleared){
      // sealed in combat
      spr = horizontal? (isBossDoor? SPR.doorBossH : SPR.doorClosedH)
                      : (isBossDoor? SPR.doorBossV : SPR.doorClosedV);
    } else {
      // open
      spr = horizontal ? SPR.doorOpenH : SPR.doorOpenV;
      if(isBossDoor){
        spr = horizontal? SPR.doorBossH : SPR.doorBossV;
      }
    }
    let dx, dy;
    // doorway center in pixels
    const doorwayCx = (Math.floor(dCx) + 0.5) * TILE; // center between the two door tiles
    const doorwayCy = (Math.floor(dCy) + 0.5) * TILE;
    // sprite size depends on boss vs normal
    const sw = isBossDoor ? (horizontal? 48: 28) : (horizontal? 32: 18);
    const sh = isBossDoor ? (horizontal? 28: 48) : (horizontal? 18: 32);
    if(dir==='n'){ dx = offX + doorwayCx - sw/2; dy = offY - (isBossDoor? 6: 1); }
    else if(dir==='s'){ dx = offX + doorwayCx - sw/2; dy = offY + (ROOM_H-1)*TILE - (isBossDoor? sh-TILE-5: 1); }
    else if(dir==='w'){ dx = offX - (isBossDoor? 6: 1); dy = offY + doorwayCy - sh/2; }
    else { dx = offX + (ROOM_W-1)*TILE - (isBossDoor? sw-TILE-5: 1); dy = offY + doorwayCy - sh/2; }
    ctx.drawImage(spr, dx, dy);
    // boss door pulses
    if(isBossDoor){
      const pulse = 0.4 + 0.3*Math.sin(performance.now()/220);
      ctx.fillStyle = `rgba(215,38,61,${pulse*0.35})`;
      ctx.fillRect(dx, dy, sw, sh);
      // outer red glow
      const glow = ctx.createRadialGradient(dx+sw/2, dy+sh/2, 4, dx+sw/2, dy+sh/2, Math.max(sw,sh));
      glow.addColorStop(0, `rgba(255,72,88,${0.18+pulse*0.12})`);
      glow.addColorStop(1, 'rgba(255,72,88,0)');
      ctx.fillStyle = glow;
      ctx.fillRect(dx-12, dy-12, sw+24, sh+24);
    }
  }
  ['n','s','w','e'].forEach(drawDoor);
  // boss-cleared exit door (sector portal)
  if(r.bossExit && !r.bossExit.used){
    const ex = r.bossExit.x, ey = r.bossExit.y;
    const _exitDist = dist(player.x,player.y, ex, ey);
    const pulse = 0.5 + 0.5*Math.sin(performance.now()/300);
    // Always-on outer golden glow around the portal
    const glowA = 0.10 + pulse*0.12;
    ctx.fillStyle = `rgba(255,210,60,${glowA})`;
    ctx.fillRect(offX+ex-22, offY+ey-26, 44, 34);
    // Draw the exit sprite
    ctx.drawImage(SPR.bossExitH, offX+ex-18, offY+ey-22);
    // Centre portal glow (cyan, always pulsing)
    ctx.fillStyle = `rgba(57,192,237,${0.35+pulse*0.35})`;
    ctx.fillRect(offX+ex-2, offY+ey-8, 4, 5);
    if(_exitDist < 48){
      // Bright highlight border when nearby
      ctx.strokeStyle = `rgba(255,220,80,${0.5+pulse*0.5})`;
      ctx.lineWidth = 1.5;
      ctx.strokeRect(offX+ex-19, offY+ey-23, 38, 30);
      ctx.lineWidth = 1;
      // Interact prompt
      drawText('[E] DESCEND TO SECTOR '+(runStats.sector+1), offX+ex, offY+ey-30, true, 5, '#f8d040');
    }
  }

  // props
  for(const p of r.props){
    if(p.broken) continue;
    if(p.type==='torch'){
      ctx.drawImage(SPR.torch[p.frame], offX+p.x, offY+p.y);
      // ETG-style torch glow — large warm amber inner halo + cooler outer wash
      const flicker = 0.88 + Math.sin(performance.now()/90 + p.x)*0.12;
      const gx = offX+p.x+4, gy = offY+p.y+3;
      // inner glow (bright hot amber, flickers)
      const grad = ctx.createRadialGradient(gx, gy, 0, gx, gy, 34*flicker);
      grad.addColorStop(0,   'rgba(255,210,90,0.42)');
      grad.addColorStop(0.30,'rgba(240,160,40,0.28)');
      grad.addColorStop(0.65,'rgba(200,100,20,0.12)');
      grad.addColorStop(1,   'rgba(180,80,10,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(gx-36, gy-28, 72, 66);
      // floor light pool — flattened ellipse below the torch
      const floorGrad = ctx.createRadialGradient(gx, gy+14, 0, gx, gy+14, 26);
      floorGrad.addColorStop(0, 'rgba(255,190,60,0.16)');
      floorGrad.addColorStop(1, 'rgba(255,190,60,0)');
      ctx.fillStyle = floorGrad;
      ctx.fillRect(gx-28, gy+4, 56, 42);
    }
    if(p.type==='barrel'){
      // motion lines while rolling
      if(p.trail && p.trail.length){
        for(const t of p.trail){
          const a = Math.max(0, t.life/0.35);
          ctx.fillStyle = `rgba(255,245,194,${0.18*a})`;
          ctx.fillRect(offX+t.x-2, offY+t.y-1, 4, 2);
          ctx.fillStyle = `rgba(255,200,80,${0.32*a})`;
          ctx.fillRect(offX+t.x-1, offY+t.y, 2, 1);
        }
        // a couple of speed streaks behind
        if(p.rolling > 0){
          ctx.strokeStyle = 'rgba(255,255,255,0.55)';
          ctx.lineWidth = 1;
          const sp = Math.hypot(p.vx, p.vy) || 1;
          const ux = -p.vx/sp, uy = -p.vy/sp;
          for(let s=0;s<3;s++){
            const o = (s-1)*3;
            ctx.beginPath();
            const sx = offX+p.x+p.w/2 + ux*4 + (-uy)*o;
            const sy = offY+p.y+p.h/2 + uy*4 + (ux)*o;
            ctx.moveTo(sx, sy);
            ctx.lineTo(sx + ux*8, sy + uy*8);
            ctx.stroke();
          }
        }
      }
      // directional side-highlight: draw a bright line only on the face nearest the player
      const _bd = dist(player.x, player.y, p.x+p.w/2, p.y+p.h/2);
      if(_bd < 26){
        const _pdx = (player.x+5) - (p.x+p.w/2);
        const _pdy = (player.y+8) - (p.y+p.h/2);
        const bx = offX+p.x, by = offY+p.y, bw = p.w, bh = p.h;
        ctx.save();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.shadowColor = '#ffffff';
        ctx.shadowBlur = 3;
        ctx.beginPath();
        if(Math.abs(_pdx) >= Math.abs(_pdy)){
          // player left/right of barrel
          if(_pdx > 0){ ctx.moveTo(bx+bw, by+2); ctx.lineTo(bx+bw, by+bh-2); }
          else         { ctx.moveTo(bx,    by+2); ctx.lineTo(bx,    by+bh-2); }
        } else {
          // player above/below barrel
          if(_pdy > 0){ ctx.moveTo(bx+2, by+bh); ctx.lineTo(bx+bw-2, by+bh); }
          else         { ctx.moveTo(bx+2, by);    ctx.lineTo(bx+bw-2, by);    }
        }
        ctx.stroke();
        ctx.restore();
      }
      ctx.save();
      if(p.rolling > 0){
        // wobble while rolling
        const wob = Math.sin(performance.now()/45) * 0.08;
        ctx.translate(offX+p.x+p.w/2, offY+p.y+p.h/2);
        ctx.rotate(wob);
        ctx.drawImage(SPR.barrel, -p.w/2, -p.h/2);
      } else {
        ctx.drawImage(SPR.barrel, offX+p.x, offY+p.y);
      }
      ctx.restore();
    }
    if(p.type==='skull')  ctx.drawImage(SPR.skull, offX+p.x, offY+p.y);
    if(p.type==='teleporter'){
      const fr = Math.floor((p.tT||0) * 6) % 3;
      const isReturn = !!p.returnDest;
      // glow colour: cyan for normal warp, purple for return portal
      const glowInner = isReturn ? 'rgba(176,60,255,0.65)' : 'rgba(57,192,237,0.55)';
      const glowOuter = isReturn ? 'rgba(176,60,255,0)'    : 'rgba(57,192,237,0)';
      const sparkCol  = isReturn ? '#b060ff' : '#39c0ed';
      // pulsing glow halo (slightly larger on return portals)
      const gx = offX+p.x+10, gy = offY+p.y+11;
      const glowR2 = isReturn ? 28 : 22;
      const grad = ctx.createRadialGradient(gx, gy, 1, gx, gy, glowR2);
      grad.addColorStop(0, glowInner);
      grad.addColorStop(1, glowOuter);
      ctx.fillStyle = grad;
      ctx.fillRect(offX+p.x-14, offY+p.y-10, 48, 42);
      // for return portals: add a second outer halo ring
      if(isReturn){
        // ETG-style spinning vortex — 4 rotating arc-arms in purple/magenta
        const vt = p.tT || 0;
        ctx.save();
        ctx.translate(gx, gy);
        const arms = 4;
        for(let ai=0; ai<arms; ai++){
          const base = (vt*2.8) + (ai/arms)*Math.PI*2;
          const vg = ctx.createLinearGradient(0,0,Math.cos(base)*20,Math.sin(base)*20);
          vg.addColorStop(0,'rgba(220,80,255,0.60)');
          vg.addColorStop(1,'rgba(120,0,200,0)');
          ctx.beginPath();
          ctx.moveTo(0,0);
          ctx.arc(0,0,18,base-0.55,base+0.25);
          ctx.closePath();
          ctx.fillStyle=vg;
          ctx.fill();
        }
        // inner bright pulsing core
        const corePulse = 0.5+0.5*Math.sin(vt*6);
        const coreG = ctx.createRadialGradient(0,0,0,0,0,7+corePulse*3);
        coreG.addColorStop(0,`rgba(240,200,255,${(0.75+corePulse*0.25).toFixed(2)})`);
        coreG.addColorStop(0.5,'rgba(180,60,255,0.55)');
        coreG.addColorStop(1,'rgba(100,0,200,0)');
        ctx.fillStyle=coreG;
        ctx.beginPath(); ctx.arc(0,0,11,0,Math.PI*2); ctx.fill();
        ctx.restore();
        // outer ambient halo
        const pulse = 0.5 + 0.5*Math.sin(vt*4);
        const grad2 = ctx.createRadialGradient(gx, gy, 10, gx, gy, 34);
        grad2.addColorStop(0, `rgba(176,60,255,${(0.10+0.12*pulse).toFixed(2)})`);
        grad2.addColorStop(1, 'rgba(176,60,255,0)');
        ctx.fillStyle = grad2;
        ctx.fillRect(offX+p.x-20, offY+p.y-16, 60, 54);
      }
      // outline when player nearby
      const _td = dist(player.x, player.y, p.x+10, p.y+11);
      // tint the teleporter sprite purple when in return mode
      if(isReturn){
        ctx.save();
        ctx.globalCompositeOperation = 'source-over';
        ctx.drawImage(SPR.teleporter[fr], offX+p.x, offY+p.y);
        ctx.globalCompositeOperation = 'multiply';
        ctx.fillStyle = 'rgba(180,80,255,0.55)';
        ctx.fillRect(offX+p.x, offY+p.y, 20, 20);
        ctx.restore();
      } else {
        ctx.drawImage(SPR.teleporter[fr], offX+p.x, offY+p.y);
      }
      // upward sparks
      if(Math.random() < (isReturn ? 0.5 : 0.3)){
        spawnPart(p.x+10+rand(-6,6), p.y+6, {vx:rand(-10,10), vy:rand(-35,-14), life:0.55, c:sparkCol, sz:1});
      }
      if(_td < 14){
        const label = isReturn ? '[E] RETURN' : '[E] WARP';
        const labelCol = isReturn ? '#cc88ff' : '#39c0ed';
        drawText(label, offX+p.x+10, offY+p.y-6, true, 5, labelCol);
      }
    }
    if(p.type==='table'){
      let spr;
      if(p.hp<=0) spr = SPR.tableBroken;
      else if(p.flipped){
        spr = (p.flipDir==='down') ? SPR.tableFlipDown
            : (p.flipDir==='left') ? SPR.tableFlipLeft
            : (p.flipDir==='right')? SPR.tableFlipRight
            : SPR.tableFlipUp;
      } else spr = SPR.tableUp;
      // shadow
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.fillRect(offX+p.x+1, offY+p.y+p.h-2, p.w-2, 2);
      ctx.drawImage(spr, offX+p.x, offY+p.y);
      // damage cracks
      if(p.flipped && p.maxHp && p.hp < p.maxHp*0.66 && p.hp>0){
        ctx.fillStyle = '#1a1209';
        ctx.fillRect(offX+p.x + Math.floor(p.w*0.25), offY+p.y + Math.floor(p.h*0.5), 2, 1);
        if(p.hp < p.maxHp*0.33){
          ctx.fillRect(offX+p.x + Math.floor(p.w*0.6), offY+p.y + Math.floor(p.h*0.4), 1, 2);
          ctx.fillRect(offX+p.x + Math.floor(p.w*0.45), offY+p.y + Math.floor(p.h*0.65), 2, 1);
        }
      }
      // hint
      if(!p.flipped && p.hp>0 && dist(player.x,player.y, p.x+p.w/2, p.y+p.h/2)<22){
        drawText('[F] FLIP', offX+p.x+p.w/2, offY+p.y-6, true, 5, '#f0b429');
      }
    }
    if(p.type==='chest'){
      const _cd = dist(player.x, player.y, p.x+7, p.y+6);
      const tier = p.tier || 'brown';
      const tierCol = {brown:'#c8a060',blue:'#3090d0',green:'#29c46d',red:'#d7263d',black:'#9040d0',rainbow:'#f0b429'}[tier]||'#fff';
      const csp = p.opened
        ? (SPR['chest_'+tier+'_open'] || SPR.chestOpen)
        : (SPR['chest_'+tier] || SPR.chest);
      if(!p.opened && _cd < 14){
        // Outline drawn BEHIND the chest so the sprite covers the interior —
        // only the 1px silhouette border shows, no white-wash effect.
        drawSpriteOutline(csp, offX+p.x, offY+p.y, '#fff');
      }
      ctx.drawImage(csp, offX+p.x, offY+p.y);
      if(!p.opened && _cd < 14){
        const chestLabel = p.isCache ? '[E] OPEN CACHE' : (player.keys>0 ? '[E] OPEN' : '[E] NEED KEY');
        const chestLabelColor = p.isCache ? '#f0b429' : (player.keys>0 ? '#f0b429' : '#d7263d');
        drawText(chestLabel, offX+p.x+7, offY+p.y-8, true, 5, chestLabelColor);
      }
    }
    if(p.type==='shopkeep'){
      const _sd = dist(player.x, player.y, p.x+7, p.y+18);
      ctx.drawImage(SPR.shopkeeper, offX+p.x, offY+p.y);
    }
    if(p.type==='pedestal'){
      // outline glow when player near interactable pedestal
      const _pd = dist(player.x, player.y, p.x+7, p.y+6);
      if(_pd < 26){
        ctx.fillStyle = '#fff';
        ctx.fillRect(offX+p.x-1, offY+p.y, 1, 12);
        ctx.fillRect(offX+p.x+14, offY+p.y, 1, 12);
        ctx.fillRect(offX+p.x, offY+p.y-1, 14, 1);
        ctx.fillRect(offX+p.x, offY+p.y+12, 14, 1);
      }
      ctx.fillStyle='#444'; ctx.fillRect(offX+p.x, offY+p.y, 14, 12);
      ctx.fillStyle='#222'; ctx.fillRect(offX+p.x, offY+p.y+10, 14, 2);
      ctx.fillStyle='#f0b429'; ctx.fillRect(offX+p.x+5, offY+p.y-4, 4, 4);
      // hint
      if(p.label && _pd<22){
        drawText('[E] '+p.label, offX+p.x+7, offY+p.y-10, true, 5, '#f0b429');
      }
    }
  }

  // shop pedestals
  if(r.type===RT.SHOP){
    for(const it of r.shopItems){
      ctx.fillStyle='#222'; ctx.fillRect(offX+it.x-8, offY+it.y, 16, 4);
      // icon
      let spr=null, label='';
      if(it.kind==='heart'){ spr = SPR.heartPickup; label='+2 HP (full heart)  '+it.cost+'$'; }
      if(it.kind==='weapon'){ spr = SPR[WEAPON_BY_ID[it.wid].sprite]; label = WEAPON_BY_ID[it.wid].name+'  '+it.cost+'$'; }
      if(it.kind==='aug'){ spr = SPR.ammoBox; label = AUGMENT_BY_ID[it.aid].name+'  '+it.cost+'$'; }
      if(spr) ctx.drawImage(spr, offX+it.x-spr.width/2, offY+it.y-spr.height-2);
      if(it.bought){
        drawText('SOLD', offX+it.x, offY+it.y-14, true, 5, '#666');
      } else {
        drawText('[E] OPEN SHOP', offX+ROOM_PX_W/2, offY+ROOM_PX_H/2-26, true, 5, '#f0b429');
      }
    }
  }
  if(r.type===RT.AUG && !r.augTaken){
    drawText('STEP NEAR PEDESTAL', offX+ROOM_PX_W/2, offY+ROOM_PX_H/2-22, true, 5, '#f0b429');
  }
  if(r.type===RT.CHEST){
    const ch = r.props.find(p=>p.type==='chest');
    if(ch && !ch.opened){
      const cl = player.keys>0 ? '[E] OPEN' : '[E] NEED KEY';
      const cc = player.keys>0 ? '#f0b429' : '#d7263d';
      drawText(cl, offX+ch.x+7, offY+ch.y-6, true, 5, cc);
    }
  }
  // hub door label
  if(r.type===RT.START && state===STATE.HUB){
    const dy = (ROOM_H-1)/2*TILE+TILE/2;
    drawText('→ DEPLOY', offX + (ROOM_W-2)*TILE, offY + dy - 12, true, 5, '#f0b429');
  }

  // pickups
  for(const p of pickups){
    if(p.kind === 'weapon'){
      // Floor-dropped gun: bobbing weapon sprite with a colored glow halo so
      // the player can spot it across the room.
      const wpn = WEAPON_BY_ID[p.wid];
      if(wpn){
        const wspr = SPR[wpn.sprite];
        const bob = Math.sin((p.pulseT||0)*4)*1.5;
        const px = Math.floor(offX + p.x);
        const py = Math.floor(offY + p.y + bob);
        const rarityCol = RARITY_COLOR[wpn.rarity] || '#fff8d8';
        // glowing halo — use rarity color instead of weapon color for instant rarity read
        const hex = rarityCol.replace('#','');
        const hr = parseInt(hex.length===3?hex[0]+hex[0]:hex.substr(0,2),16);
        const hg = parseInt(hex.length===3?hex[1]+hex[1]:hex.substr(2,2),16);
        const hb = parseInt(hex.length===3?hex[2]+hex[2]:hex.substr(4,2),16);
        const pulse = 0.55 + 0.25*Math.sin((p.pulseT||0)*5);
        const haloR = 13;
        const grd = ctx.createRadialGradient(px, py+1, 1, px, py+1, haloR);
        grd.addColorStop(0, `rgba(${hr},${hg},${hb},${(0.60*pulse).toFixed(3)})`);
        grd.addColorStop(1, `rgba(${hr},${hg},${hb},0)`);
        ctx.fillStyle = grd;
        ctx.beginPath(); ctx.arc(px, py+1, haloR, 0, TAU); ctx.fill();
        // ground shadow
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.beginPath(); ctx.ellipse(px, py+5, 6, 2, 0, 0, TAU); ctx.fill();
        const wDist = dist(p.x, p.y, player.x, player.y);
        // rarity-colored outline when player is within pickup range
        if(wDist < 12 && wspr){
          drawSpriteOutline(wspr, px - Math.floor(wspr.width/2), py - Math.floor(wspr.height/2), rarityCol);
        }
        // weapon sprite (or fallback star)
        if(wspr){
          ctx.drawImage(wspr, px - Math.floor(wspr.width/2), py - Math.floor(wspr.height/2));
        } else {
          ctx.fillStyle = wpn.color;
          ctx.fillRect(px-3, py-1, 6, 3);
        }
        // [E] pick up / swap prompt when close
        if(wDist < 12){
          const promptTxt = (player.weapon2) ? '[E] SWAP' : '[E] PICK UP';
          drawText(promptTxt, px, py - 10, true, 5, '#f0b429');
        } else {
          // distant sparkle hint
          const sparkle = Math.sin((p.pulseT||0)*6) > 0;
          if(sparkle){
            ctx.fillStyle = '#fff8d8';
            ctx.fillRect(px, py-9, 1, 3);
            ctx.fillRect(px, py-5, 1, 1);
          }
        }
      }
      continue;
    }
    let spr = null;
    if(p.kind==='coin') spr = SPR.coin[Math.floor(performance.now()/75 + p.x*0.37)%4];
    if(p.kind==='heart') spr = (p.amt===1 ? SPR.halfHeartPickup : SPR.heartPickup);
    if(p.kind==='ammo') spr = SPR.ammoBox;
    if(p.kind==='key') spr = SPR.key;
    if(spr){
      const bob = Math.sin(performance.now()/200 + p.x)*1;
      const dx = Math.floor(offX+p.x-spr.width/2);
      const dy = Math.floor(offY+p.y-spr.height/2+bob);
      // noAutoPickup heart items get a white ETG-style interact outline
      if(p.noAutoPickup && p.kind==='heart'){
        const pd = dist(p.x, p.y, player.x, player.y);
        if(pd < 22){
          ctx.fillStyle = '#fff';
          ctx.fillRect(dx-1, dy-1, spr.width+2, 1);
          ctx.fillRect(dx-1, dy+spr.height, spr.width+2, 1);
          ctx.fillRect(dx-1, dy-1, 1, spr.height+2);
          ctx.fillRect(dx+spr.width, dy-1, 1, spr.height+2);
          drawText('[E] +½HP', Math.floor(offX+p.x), dy-8, true, 5, '#ff88aa');
        }
      }
      ctx.drawImage(spr, dx, dy);
    }
  }

  // corpses (drawn beneath living entities and player)
  for(const c of corpses){
    if(c.roomKey !== curRoomKey) continue;
    const t = c.life / c.max;
    ctx.globalAlpha = clamp(t*1.5, 0.15, 1);
    let spr = SPR.corpses[c.kind] || SPR.corpses.slimeG;
    ctx.drawImage(spr, Math.floor(offX+c.x-spr.width/2), Math.floor(offY+c.y-spr.height/2));
    ctx.globalAlpha = 1;
  }

  // entities
  if(r.entities){
    for(const e of r.entities){
      drawEnemy(e, offX, offY);
    }
  }

  // player roll trail (smoke ghosts)
  if(player.dashT>0){
    const ghosts = 3;
    for(let i=0;i<ghosts;i++){
      ctx.globalAlpha = 0.15 + i*0.1;
      const gx = Math.floor(offX+player.x-7 - player.vx*0.02*(i+1));
      const gy = Math.floor(offY+player.y-7 - player.vy*0.02*(i+1));
      ctx.drawImage(SPR.playerRoll, gx, gy);
    }
    ctx.globalAlpha = 1;
  }
  // player sprite (4 walking frames; spin during roll) — uses selected character
  const moving = (Math.abs(player.vx)+Math.abs(player.vy)) > 5;
  const pf = moving ? (Math.floor(player.walkT*8)%4) : 0;
  const charSpr = (SPR.chars && SPR.chars[player.charId]) ? SPR.chars[player.charId] : SPR.player;
  const psp = charSpr[pf];
  if(player.cloakT && player.cloakT>0){ ctx.globalAlpha = 0.35; }
  ctx.save();
  if(player.invul>0 && Math.floor(player.invul*30)%2===0) ctx.globalAlpha = 0.5;
  // bob slightly while walking
  const bob = moving ? (Math.floor(performance.now()/120)%2===0 ? 0 : -1) : 0;
  // ETG-style warm rim light — a torch-amber silhouette offset 1px up-left
  // gives the chibi character that iconic "lit from the dungeon" look.
  if(!(player.cloakT && player.cloakT>0)){
    const rimA = 0.28 + 0.07 * Math.sin(performance.now()/400);
    ctx.globalAlpha = rimA;
    const px0 = Math.floor(offX+player.x-psp.width/2);
    const py0 = Math.floor(offY+player.y-psp.height/2)+bob;
    // offset 1px up-left regardless of facing — rim light is ambient
    drawSpriteTinted(psp, px0-1, py0-1, '#f0b429');
    ctx.globalAlpha = player.invul>0 && Math.floor(player.invul*30)%2===0 ? 0.5 : 1;
  }
  if(player.dashT>0){
    // spin during roll
    const rollAng = (1 - player.dashT/0.18) * Math.PI*2 * Math.sign(player.vx||1);
    ctx.translate(Math.floor(offX+player.x), Math.floor(offY+player.y)+bob);
    ctx.rotate(rollAng);
    ctx.drawImage(psp, -psp.width/2, -psp.height/2);
  } else if(player.facing<0){
    ctx.scale(-1,1);
    ctx.drawImage(psp, -(Math.floor(offX+player.x)+psp.width/2), Math.floor(offY+player.y-psp.height/2)+bob);
  } else {
    ctx.drawImage(psp, Math.floor(offX+player.x-psp.width/2), Math.floor(offY+player.y-psp.height/2)+bob);
  }
  ctx.restore();

  // weapon held (skip during roll)
  const w = WEAPON_BY_ID[player.weapon];
  const wspr = SPR[w.sprite];
  const ang = Math.atan2(player.aimy - player.y, player.aimx - player.x);
  if(player.dashT<=0){
    ctx.save();
    // gun pivots from a point on the body chest
    const gx0 = Math.floor(offX+player.x);
    const gy0 = Math.floor(offY+player.y) - 1;
    ctx.translate(gx0, gy0);
    ctx.rotate(ang);
    if(player.aimx < player.x){ ctx.scale(1,-1); }
    // gun arm offset forward from pivot
    ctx.globalCompositeOperation = 'source-over';
    drawSpriteOutline(wspr, 3, -wspr.height/2, '#000');
    ctx.drawImage(wspr, 3, -wspr.height/2);
    // muzzle flash while firing
    if(player.muzzleT && player.muzzleT > 0){
      const mf = SPR.muzzle[(Math.floor(performance.now()/40)%2)];
      ctx.drawImage(mf, 3 + wspr.width - 1, -mf.height/2);
    }
    ctx.restore();
  }

  // ── COLUMN DEPTH OVERLAY — draw interior column tiles ON TOP of player ──────
  // This makes the player visually pass behind pillars when they walk north of
  // them, adding real depth to the dungeon interior.
  if(r.extraWalls){
    for(const w of r.extraWalls){
      ctx.drawImage(tile.wallCorner || tile.wallSide || tile.wall, offX + w.x*TILE, offY + w.y*TILE);
    }
  }

  // bullets — pixel-art sprites rotated to direction (gungeon-flavored)
  for(const b of bullets){
    let spr = null;
    if(b.type==='rail'){
      ctx.fillStyle = b.color || '#39c0ed';
      ctx.fillRect(Math.floor(offX+b.x-3), Math.floor(offY+b.y-1), 6, 2);
      ctx.fillStyle = '#fff';
      ctx.fillRect(Math.floor(offX+b.x-2), Math.floor(offY+b.y), 4, 1);
      continue;
    }
    if(b.type==='rocket'){ spr = SPR.bulletRocket; }
    else if(b.type==='shotgun' || b.type==='pierce'){
      if(b.iceBullet) spr = SPR.bulletIce;
      else if(b.wid==='crossbow') spr = SPR.bulletBolt;
      else spr = b.friendly? SPR.bulletShell : SPR.bulletEnemy;
    }
    else if(b.type==='energy' || b.type==='chain') spr = SPR.bulletEnergy;
    else if(b.type==='mortar') spr = SPR.bulletMortar;
    else if(b.type==='spore') spr = SPR.bulletCult;
    else if(b.type==='flame') spr = SPR.bulletFlame;
    else if(b.type==='grenade') spr = SPR.bulletGrenade;
    else if(b.type==='plasma') spr = SPR.bulletPlasma;
    else if(b.type==='acid') spr = SPR.bulletAcid;
    else if(b.friendly){
      // Per-weapon bullet sprites — only the pistol fires glowing red balls
      if(b.wid==='pistol')    spr = SPR.bulletStd;        // glowing red
      else if(b.wid==='smg')  spr = SPR.bulletSMG;        // cyan spark
      else if(b.wid==='shot') spr = SPR.bulletShot;       // fat lead pellet
      else if(b.wid==='rifle')spr = SPR.bulletRifle;      // brass rifle round
      else if(b.wid==='crossbow') spr = SPR.bulletBolt;   // wooden bolt
      else                    spr = SPR.bulletShell;       // yellow casing fallback
    }
    else spr = SPR.bulletEnemy;
    if(b.color === '#5b2a8c' || b.bossBullet) spr = SPR.bulletCult;
    const ang = Math.atan2(b.vy, b.vx);
    ctx.save();
    ctx.translate(Math.floor(offX+b.x), Math.floor(offY+b.y));
    ctx.rotate(ang);
    ctx.drawImage(spr, -spr.width/2, -spr.height/2);
    ctx.restore();
    if(b.type==='rocket' && Math.random()<0.7){
      spawnPart(b.x-b.vx*0.02, b.y-b.vy*0.02, {vx:rand(-10,10),vy:rand(-10,10),life:0.4,c:'#444',sz:2,fric:0.95});
    }
    if(b.type==='spore' && Math.random()<0.5){
      spawnPart(b.x, b.y, {vx:rand(-8,8),vy:rand(-8,8),life:0.3,c:'#7e3eb0',sz:1});
    }
  }

  // particles
  for(const p of particles){
    const a = clamp(p.life/p.max, 0, 1);
    ctx.globalAlpha = a;
    ctx.fillStyle = p.c;
    ctx.fillRect(Math.floor(offX+p.x), Math.floor(offY+p.y), p.sz, p.sz);
  }
  ctx.globalAlpha = 1;

  // damage numbers
  for(const d of damageNumbers){
    drawText(String(d.n), offX+d.x, offY+d.y, true, 5, d.c);
  }

  // end zoomed/world-space rendering — crosshair, banners, vignette in screen coords
  ctx.restore();

  // ── ETG-STYLE AMBIENT OCCLUSION + LIGHT RAY PASS ──────────────────────────
  // This runs in SCREEN SPACE (after ctx.restore) so all coordinates must be
  // in display pixels. offX/offY are still valid because they were captured
  // before the save/restore pair.
  {
    const z = cam.zoom;
    // screen-space room bounds
    const rsx = (offX * z)|0, rsy = (offY * z)|0;
    const rsw = (ROOM_PX_W * z)|0, rsh = (ROOM_PX_H * z)|0;
    // — Corner ambient occlusion: 4 radial gradients from each room corner.
    // Outer corners of rooms are darkest; gradient fades into the lit interior.
    // Alpha is kept modest (0.20–0.26) so the room never looks oppressively dark.
    const cornerR = rsw * 0.52;
    for(const [cx,cy] of [[rsx,rsy],[rsx+rsw,rsy],[rsx,rsy+rsh],[rsx+rsw,rsy+rsh]]){
      const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, cornerR);
      cg.addColorStop(0,   'rgba(0,0,0,0.22)');
      cg.addColorStop(0.35,'rgba(0,0,0,0.10)');
      cg.addColorStop(0.65,'rgba(0,0,0,0.02)');
      cg.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = cg;
      ctx.fillRect(rsx, rsy, rsw, rsh);
    }
    // — Global room vignette: edges slightly darker than center (not black).
    const rCx = rsx + rsw/2, rCy = rsy + rsh/2;
    const vigR = Math.max(rsw, rsh) * 0.62;
    const vg = ctx.createRadialGradient(rCx, rCy, vigR*0.18, rCx, rCy, vigR);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(0,0,0,0.20)');
    ctx.fillStyle = vg;
    ctx.fillRect(rsx, rsy, rsw, rsh);
    // — Screen-space torch light rays: for each torch, punch a warm light
    // circle through the AO so bright pools of light stay vivid.
    // Uses 'lighter' compositing for an additive "light emission" effect.
    const prevOp = ctx.globalCompositeOperation;
    ctx.globalCompositeOperation = 'lighter';
    for(const p of r.props){
      if(p.type !== 'torch') continue;
      const flicker = 0.85 + Math.sin(performance.now()/110 + p.x * 0.7) * 0.15;
      const tgx = ((offX + p.x + 4) * z)|0;
      const tgy = ((offY + p.y + 3) * z)|0;
      const tgr = (38 * z * flicker)|0;
      const tg = ctx.createRadialGradient(tgx, tgy, 0, tgx, tgy, tgr);
      tg.addColorStop(0,   'rgba(80,50,8,0.16)');
      tg.addColorStop(0.4, 'rgba(60,36,4,0.09)');
      tg.addColorStop(1,   'rgba(30,16,2,0)');
      ctx.fillStyle = tg;
      ctx.fillRect(tgx - tgr, tgy - tgr, tgr*2, tgr*2);
    }
    ctx.globalCompositeOperation = prevOp;
  }
  // ────────────────────────────────────────────────────────────────────────────

  // crosshair (only during RUN, not HUB)
  if(state === STATE.RUN && SPR.crosshair){
    const cx = Math.floor(mouse.x), cy = Math.floor(mouse.y);
    ctx.drawImage(SPR.crosshair, cx-5, cy-5);
  }

  // banners
  if(banners.length){
    const b = banners[0];
    const a = b.dur > b.max - 0.4 ? (b.max - b.dur)/0.4 : (b.dur < 0.4 ? b.dur/0.4 : 1);
    ctx.globalAlpha = a;
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 18, W, 26);
    ctx.fillStyle = '#d7263d';
    ctx.fillRect(0, 18, W, 1);
    ctx.fillRect(0, 43, W, 1);
    drawText(b.text, W/2, 28, true, 9, '#fff');
    if(b.sub) drawText(b.sub, W/2, 39, true, 5, '#aaa');
    ctx.globalAlpha = 1;
  }

  // ── ETG-STYLE OFF-SCREEN ENEMY ARROWS ────────────────────────────────────
  if(state === STATE.RUN){
    const r = curRoom();
    const z = cam.zoom;
    const HUD_TOP = 18, HUD_BOT = H - 26;
    const PAD = 12;
    const plsx = (offX + player.x) * z;
    const plsy = (offY + player.y) * z;
    const scx = W / 2, scy = (HUD_TOP + HUD_BOT) / 2;
    const halfW = W / 2 - PAD, halfH = (HUD_BOT - HUD_TOP) / 2 - PAD;
    for(const e of (r.entities || [])){
      const esx = (offX + e.x) * z;
      const esy = (offY + e.y) * z;
      if(esx >= PAD && esx <= W - PAD && esy >= HUD_TOP + PAD && esy <= HUD_BOT - PAD) continue;
      const ang = Math.atan2(esy - plsy, esx - plsx);
      const cos = Math.cos(ang), sin = Math.sin(ang);
      const tX = halfW / (Math.abs(cos) || 0.0001);
      const tY = halfH / (Math.abs(sin) || 0.0001);
      const t = Math.min(tX, tY);
      const ax = Math.max(PAD, Math.min(W - PAD, scx + cos * t));
      const ay = Math.max(HUD_TOP + PAD, Math.min(HUD_BOT - PAD, scy + sin * t));
      const pulse = 0.78 + Math.sin(performance.now() / 220 + e.x * 0.3) * 0.22;
      ctx.save();
      ctx.translate(ax, ay);
      ctx.rotate(ang);
      ctx.globalAlpha = pulse;
      ctx.fillStyle = e.isBoss ? '#d7263d' : '#e05020';
      ctx.beginPath();
      ctx.moveTo(8, 0);
      ctx.lineTo(-5, -4);
      ctx.lineTo(-5, 4);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.55)';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  // vignette / low health
  if(player.hp <= 2){
    const a = (Math.sin(performance.now()/180)+1)/2 * 0.25 + 0.1;
    ctx.fillStyle = `rgba(215,38,61,${a})`;
    ctx.fillRect(0,0,W,H);
  }
}

function drawEnemy(e, offX, offY){
  const fr = Math.floor(e.anim*4)%2;
  let spr = null;
  if(e.type==='slimeG') spr = SPR.slimeG[fr];
  if(e.type==='slimeR') spr = SPR.slimeR[fr];
  if(e.type==='slimeB') spr = SPR.slimeB[fr];
  if(e.type==='bat') spr = SPR.bat[fr];
  if(e.type==='eye') spr = SPR.eye[fr];
  if(e.type==='skel') spr = SPR.skel[fr];
  if(e.type==='veteran') spr = SPR.veteran[fr];
  if(e.type==='tank') spr = SPR.tank[fr];
  if(e.type==='shroom') spr = SPR.shroom[fr];
  if(e.type==='bigShroom') spr = SPR.bigShroom[fr];
  if(e.type==='drone') spr = SPR.drone[fr];
  if(e.type==='charger') spr = SPR.charger[fr];
  if(e.type==='mage') spr = SPR.mage[fr];
  if(e.type==='boss') spr = SPR.boss[fr];
  if(e.type==='bossTwin') spr = SPR.bossTwin[fr];
  if(e.type==='bossTread') spr = SPR.bossTread[fr];
  if(e.type==='bossMine') spr = SPR.bossMine[fr];
  if(e.type==='bossLich') spr = SPR.bossLich[fr];
  if(e.type==='bossBlobu') spr = SPR.bossBlobu[fr];
  if(e.type==='bossDuke') spr = SPR.bossDuke[fr];
  if(e.type==='bossKraken') spr = SPR.bossKraken[fr];
  if(!spr) return;
  // Multi-angle facing: mirror sprite horizontally toward the player.
  const facingLeft = (player.x < e.x);
  const dxs = Math.floor(offX + e.x - spr.width/2);
  const dys = Math.floor(offY + e.y - spr.height/2);
  // ETG warm rim light on enemies (same torch-amber ambient as player)
  if(e.hit <= 0){
    const rimA = 0.22 + 0.06 * Math.sin(performance.now()/380 + e.x * 0.5);
    ctx.globalAlpha = rimA;
    drawSpriteTinted(spr, dxs-1, dys-1, '#f0b429');
    ctx.globalAlpha = 1;
  }
  ctx.save();
  if(e.hit>0){
    ctx.globalAlpha = 1;
    if(facingLeft){
      ctx.translate(dxs + spr.width, dys);
      ctx.scale(-1, 1);
      drawSpriteTinted(spr, 0, 0, '#fff');
    } else {
      drawSpriteTinted(spr, dxs, dys, '#fff');
    }
  } else {
    if(facingLeft){
      ctx.translate(dxs + spr.width, dys);
      ctx.scale(-1, 1);
      ctx.drawImage(spr, 0, 0);
    } else {
      ctx.drawImage(spr, dxs, dys);
    }
  }
  ctx.restore();
  // Visible gun overlay — small pixel firearm that rotates toward the player,
  // inspired by Gungeon's bullet kin holding their weapons. Skip for slime/bat/charger/blob bosses.
  if(SPR.enemyGun){
    const noGun = (e.type==='bat' || e.type==='charger' || e.type==='shroom' || e.type==='bigShroom' || e.type==='bossBlobu' || e.type==='bossTread' || e.type==='bossMine');
    if(!noGun){
      const gx = Math.floor(offX + e.x);
      const gy = Math.floor(offY + e.y + (spr.height*0.10));
      const gunAng = Math.atan2(player.y - e.y, player.x - e.x);
      let gunSpr = SPR.enemyGun.pistol;
      if(e.type==='slimeR' || e.type==='slimeB') gunSpr = SPR.enemyGun.shotgun;
      else if(e.type==='veteran' || e.type==='bossTwin') gunSpr = SPR.enemyGun.rifle;
      else if(e.type==='tank') gunSpr = SPR.enemyGun.cannon;
      else if(e.type==='mage' || e.type==='eye') gunSpr = SPR.enemyGun.staff;
      else if(e.type==='bossLich') gunSpr = SPR.enemyGun.dualGold;
      else if(e.type==='boss') gunSpr = SPR.enemyGun.cannon;
      ctx.save();
      ctx.translate(gx, gy);
      ctx.rotate(gunAng);
      // flip vertically when aiming left so the gun stays right-side-up
      const flipY = (Math.abs(gunAng) > Math.PI/2) ? -1 : 1;
      ctx.scale(1, flipY);
      drawSpriteOutline(gunSpr, 2, -Math.floor(gunSpr.height/2), '#000');
      ctx.drawImage(gunSpr, 2, -Math.floor(gunSpr.height/2));
      ctx.restore();
    }
  }
  // hp bar — only show for bosses (regular enemies stay clean like Gungeon)
  if(e.isBoss && e.hp < e.maxHp){
    const w = 60;
    const x = Math.floor(offX+e.x - w/2);
    const y = Math.floor(offY+e.y - spr.height/2 - 4);
    ctx.fillStyle='#000'; ctx.fillRect(x,y,w,2);
    ctx.fillStyle = '#d7263d';
    ctx.fillRect(x,y, Math.floor(w*e.hp/e.maxHp), 2);
  }
}

function drawSpriteTinted(spr, x, y, color){
  // draw tinted version (used for hit flash)
  const c = document.createElement('canvas');
  c.width = spr.width; c.height = spr.height;
  const cx = c.getContext('2d');
  cx.drawImage(spr, 0, 0);
  cx.globalCompositeOperation = 'source-in';
  cx.fillStyle = color;
  cx.fillRect(0,0,spr.width,spr.height);
  ctx.drawImage(c, x, y);
}

// draw a white outline around a sprite by stamping a tinted copy in 4 directions
const _outlineCache = new Map();
function drawSpriteOutline(spr, x, y, color){
  color = color || '#fff';
  // Cache per-sprite-canvas by attaching a map directly to the sprite element
  if(!spr._outlineMasks) spr._outlineMasks = {};
  let mask = spr._outlineMasks[color];
  if(!mask){
    mask = document.createElement('canvas');
    mask.width = spr.width; mask.height = spr.height;
    const mx = mask.getContext('2d');
    mx.imageSmoothingEnabled = false;
    mx.drawImage(spr, 0, 0);
    mx.globalCompositeOperation = 'source-in';
    mx.fillStyle = color;
    mx.fillRect(0,0,spr.width,spr.height);
    spr._outlineMasks[color] = mask;
  }
  // 8-direction sampling gives a clean shape-following outline with no corner gaps
  ctx.drawImage(mask, x-1, y);   ctx.drawImage(mask, x+1, y);
  ctx.drawImage(mask, x, y-1);   ctx.drawImage(mask, x, y+1);
  ctx.drawImage(mask, x-1, y-1); ctx.drawImage(mask, x+1, y-1);
  ctx.drawImage(mask, x-1, y+1); ctx.drawImage(mask, x+1, y+1);
}

/* ---------- HUD ---------- */
function renderHUD(){
  // No opaque background bar — HUD elements float directly over the game world

  // ── HEARTS ── two upright bullets rotated into a V/♥ shape per heart
  // VANGLE=0.52 (≈30°): steeper lean → classic ETG heart silhouette
  // Tips spread 8 px apart at top; bases converge at centre-bottom.
  const VANGLE = 0.82;
  const maxHearts = Math.ceil(player.maxHp / 2);
  for(let i=0; i<maxHearts; i++){
    const hx = 3 + i * 20;   // 20 px step → hearts sit close/overlapping
    const hy = 4;
    const hpLeft = player.hp - i * 2;
    const lSpr = hpLeft >= 1 ? SPR.heartFull : SPR.heartEmpty;
    const rSpr = hpLeft >= 2 ? SPR.heartFull : SPR.heartEmpty;

    // Left bullet: tip at top-left corner, rotated CCW so base swings right
    ctx.save();
    ctx.imageSmoothingEnabled = false;
    ctx.translate(hx + 5, hy);
    ctx.rotate(-VANGLE);
    ctx.drawImage(lSpr, -8, -5);
    ctx.restore();

    // Right bullet: tip at top-right corner, rotated CW so base swings left
    ctx.save();
    ctx.imageSmoothingEnabled = false;
    ctx.translate(hx + 11, hy);
    ctx.rotate(+VANGLE);
    ctx.drawImage(rSpr, -3, 0);
    ctx.restore();
  }

  // ── BLANKS ── (row 2 — ETG blank style, drawn SLANTED ~32° for that tilted look)
  const blankRowY = 17;
  ctx.imageSmoothingEnabled = false;
  for(let i=0; i<(player.maxBlanks||3); i++){
    const bx = 4 + i*13, by = blankRowY + 4;
    ctx.save();
    ctx.imageSmoothingEnabled = false;
    ctx.translate(bx, by);
    ctx.rotate(Math.PI * 0.18);  // ~32° slant — clearly diagonal, not fully ×
    if(i < player.blanks){
      ctx.drawImage(SPR.blank, -4, -4);
    } else {
      ctx.globalAlpha = 0.28;
      ctx.drawImage(SPR.blank, -4, -4);
      ctx.globalAlpha = 1;
    }
    ctx.restore();
  }
  drawText('[B]', 4 + (player.maxBlanks||3)*13 + 2, blankRowY+2, false, 5, '#1a3a5a');

  // ── KEYS & CURRENCY ── row 3 — directly below the blanks row
  const hudRow3Y = blankRowY + 13;   // blanks are 11px tall → start row3 just below
  // Key icon + count
  ctx.drawImage(SPR.key, 3, hudRow3Y + 1);
  drawText(String(player.keys), 3+14+2, hudRow3Y+1, false, 5, '#e8c060');
  // Casing icon + credit count
  const coinHudX = 3 + 14 + 2 + 14 + 4;
  ctx.drawImage(SPR.coin[0], coinHudX, hudRow3Y - 1);
  drawText(String(player.credits), coinHudX+8, hudRow3Y+1, false, 5, '#f0b429');

  // ── AMMO PIPS ── right side, well below minimap; count label sits bottom-LEFT next to pips
  {
    const _mag  = Math.max(1, player.mag|0);
    const _ammo = clamp(player.ammo|0, 0, _mag);
    const pH=5, pW=3, pGap=1;
    // Start 18px below minimap bottom for clear separation
    const _lay = getMinimapLayout();
    const pipTopY = _lay ? (_lay.oy + _lay.h + 18) : 60;
    const maxPipH = H - 30 - pipTopY;
    const perCol  = Math.max(1, Math.floor(Math.max(20, maxPipH)/(pH+pGap)));
    const numCols = Math.ceil(_mag/perCol);
    const colStep = pW+4;
    const aRight  = W-4;
    for(let i=0;i<_mag;i++){
      const col=Math.floor(i/perCol), row=i%perCol;
      const px=aRight-(numCols-1-col)*colStep;
      const py=pipTopY+row*(pH+pGap);
      if(i<_ammo){
        ctx.fillStyle=player.reloading?'#f0b429':'#cfd2d6';
        ctx.fillRect(px,py,pW,1);
        ctx.fillStyle='#f0c84a';
        ctx.fillRect(px,py+1,pW,pH-1);
      } else {
        ctx.fillStyle='#1a1209';
        ctx.fillRect(px,py,pW,pH);
      }
    }
    // Label: bottom-LEFT of the pip cluster, same row as last pip, not overlapping
    const pipClusterLeft = aRight - (numCols-1)*colStep - pW;
    const labelY = pipTopY + (perCol-1)*(pH+pGap) + pH;
    const ammoColor = player.reloading?'#f0b429':(_ammo===0?'#d7263d':'#39c0ed');
    drawText(_ammo+'/'+_mag, pipClusterLeft, labelY+2, false, 5, ammoColor, 'left');
  }

  // ── ETG-STYLE BOTTOM WEAPON PANEL ─────────────────────────────────────────
  ctx.fillStyle = 'rgba(6,5,4,0.92)';
  ctx.fillRect(0, H-26, W, 26);
  ctx.fillStyle = '#3a2818';
  ctx.fillRect(0, H-26, W, 1);
  ctx.fillStyle = '#2a1e10';
  ctx.fillRect(0, H-25, W, 1);

  const w = WEAPON_BY_ID[player.weapon];
  // Gun icon chip on the far left
  const gspr = SPR[w.sprite];
  if(gspr){
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.fillRect(2, H-24, gspr.width+6, 22);
    drawSpriteOutline(gspr, 4, H-24 + Math.floor((22-gspr.height)/2), '#000');
    ctx.drawImage(gspr, 4, H-24 + Math.floor((22-gspr.height)/2));
  }
  const gunNameX = gspr ? gspr.width + 10 : 6;
  drawText(w.name, gunNameX, H-21, false, 6, '#fff5e0');
  // Reload indicator (ammo pips moved to top-right HUD)
  if(player.reloading){
    const reloadX = gunNameX;
    drawText('RELOAD', reloadX, H-13, false, 6, '#f0b429');
    const fr = (WEAPON_BY_ID[player.weapon].reload - player.reloadT)/WEAPON_BY_ID[player.weapon].reload;
    ctx.fillStyle='#1a1a1a'; ctx.fillRect(reloadX, H-7, 50, 3);
    ctx.fillStyle='#f0b429'; ctx.fillRect(reloadX, H-7, Math.floor(50*fr), 3);
  }
  // STOWED WEAPON SLOT — small icon + name to the LEFT of the active gun.
  // Players know they have a second gun and can press TAB / scroll to swap.
  if(player.weapon2){
    const w2 = WEAPON_BY_ID[player.weapon2];
    if(w2){
      const slotX = 4, slotY = H-26;
      // backdrop chip
      ctx.fillStyle = 'rgba(8,6,4,0.55)';
      ctx.fillRect(slotX, slotY, 56, 22);
      ctx.strokeStyle = '#3a2818'; ctx.lineWidth = 1;
      ctx.strokeRect(slotX+0.5, slotY+0.5, 55, 21);
      // mini gun sprite
      const gs = SPR[w2.sprite];
      if(gs){
        const gy = slotY + Math.floor((22-gs.height)/2);
        drawSpriteOutline(gs, slotX+3, gy, '#000');
        ctx.drawImage(gs, slotX+3, gy);
      }
      drawText(player.ammo2+'/'+player.mag2, slotX+54, slotY+3, false, 5, '#cfc6a0', 'right');
      drawText('TAB', slotX+54, slotY+14, false, 5, '#39c0ed', 'right');
    }
  }

  // dash cooldown
  drawText('DASH', 130, H-21, false, 6, '#8a9aa8');
  ctx.fillStyle='#1a1a1a'; ctx.fillRect(130, H-13, 30, 3);
  const dc = 1 - (player.dashCool / (hasAug('thrust')?0.7:1.1));
  ctx.fillStyle = dc>=1? '#39c0ed':'#2a3a48';
  ctx.fillRect(130, H-13, Math.floor(30*clamp(dc,0,1)), 3);

  // augments icons
  for(let i=0;i<player.augments.length;i++){
    ctx.fillStyle='#39c0ed'; ctx.fillRect(214 + i*10, H-13, 6, 6);
    ctx.fillStyle='#000'; ctx.fillRect(216 + i*10, H-11, 2, 2);
  }

  // BLANK SCREEN FLASH — full-screen white-blue overlay during a blank
  if(player.blankFlashT > 0){
    const a = (player.blankFlashT / 0.35) * 0.55;
    ctx.fillStyle = `rgba(155,231,255,${a.toFixed(3)})`;
    ctx.fillRect(0,0,W,H);
  }

  // sector label below ammo pips (top bar is now 30px)
  const sLabel = state===STATE.HUB? 'HUB · STAGING BAY' : 'SECTOR '+String(runStats.sector).padStart(2,'0');
  drawText(sLabel, W-4, 33, false, 6, '#f0b429', 'right');
  drawMinimap();
}

function getMinimapLayout(){
  if(!dungeon) return null;
  const cellSz = 10;
  const xs = Object.values(dungeon).map(r=>r.x);
  const ys = Object.values(dungeon).map(r=>r.y);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const w = (maxX-minX+1)*cellSz, h = (maxY-minY+1)*cellSz;
  const ox = W - w - 6;
  const oy = 42;
  return { ox, oy, cellSz, minX, minY, maxX, maxY, w, h };
}

function drawMinimap(){
  const lay = getMinimapLayout();
  if(!lay) return;
  const { ox, oy, cellSz, minX, minY, w, h } = lay;
  // panel background — darker, framed
  ctx.fillStyle='rgba(8,6,4,0.82)';
  ctx.fillRect(ox-3, oy-3, w+6, h+6);
  ctx.strokeStyle='#3a2818'; ctx.lineWidth=1;
  ctx.strokeRect(ox-2.5, oy-2.5, w+5, h+5);
  // hover detection — only when the source room allows fast travel
  const sourceOK = canFastTravelFrom(curRoomKey);
  for(const k in dungeon){
    const r = dungeon[k];
    if(!r.visited) continue;
    const cx = ox + (r.x - minX)*cellSz;
    const cy = oy + (r.y - minY)*cellSz;
    let c = '#5a4a36';
    if(r.type === RT.START) c = '#39c0ed';
    if(r.type === RT.SHOP) c = '#f0b429';
    if(r.type === RT.CHEST) c = '#fff5c2';
    if(r.type === RT.AUG) c = '#9c5cd6';
    if(r.type === RT.BOSS) c = '#d7263d';
    if(!r.cleared && r.type!==RT.START && r.type!==RT.SHOP) c = '#8a3434';
    ctx.fillStyle = c;
    ctx.fillRect(cx, cy, cellSz-1, cellSz-1);
    // SHAPE HINT — paint a darker overlay matching this room's shapeKind so
    // the minimap actually communicates its layout instead of just being a
    // grid of squares.
    if(r.visited && cellSz >= 6){
      const sk = r.shapeKind || 'rect';
      const dark = 'rgba(0,0,0,0.55)';
      ctx.fillStyle = dark;
      const sz = cellSz - 1;
      const px = cx, py = cy;
      if(sk === 'corner' || sk === 'octagon'){
        // chamfer the four corners
        ctx.fillRect(px, py, 1, 1);
        ctx.fillRect(px+sz-1, py, 1, 1);
        ctx.fillRect(px, py+sz-1, 1, 1);
        ctx.fillRect(px+sz-1, py+sz-1, 1, 1);
        if(cellSz >= 8){
          ctx.fillRect(px+1, py, 1, 1); ctx.fillRect(px, py+1, 1, 1);
          ctx.fillRect(px+sz-2, py, 1, 1); ctx.fillRect(px+sz-1, py+1, 1, 1);
          ctx.fillRect(px+1, py+sz-1, 1, 1); ctx.fillRect(px, py+sz-2, 1, 1);
          ctx.fillRect(px+sz-2, py+sz-1, 1, 1); ctx.fillRect(px+sz-1, py+sz-2, 1, 1);
        }
      } else if(sk === 'pillars'){
        // four small pillars
        ctx.fillRect(px+2, py+2, 1, 1);
        ctx.fillRect(px+sz-3, py+2, 1, 1);
        ctx.fillRect(px+2, py+sz-3, 1, 1);
        ctx.fillRect(px+sz-3, py+sz-3, 1, 1);
      } else if(sk === 'L'){
        // wedge in one corner
        const w = Math.max(2, Math.floor(sz*0.45));
        ctx.fillRect(px, py, w, w);
      } else if(sk === 'plus'){
        // four side-cutouts forming a + cross
        const t = Math.max(1, Math.floor(sz*0.25));
        ctx.fillRect(px, py, t, t);
        ctx.fillRect(px+sz-t, py, t, t);
        ctx.fillRect(px, py+sz-t, t, t);
        ctx.fillRect(px+sz-t, py+sz-t, t, t);
      } else if(sk === 'scatter'){
        // peppered pillars
        ctx.fillRect(px+2, py+2, 1, 1);
        ctx.fillRect(px+sz-3, py+3, 1, 1);
        ctx.fillRect(px+3, py+sz-3, 1, 1);
        ctx.fillRect(px+sz-4, py+sz-4, 1, 1);
      } else if(sk === 'T'){
        // hanging T-block from top
        const w = Math.max(2, Math.floor(sz*0.5));
        const h = Math.max(1, Math.floor(sz*0.35));
        ctx.fillRect(px + Math.floor((sz-w)/2), py, w, h);
      } else if(sk === 'snake'){
        // two staggered bars
        const len = Math.max(2, sz-3);
        ctx.fillRect(px+1, py + Math.floor(sz*0.4), len, 1);
        ctx.fillRect(px+2, py + Math.floor(sz*0.6), len, 1);
      } else if(sk === 'cubby'){
        // two opposite-corner blocks of unequal size
        const a = Math.max(2, Math.floor(sz*0.35));
        const b = Math.max(2, Math.floor(sz*0.45));
        ctx.fillRect(px, py, a, a);
        ctx.fillRect(px+sz-b, py+sz-b, b, b);
      }
    }
    // TELEPORTER ICON — pulsing portal ring with bright center dot
    if(r.props && r.props.some(p=>p.type==='teleporter')){
      const tpHasReturn = r.props.some(p=>p.type==='teleporter' && p.returnDest);
      const tpt = performance.now()*0.004;
      const tpAlpha = (0.75 + 0.25*Math.sin(tpt + r.x*2.1 + r.y*1.3)).toFixed(3);
      const mid = Math.floor(cellSz/2);
      // Outer ring (4 corner pixels of a 4×4 box)
      const rc = tpHasReturn ? `rgba(176,96,255,${tpAlpha})` : `rgba(57,192,237,${tpAlpha})`;
      const rc2 = tpHasReturn ? `rgba(220,170,255,${tpAlpha})` : `rgba(180,240,255,${tpAlpha})`;
      ctx.fillStyle = rc;
      ctx.fillRect(cx+mid-2, cy+mid-2, 4, 1); // top bar
      ctx.fillRect(cx+mid-2, cy+mid+1, 4, 1); // bottom bar
      ctx.fillRect(cx+mid-2, cy+mid-1, 1, 2); // left bar
      ctx.fillRect(cx+mid+1, cy+mid-1, 1, 2); // right bar
      ctx.fillStyle = rc2;
      ctx.fillRect(cx+mid-1, cy+mid-1, 2, 2); // bright center
    }
    // CHEST ICON — ETG-style pixel-art chest in the bottom-right of any
    // visited room that still has an unopened chest (normal or boss).
    if(r.visited && r.props && r.props.some(p=>p.type==='chest' && !p.opened)){
      const chestProp = r.props.find(p=>p.type==='chest' && !p.opened);
      const tier = (chestProp && chestProp.tier) || 'brown';
      // Tier-accurate body colour
      const chFill = ({brown:'#b88840',blue:'#3090d0',green:'#29a850',red:'#c02030',black:'#8030c0',rainbow:'#e8a820'})[tier]||'#b88840';
      // Gold clasp shimmer pulse (offset per room so they don't all sync)
      const cp = (Math.sin(performance.now()*0.005 + r.x*1.7 + r.y*0.9)+1)*0.5;
      const claspCol = `rgba(240,180,41,${(0.78+cp*0.22).toFixed(2)})`;
      // Icon anchor: bottom-right corner of the 9×9 cell (5 wide × 4 tall)
      const ix = cx + cellSz - 6, iy = cy + cellSz - 5;
      // Soft glow halo behind icon (tier colour, low alpha)
      ctx.fillStyle = `rgba(${tier==='black'?'140,48,200':tier==='blue'?'48,144,208':tier==='green'?'41,168,80':tier==='red'?'192,32,48':'184,136,64'},${(0.18+cp*0.12).toFixed(2)})`;
      ctx.fillRect(ix-1, iy-1, 7, 6);
      // ── 5×4 pixel-art chest ──────────────────────────────────────────
      // Row 0: lid (dark outline top, tier fill inside)
      ctx.fillStyle = '#0e0904'; ctx.fillRect(ix, iy, 5, 1);
      ctx.fillStyle = chFill;    ctx.fillRect(ix+1, iy, 3, 1);
      // Row 1: gold clasp band (full width)
      ctx.fillStyle = claspCol;  ctx.fillRect(ix, iy+1, 5, 1);
      // Row 2: body (dark sides, tier fill, gold lock pip)
      ctx.fillStyle = '#0e0904'; ctx.fillRect(ix,   iy+2, 1, 2);
      ctx.fillStyle = '#0e0904'; ctx.fillRect(ix+4, iy+2, 1, 2);
      ctx.fillStyle = chFill;    ctx.fillRect(ix+1, iy+2, 3, 1);
      ctx.fillStyle = claspCol;  ctx.fillRect(ix+2, iy+2, 1, 1); // lock pip
      // Row 3: body bottom (dark outline, tier fill)
      ctx.fillStyle = chFill;    ctx.fillRect(ix+1, iy+3, 3, 1);
      ctx.fillStyle = '#0e0904'; ctx.fillRect(ix,   iy+3, 5, 1);
      ctx.fillStyle = chFill;    ctx.fillRect(ix+1, iy+3, 3, 1);
      // Lid catch-light: single bright pixel top-left of lid
      ctx.fillStyle = `rgba(255,245,200,${(0.55+cp*0.35).toFixed(2)})`;
      ctx.fillRect(ix+1, iy, 1, 1);
    }
    // door connectors drawn as visible HALLWAY segments (Gungeon-style),
    // not just one-pixel ticks: a darker corridor floor with stone walls flanking it.
    if(r.doors && r.doors.e && dungeon[(r.x+1)+','+r.y] && dungeon[(r.x+1)+','+r.y].visited){
      const hx = cx + cellSz - 1, hy = cy + Math.floor(cellSz/2) - 1;
      ctx.fillStyle = '#3a2818'; ctx.fillRect(hx, hy-1, 2, 4);   // outer dark
      ctx.fillStyle = '#a8865c'; ctx.fillRect(hx, hy, 2, 2);     // hallway floor
      ctx.fillStyle = '#fff5c2'; ctx.fillRect(hx, hy, 1, 1);     // single highlight
    }
    if(r.doors && r.doors.s && dungeon[r.x+','+(r.y+1)] && dungeon[r.x+','+(r.y+1)].visited){
      const hx = cx + Math.floor(cellSz/2) - 1, hy = cy + cellSz - 1;
      ctx.fillStyle = '#3a2818'; ctx.fillRect(hx-1, hy, 4, 2);
      ctx.fillStyle = '#a8865c'; ctx.fillRect(hx, hy, 2, 2);
      ctx.fillStyle = '#fff5c2'; ctx.fillRect(hx, hy, 1, 1);
    }
    if(r.doors && r.doors.w && dungeon[(r.x-1)+','+r.y] && dungeon[(r.x-1)+','+r.y].visited){
      const hx = cx - 1, hy = cy + Math.floor(cellSz/2) - 1;
      ctx.fillStyle = '#3a2818'; ctx.fillRect(hx, hy-1, 2, 4);
      ctx.fillStyle = '#a8865c'; ctx.fillRect(hx, hy, 2, 2);
      ctx.fillStyle = '#fff5c2'; ctx.fillRect(hx+1, hy, 1, 1);
    }
    if(r.doors && r.doors.n && dungeon[r.x+','+(r.y-1)] && dungeon[r.x+','+(r.y-1)].visited){
      const hx = cx + Math.floor(cellSz/2) - 1, hy = cy - 1;
      ctx.fillStyle = '#3a2818'; ctx.fillRect(hx-1, hy, 4, 2);
      ctx.fillStyle = '#a8865c'; ctx.fillRect(hx, hy, 2, 2);
      ctx.fillStyle = '#fff5c2'; ctx.fillRect(hx, hy+1, 1, 1);
    }
    // QUESTION MARKS — for any neighbour of a visited room that the player has
    // NOT yet entered, draw a small "?" cell so the layout hints at what's
    // beyond the door (matches Enter-the-Gungeon's minimap behaviour).
    const neighbourDirs = [
      {dx: 0, dy:-1, k:'n'}, {dx: 0, dy:1, k:'s'},
      {dx:-1, dy: 0, k:'w'}, {dx: 1, dy: 0, k:'e'},
    ];
    for(const nd of neighbourDirs){
      if(!r.doors || !r.doors[nd.k]) continue;
      const nk = (r.x+nd.dx)+','+(r.y+nd.dy);
      const nb = dungeon[nk];
      if(!nb || nb.visited) continue;
      const ncx = ox + (nb.x - minX)*cellSz;
      const ncy = oy + (nb.y - minY)*cellSz;
      // dim cell + question mark
      ctx.fillStyle = '#241a10';
      ctx.fillRect(ncx, ncy, cellSz-1, cellSz-1);
      ctx.strokeStyle = '#5a4a36';
      ctx.lineWidth = 1;
      ctx.strokeRect(ncx+0.5, ncy+0.5, cellSz-2, cellSz-2);
      // pulse the "?" so the player notices it
      const pulse = (Math.sin(performance.now()*0.005 + nb.x*1.7 + nb.y*0.9)+1)*0.5;
      const c = `rgba(248,238,184,${(0.55 + 0.35*pulse).toFixed(3)})`;
      drawText('?', ncx + cellSz/2, ncy + 2, true, 6, c, 'center');
    }
    if(k === curRoomKey){
      // pulsing white ring on the player's room
      const t = (Math.sin(performance.now()*0.006)+1)*0.5;
      ctx.strokeStyle = `rgba(255,255,255,${0.65+0.35*t})`;
      ctx.lineWidth=1.5;
      ctx.strokeRect(cx-0.5, cy-0.5, cellSz, cellSz);
      ctx.lineWidth=1;
      // player position dot — mapped to actual live position within the room
      // Player moves in room-pixel space 0..ROOM_PX_W, 0..ROOM_PX_H
      const relX = Math.min(0.95, Math.max(0.05, player.x / ROOM_PX_W));
      const relY = Math.min(0.95, Math.max(0.05, player.y / ROOM_PX_H));
      const dotX = Math.round(cx + relX * (cellSz - 3));
      const dotY = Math.round(cy + relY * (cellSz - 3));
      // dark shadow so dot is readable on any cell color
      ctx.fillStyle = 'rgba(0,0,0,0.85)';
      ctx.fillRect(dotX-1, dotY-1, 5, 5);
      // bright white dot (3×3)
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(dotX, dotY, 3, 3);
      // hot-pink center pixel — pops even on bright room colors
      ctx.fillStyle = '#ff6090';
      ctx.fillRect(dotX+1, dotY+1, 1, 1);
    } else if(sourceOK && r.cleared && r.type!==RT.BOSS){
      // hover highlight for travelable rooms
      if(mouse.x>=cx && mouse.x<cx+cellSz-1 && mouse.y>=cy && mouse.y<cy+cellSz-1){
        ctx.strokeStyle='#39c0ed';
        ctx.lineWidth=1;
        ctx.strokeRect(cx-0.5, cy-0.5, cellSz, cellSz);
      }
    }
  }
  // legend hint
  ctx.fillStyle = sourceOK ? '#39c0ed' : '#666';
  drawText(sourceOK?'CLICK TP ROOM TO WARP':'WARP: CLEAR ROOM FIRST', W-4, oy+h+4, false, 5, sourceOK?'#39c0ed':'#666', 'right');
}

// can the player fast-travel from this room? (must be cleared / safe)
function canFastTravelFrom(key){
  const r = dungeon && dungeon[key];
  if(!r) return false;
  if(r.type === RT.BOSS && !r.cleared) return false;
  if(r.type === RT.COMBAT && !r.cleared) return false;
  return true;
}

// teleport via minimap click — Gungeon-style fast travel
function tryMinimapTeleport(){
  if(state !== STATE.RUN && state !== STATE.HUB) return false;
  const lay = getMinimapLayout();
  if(!lay) return false;
  if(!canFastTravelFrom(curRoomKey)) return false;
  const { ox, oy, cellSz, minX, minY } = lay;
  for(const k in dungeon){
    const r = dungeon[k];
    if(!r.visited) continue;
    if(k === curRoomKey) continue;
    if(r.type === RT.BOSS) continue;
    if(!r.cleared && r.type !== RT.START && r.type !== RT.SHOP && r.type !== RT.AUG && r.type !== RT.CHEST) continue;
    // Only rooms with a physical teleporter pad can be fast-travel destinations
    if(!r.props || !r.props.some(p=>p.type==='teleporter')) continue;
    const cx = ox + (r.x - minX)*cellSz;
    const cy = oy + (r.y - minY)*cellSz;
    if(mouse.x>=cx && mouse.x<cx+cellSz-1 && mouse.y>=cy && mouse.y<cy+cellSz-1){
      // perform teleport
      const pulse = ()=>{ for(let i=0;i<28;i++) spawnPart(player.x, player.y, {vx:rand(-180,180),vy:rand(-180,180),life:0.55,c:'#39c0ed',sz:2}); };
      pulse();
      sfxLockOpen && sfxLockOpen();
      const mapFromKey = curRoomKey;           // capture BEFORE reassignment
      const mapFromPos = {x: player.x, y: player.y};
      savePickupsToRoom(mapFromKey);
      curRoomKey = k;
      const nr = dungeon[curRoomKey];
      nr.visited = true;
      if(!nr.props || nr.props.length===0) buildRoom(nr);
      restorePickupsFromRoom(nr);
      // place player on destination teleporter pad, mark it purple for return
      let landed = false;
      if(nr.props){
        for(const tpd of nr.props){
          if(tpd.type==='teleporter'){
            player.x = tpd.x + 10; player.y = tpd.y + 16;
            // mark this pad as a return portal so player can warp back
            if(mapFromKey){
              tpd.returnDest = mapFromKey;
              tpd.returnPos = mapFromPos;
            }
            landed = true; break;
          }
        }
      }
      if(!landed){ player.x = ROOM_PX_W/2; player.y = ROOM_PX_H/2; }
      ensureSafeLanding(nr);
      bullets.length = 0;
      pulse();
      spawnBanner('FAST TRAVEL', '', 0.9);
      return true;
    }
  }
  return false;
}

function renderShop(){
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0,0,W,H);
  drawText('MERCHANT', W/2, 36, true, 14, '#f0b429');
  drawText('GOLD SPEAKS LOUDER THAN OATHS', W/2, 56, true, 6, '#aaa');
  const r = curRoom();
  for(let i=0;i<r.shopItems.length;i++){
    const it = r.shopItems[i];
    const x = 80 + i*120, y = 100;
    const hover = mouse.x>x-46 && mouse.x<x+46 && mouse.y>y+10 && mouse.y<y+90;
    ctx.fillStyle = hover? 'rgba(240,180,41,0.15)': 'rgba(0,0,0,0.5)';
    ctx.fillRect(x-46, y, 92, 90);
    ctx.strokeStyle = hover? '#f0b429':'#444';
    ctx.lineWidth=1;
    ctx.strokeRect(x-46+0.5, y+0.5, 92, 90);
    let title='', sub='', spr=null, color='#fff';
    if(it.kind==='heart'){ title='REPAIR KIT'; sub='+2 HP'; spr=SPR.heartPickup; color='#d7263d'; }
    if(it.kind==='weapon'){ const w=WEAPON_BY_ID[it.wid]; title=w.name; sub=w.rarity+' · DMG '+w.dmg; spr=SPR[w.sprite]; color=w.color; }
    if(it.kind==='aug'){ const a=AUGMENT_BY_ID[it.aid]; title=a.name; sub=a.desc; spr=SPR.ammoBox; color='#39c0ed'; }
    drawText(title, x, y+24, true, 7, color);
    drawText(sub, x, y+38, true, 5, '#bbb');
    if(spr){
      ctx.drawImage(spr, x-spr.width, y+50, spr.width*2, spr.height*2);
    }
    if(it.bought){
      drawText('SOLD', x, y+82, true, 7, '#666');
    } else {
      drawText(it.cost+' $', x, y+82, true, 8, player.credits>=it.cost?'#f0b429':'#7a1424');
    }
  }
  drawText('PRESS  E / ESC  TO LEAVE', W/2, H-20, true, 6, '#666');
}

function renderAug(){
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0,0,W,H);
  drawText('AUGMENT SELECTION', W/2, 36, true, 12, '#39c0ed');
  drawText('CHOOSE ONE PROTOCOL TO INSTALL', W/2, 54, true, 6, '#aaa');
  const r = curRoom();
  if(r.augTaken){ drawText('PROTOCOL INSTALLED · CLICK TO CLOSE', W/2, H/2, true, 7, '#f0b429'); return; }
  for(let i=0;i<r.augChoices.length;i++){
    const a = r.augChoices[i];
    const x = 80 + i*120, y = 90;
    const hover = mouse.x>x-46 && mouse.x<x+46 && mouse.y>y+10 && mouse.y<y+110;
    ctx.fillStyle = hover? 'rgba(57,192,237,0.15)': 'rgba(0,0,0,0.5)';
    ctx.fillRect(x-46, y, 92, 110);
    ctx.strokeStyle = hover? '#39c0ed':'#444';
    ctx.lineWidth = 1;
    ctx.strokeRect(x-46+0.5, y+0.5, 92, 110);
    drawText(a.name, x, y+30, true, 7, '#fff');
    // word wrap desc
    wrapText(a.desc, x, y+50, 84, 8, '#aaa');
    drawText('[ INSTALL ]', x, y+96, true, 7, '#39c0ed');
  }
}

function renderPause(){
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0,0,W,H);
  drawText('OPERATION PAUSED', W/2, 80, true, 12, '#fff');
  const opts = ['RESUME','RETURN TO HUB'];
  for(let i=0;i<opts.length;i++){
    const y = 130 + i*22;
    const hover = mouse.x>180&&mouse.x<300&&mouse.y>y-6&&mouse.y<y+10;
    drawText(opts[i], W/2, y, true, 8, hover?'#f0b429':'#aaa');
    if(hover){ ctx.fillStyle='#f0b429'; ctx.fillRect(W/2-80, y+8, 160, 1); }
  }
  drawText('THREAT RESPONSE SUSPENDED', W/2, H-20, true, 5, '#666');
}

function renderDeath(){
  ctx.fillStyle = `rgba(0,0,0,${Math.min(0.9, deathT*0.9)})`;
  ctx.fillRect(0,0,W,H);
  // scan lines
  for(let y=0;y<H;y+=2){
    ctx.fillStyle = 'rgba(215,38,61,0.06)';
    ctx.fillRect(0,y,W,1);
  }
  drawText('RUN TERMINATED', W/2, 70, true, 14, '#d7263d');
  drawText('SIGNAL LOST IN SECTOR '+runStats.sector, W/2, 90, true, 6, '#888');
  const acc = runStats.shots? Math.round(100*runStats.hits/runStats.shots):0;
  const stats = [
    ['TIME SURVIVED', Math.floor(runStats.time)+'s'],
    ['ROOMS CLEARED', runStats.rooms],
    ['HOSTILES PURGED', runStats.kills],
    ['ACCURACY', acc+'%'],
    ['SECTOR REACHED', runStats.sector],
  ];
  stats.forEach((s,i)=>{
    if(deathT > 0.4 + i*0.18){
      drawText(s[0], W/2-60, 120+i*14, false, 6, '#aaa');
      drawText(String(s[1]), W/2+60, 120+i*14, false, 6, '#fff', 'right');
    }
  });
  if(deathT > 1.6){
    drawText('CLICK TO RETURN TO HUB', W/2, H-22, true, 7, '#f0b429');
  }
}

function renderWin(){
  ctx.fillStyle = `rgba(0,0,0,${Math.min(0.85, deathT*0.7)})`;
  ctx.fillRect(0,0,W,H);
  drawText('LOCKDOWN BREACHED', W/2, 80, true, 14, '#39c0ed');
  drawText('THE EYE BLINKS NO MORE', W/2, 100, true, 6, '#aaa');
  drawText('YOU SURVIVED THE CYCLOPS DUNGEON', W/2, 130, true, 6, '#fff');
  drawText('CREATED BY REN', W/2, 150, true, 8, '#f0b429');
  if(deathT > 1.6){
    drawText('CLICK TO RETURN TO HUB', W/2, H-22, true, 7, '#f0b429');
  }
}

function drawText(text, x, y, center, sz=8, color='#fff', align='left'){
  if(text==null) return;
  text = String(text).toUpperCase();
  const px = Math.max(1, Math.floor(sz/5));
  const charW = 3*px + px;
  const totalW = text.length*charW;
  let sx = Math.floor(x);
  if(center) sx = Math.floor(x - totalW/2);
  if(align==='right') sx = Math.floor(x - totalW + px);
  ctx.fillStyle = color;
  for(let i=0;i<text.length;i++){
    const ch = text[i];
    const g = FONT[ch] || FONT['?'];
    for(let r=0;r<5;r++){
      for(let c=0;c<3;c++){
        if(g[r] & (1<<(2-c))){
          ctx.fillRect(sx + i*charW + c*px, Math.floor(y) + r*px, px, px);
        }
      }
    }
  }
}

function wrapText(text, x, y, maxW, sz, color){
  const words = String(text).split(' ');
  let line = '';
  let yy = y;
  const charW = 3*Math.max(1, Math.floor(sz/5)) + Math.max(1, Math.floor(sz/5));
  for(const w of words){
    const test = line? line+' '+w : w;
    if(test.length*charW > maxW){
      drawText(line, x, yy, true, sz, color);
      yy += sz+2;
      line = w;
    } else line = test;
  }
  if(line) drawText(line, x, yy, true, sz, color);
}
