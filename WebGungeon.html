/* ---------- Run / Hub gameplay ---------- */
function updateRun(dt, isHub){
  runStats.time += dt;
  // pause toggle
  if(keys['escape']){ keys['escape']=false; if(!isHub){ state = STATE.PAUSE; return; } }

  // TAB — swap between the two weapon slots (Enter the Gungeon parity).
  if(keys['tab']){ keys['tab']=false; swapWeapon(); }

  // minimap fast-travel — Gungeon-style: click any cleared room on the minimap to warp there
  if(mouse.justDown && tryMinimapTeleport()){
    mouse.justDown = false;
    return;
  }

  // transition timer
  if(transitionDir){ transitionT -= dt; if(transitionT<=0) finishTransition(); return; }

  // player
  let mx=0,my=0;
  if(keys['w']||keys['arrowup']) my-=1;
  if(keys['s']||keys['arrowdown']) my+=1;
  if(keys['a']||keys['arrowleft']) mx-=1;
  if(keys['d']||keys['arrowright']) mx+=1;
  const len = Math.hypot(mx,my)||1;
  mx/=len; my/=len;
  let speed = player.speed * (hasAug('speed')?1.15:1);
  if(player.dashT>0){ speed *= 3.2; }
  if(player.reloading) speed *= 0.85;
  player.vx = mx * speed;
  player.vy = my * speed;
  if(mx!==0||my!==0) player.walkT += dt;

  player.facing = (mouse.x > W/2)?1:-1;
  // dash
  player.dashCool = Math.max(0, player.dashCool - dt);
  player.dashT = Math.max(0, player.dashT - dt);
  // dodge roll — only allowed when actually moving (no idle dashes)
  const isMoving = (Math.abs(player.vx) > 1 || Math.abs(player.vy) > 1);
  if((keys[' ']||keys['shift']) && player.dashCool<=0 && isMoving){
    keys[' ']=false;
    player.dashT = 0.18;
    player.dashCool = hasAug('thrust') ? 0.7 : 1.1;
    player.invul = Math.max(player.invul, 0.22);
    sfxDash();
    for(let i=0;i<10;i++) spawnPart(player.x, player.y, {vx:rand(-30,30),vy:rand(-30,30),life:0.3,c:'#39c0ed',sz:1});
  }

  const r = curRoom();
  moveEntity(r, player, player.vx*dt, player.vy*dt);

  // SAFETY NET: if the player ever ends up overlapping a wall (recoil into a
  // wall, prop spawned on top, teleport landing, etc.) gently nudge them to
  // the nearest clear tile so they can never get permanently stuck.
  if(!entityCanMove(r, player.x - player.w/2, player.y - player.h/2, player.w, player.h, 'flippedOnly')){
    ensureSafeLanding(r);
  }

  // aim
  // mouse position is screen, convert to world (account for camera zoom): world = screen/zoom - offset
  player.aimx = mouse.x/cam.zoom - cam.offX - cam.shakeX;
  player.aimy = mouse.y/cam.zoom - cam.offY - cam.shakeY;
  const aimAng = Math.atan2(player.aimy - player.y, player.aimx - player.x);

  // shoot
  player.fireT = Math.max(0, player.fireT - dt);
  player.killStreakT = Math.max(0, player.killStreakT - dt);
  const w = WEAPON_BY_ID[player.weapon];
  let fireMul = 1;
  if(hasAug('blood') && player.killStreakT>0) fireMul *= 0.8;
  if(player.fireBoostT && player.fireBoostT>0){ fireMul *= 0.45; player.fireBoostT -= dt; }
  if(player.reloading){
    player.reloadT -= dt;
    if(player.reloadT<=0){ player.reloading=false; player.ammo = player.mag; sfxReload(); }
  }
  player.muzzleT = Math.max(0, (player.muzzleT||0) - dt);
  if(!isHub && mouse.down && player.fireT<=0 && !player.reloading && player.ammo>0 && state===STATE.RUN){
    fire(w, player.x, player.y, aimAng);
    player.fireT = w.fire * fireMul;
    player.ammo--; runStats.shots++;
    player.muzzleT = 0.06;
    // shell casing ejection (sideways from gun)
    const sideAng = aimAng + (player.aimx<player.x ? -Math.PI/2 : Math.PI/2);
    const shx = player.x + Math.cos(aimAng)*4;
    const shy = player.y + Math.sin(aimAng)*4;
    spawnPart(shx, shy, {
      vx:Math.cos(sideAng)*60+rand(-15,15),
      vy:Math.sin(sideAng)*60+rand(-25,-5),
      life:0.5, c:'#f0c84a', sz:1, grav:200, fric:0.96
    });
    // tiny knockback recoil — MUST go through moveEntity so it respects walls.
    // Direct position writes here used to phase the player through walls when
    // shooting toward an adjacent wall.
    moveEntity(r, player, -Math.cos(aimAng)*0.6, -Math.sin(aimAng)*0.6);
    if(player.ammo<=0){ startReload(); }
  }
  if(keys['r'] && !player.reloading && player.ammo<player.mag){ keys['r']=false; startReload(); }

  // F: flip nearby table — tips it AWAY from the player so the iron edge faces them as cover
  if(keys['f']){
    keys['f']=false;
    let best=null, bd=24;
    for(const p of r.props){
      if(p.type!=='table' || p.hp<=0 || p.flipped) continue;
      const cx2 = p.x+p.w/2, cy2 = p.y+p.h/2;
      const dd = dist(player.x,player.y,cx2,cy2);
      if(dd<bd){ bd=dd; best=p; }
    }
    if(best){
      const cx2 = best.x+best.w/2, cy2 = best.y+best.h/2;
      const ddx = cx2 - player.x, ddy = cy2 - player.y;
      let dir;
      if(Math.abs(ddx) > Math.abs(ddy)){
        dir = ddx>0 ? 'right' : 'left';
        // sideways tables become tall — swap dims
        best.w = 14; best.h = 20;
      } else {
        dir = ddy>0 ? 'down' : 'up';
        best.w = 20; best.h = 14;
      }
      // re-center on prev center
      best.x = Math.round(cx2 - best.w/2);
      best.y = Math.round(cy2 - best.h/2);
      // nudge inside walls if needed
      best.x = clamp(best.x, TILE+1, ROOM_PX_W - TILE - best.w - 1);
      best.y = clamp(best.y, TILE+1, ROOM_PX_H - TILE - best.h - 1);
      best.flipped = true;
      best.flipDir = dir;
      best.hp = 42; // 3 hits at typical pistol dmg(14)
      best.maxHp = 42;
      sfxFlip();
      shakeCam(1);
      for(let k=0;k<10;k++) spawnPart(best.x+best.w/2, best.y+best.h/2, {vx:rand(-50,50),vy:rand(-80,-10),life:0.45,c:'#7c4f2c',sz:2,grav:240,fric:0.94});
    }
  }

  // boss exit door interaction
  if(r.bossExit && !r.bossExit.used){
    if(dist(player.x,player.y, r.bossExit.x, r.bossExit.y)<22 && (keys['e']||keys['enter'])){
      keys['e']=keys['enter']=false;
      r.bossExit.used = true;
      sfxBigDoor();
      // descend to next sector
      setTimeout(()=>startRun(runStats.sector+1), 400);
    }
    // Solid collision — player cannot walk through the exit portal
    {
      const ex=r.bossExit.x, ey=r.bossExit.y;
      const bL=ex-15, bR=ex+15, bT=ey-18, bB=ey+4;
      const pL=player.x-5, pR=player.x+5, pT=player.y-7, pB=player.y+7;
      if(pR>bL && pL<bR && pB>bT && pT<bB){
        const dL=pR-bL, dR=bR-pL, dT=pB-bT, dB=bB-pT;
        const m=Math.min(dL,dR,dT,dB);
        if(m===dL) player.x=bL-5;
        else if(m===dR) player.x=bR+5;
        else if(m===dT) player.y=bT-7;
        else player.y=bB+7;
      }
    }
  }

  // interact (E) is consumed by per-prop handlers further below.

  // i-frames
  player.invul = Math.max(0, player.invul - dt);

  // entities
  if(r.entities){
    for(const e of r.entities){ updateEnemy(e, dt, r); }
    // remove dead
    for(let i=r.entities.length-1;i>=0;i--){
      const e = r.entities[i];
      if(e.dead){
        r.entities.splice(i,1);
        runStats.kills++;
        player.killStreakT = 2.0;
        const credits = (e.isBoss?0: e.type==='slimeR'?4: e.type==='tank'?6: e.type==='skel'?3:2) * (hasAug('vulture')?1.5:1) * e.dropMul;
        // drops — bosses handled in the boss block above; regular enemies only
        if(!e.isBoss){
          if(Math.random() < (hasAug('scav')?0.7:0.4)){
            spawnPickup('coin', e.x, e.y, Math.floor(credits));
          }
          if(Math.random() < (hasAug('scav')?0.35:0.2)){ spawnPickup('ammo', e.x, e.y, 1); }
        }
        // shroomer spore explosion on death
        if(e.sporeExplode){
          for(let s=0;s<6;s++){
            const a = (s/6)*TAU;
            spawnBullet({x:e.x, y:e.y, vx:Math.cos(a)*70, vy:Math.sin(a)*70, life:1.6, dmg:1, friendly:false, color:'#5b2a8c', type:'spore'});
          }
        }
        // BIG MUSHROOM — remove all its floating spores when it dies
        if(e.type==='bigShroom'){
          for(let bi=bullets.length-1; bi>=0; bi--){
            if(bullets[bi].parentId === e.id) bullets.splice(bi,1);
          }
          // final burst of decorative purple spores
          for(let s=0;s<8;s++){
            const a=(s/8)*TAU;
            spawnBullet({x:e.x,y:e.y,vx:Math.cos(a)*55,vy:Math.sin(a)*55,life:1.8,dmg:0,friendly:false,color:'#5b2a8c',type:'spore'});
          }
        }
        // RED / BLUE SHOTGUN KIN — chance to detonate on death (Gungeon "stress
        // shot" style). Same payoff feel as the bullat kamikaze: either a
        // fan of final shells, or a homing blast that punishes a sloppy kill.
        if((e.type==='slimeR' || e.type==='slimeB') && Math.random() < 0.30){
          const isIce = (e.type==='slimeB');
          const col = isIce ? '#39c0ed' : '#d7263d';
          if(Math.random() < 0.5){
            // ---- EXPLOSION + final shotgun fan ----
            explode(e.x, e.y, r, 3); shakeCam(3);
            for(let k=0;k<6;k++){
              const a = (k/6)*TAU + Math.random()*0.2;
              spawnBullet({
                x:e.x, y:e.y,
                vx:Math.cos(a)*130, vy:Math.sin(a)*130,
                dmg:1, type: isIce ? 'ice' : 'std', life:1.0,
                friendly:false, color:col
              });
            }
          } else {
            // ---- HOMING KAMIKAZE ROUND (bat-style) ----
            const a = Math.atan2(player.y - e.y, player.x - e.x);
            spawnBullet({
              x:e.x, y:e.y,
              vx:Math.cos(a)*180, vy:Math.sin(a)*180,
              dmg:2, type:'energy', life:1.4,
              friendly:false, color:col, homing:true
            });
            for(let p=0;p<10;p++) spawnPart(e.x, e.y, {vx:rand(-90,90), vy:rand(-90,90), life:0.5, c:col, sz:2, fric:0.9});
            sfxShoot();
          }
        }
        // corpse
        const corpseKind = e.bossKind ? (e.bossKind==='watcher'?'boss':'boss'+e.bossKind[0].toUpperCase()+e.bossKind.slice(1)) : e.type;
        corpses.push({x:e.x, y:e.y, kind: SPR.corpses[corpseKind] ? corpseKind : (e.isBoss?'boss':e.type), roomKey: curRoomKey, life:6.0, max:6.0});
        sfxCorpse();
        if(e.isBoss){
          spawnPickup('key', e.x-24, e.y, 1);
          spawnPickup('coin', e.x, e.y+12, 10);
          spawnPickup('heart', e.x+24, e.y, 2); // full heart (2 HP) from boss
          // Black chest — rarest tier, boss reward — find safe floor position
          {
            let cx = e.x + ((e.x > ROOM_PX_W/2) ? -56 : 56) - 7;
            let cy = e.y + 20;
            cx = Math.max(2*TILE, Math.min(ROOM_PX_W - 3*TILE, cx));
            cy = Math.max(2*TILE, Math.min(ROOM_PX_H - 3*TILE, cy));
            // If the chosen tile is a wall, spiral outward to find a clear floor tile
            let ctw = Math.floor(cx/TILE), cth = Math.floor(cy/TILE);
            if(isWall(r,ctw,cth) || isWall(r,ctw+1,cth) || isWall(r,ctw,cth+1)){
              let found = false;
              outer: for(let rad=1; rad<=6; rad++){
                for(let oy=-rad; oy<=rad; oy++) for(let ox=-rad; ox<=rad; ox++){
                  if(Math.abs(ox)!==rad && Math.abs(oy)!==rad) continue;
                  const ttx=ctw+ox, tty=cth+oy;
                  if(ttx<1||tty<1||ttx+1>=ROOM_W||tty+1>=ROOM_H) continue;
                  if(!isWall(r,ttx,tty) && !isWall(r,ttx+1,tty) && !isWall(r,ttx,tty+1)){ cx=ttx*TILE; cy=tty*TILE; found=true; break outer; }
                }
              }
            }
            r.props.push({type:'chest', x:cx, y:cy, w:14, h:12, tier:'black', opened:false, hp:30, maxHp:30, bossChest:true});
          }
          // any remaining boss entities (twin)?
          const otherBoss = r.entities.find(o=>o.isBoss);
          if(!otherBoss){
            // INFINITE PROGRESSION — boss every floor, no win cap.
            // Optional: still trigger a "won the credits" banner on sector 3
            // the very first run, but always continue descending.
            spawnBanner('CHAMPION SLAIN', 'GATE TO SECTOR '+(runStats.sector+1)+' OPENS', 3);
            sfxLockOpen();
            // spawn boss exit door in center
            r.bossExit = {x: ROOM_PX_W/2, y: ROOM_PX_H/2 - 8, used:false};
          } else {
            spawnBanner('ONE TWIN DOWN', 'KILL THE OTHER', 1.6);
          }
        }
        sfxKill();
        for(let k=0;k<14;k++) spawnPart(e.x, e.y, {vx:rand(-80,80),vy:rand(-80,80),life:0.5,c: e.type==='slimeR'?'#d7263d':e.type==='slimeG'?'#29c46d':e.type==='eye'?'#5b2a8c':e.type==='skel'?'#d4cfa3':'#f0b429', sz:2});
      }
    }
    // check cleared
    if(!r.cleared && r.entities.length===0){
      r.cleared = true;
      sfxDoor();
      // chest reward
      if(r.type===RT.COMBAT && Math.random()<0.35){
        spawnPickup('coin', ROOM_PX_W/2, ROOM_PX_H/2, 6);
      }
      // place a teleporter pad in the CENTER of the room linking back to the staging hub
      // (chest rooms keep the chest as the centerpiece — no teleporter)
      // Not every room gets a teleporter — only ~45% of cleared rooms (besides
      // the boss/chest/start) drop a pad. Players can still travel to ones that exist.
      if(r.type !== RT.START && r.type !== RT.BOSS && r.type !== RT.CHEST && Math.random() < 0.45){
        const tx = Math.floor(ROOM_PX_W/2 - 10);
        const ty = Math.floor(ROOM_PX_H/2 - 10);
        // remove any prop overlapping the center so the pad always sits clean in the middle
        r.props = r.props.filter(o=>{
          if(o.type==='teleporter') return false;
          if(o.type==='chest' || o.type==='shopkeep' || o.type==='pedestal') return true;
          const ow = o.w||16, oh = o.h||16;
          const overlap = (tx < o.x+ow && tx+20 > o.x && ty < o.y+oh && ty+20 > o.y);
          return !overlap;
        });
        r.props.push({type:'teleporter', x:tx, y:ty, w:20, h:20, dest:'0,0', tT:0});
      }
    }
  }

  // bullets
  for(let i=bullets.length-1;i>=0;i--){
    const b = bullets[i];
    b.life -= dt;
    // homing toward player (enemy bullets only)
    if(b.homing && !b.friendly && !(player.cloakT && player.cloakT>0)){
      const tdx = player.x - b.x, tdy = player.y - b.y;
      const td = Math.hypot(tdx,tdy)||1;
      const sp = Math.hypot(b.vx,b.vy)||1;
      const wantVx = (tdx/td)*sp, wantVy = (tdy/td)*sp;
      b.vx = lerp(b.vx, wantVx, 0.04);
      b.vy = lerp(b.vy, wantVy, 0.04);
    }
    // ETG-style spore DRIFT — Big Mushroom spores wander randomly
    if(b.drift){
      b.driftT = (b.driftT||0) - dt;
      if(b.driftT <= 0){
        b.driftT = rand(0.35, 1.0);
        const da = rand(0, TAU);
        const ds = rand(18, 42);
        b.vx = Math.cos(da)*ds; b.vy = Math.sin(da)*ds;
      }
    }
    const prevX = b.x, prevY = b.y;
    b.x += b.vx*dt; b.y += b.vy*dt;
    if(b.life<=0){
      // ETG-style: enemy bullets only die on wall collision, not by timer.
      // Exceptions: spore (timer), mortar/rocket/grenade (explode), flame (burnout).
      const isExplosive = (b.type==='mortar'||b.type==='rocket'||b.type==='grenade');
      const hasTimer = b.friendly || b.type==='spore' || b.type==='flame' || isExplosive;
      if(!hasTimer){
        // Keep alive — only walls kill it. Remove if somehow left the room.
        if(b.x < -TILE || b.x > ROOM_PX_W+TILE || b.y < -TILE || b.y > ROOM_PX_H+TILE){
          bullets.splice(i,1); continue;
        }
        b.life = 5; continue; // reset timer and keep going
      }
      if(b.type==='mortar' || b.type==='rocket'){ explode(b.x,b.y, r, b.dmg+1); shakeCam(2); }
      if(b.type==='grenade'){ explode(b.x,b.y, r, b.dmg); shakeCam(3); }
      bullets.splice(i,1); continue;
    }
    // wall hit
    const tx = Math.floor(b.x/TILE), ty = Math.floor(b.y/TILE);
    if(isWall(r, tx, ty)){
      // grenade / plasma bounce off walls
      if((b.type==='grenade' || b.type==='plasma') && b.bounces>0){
        b.bounces--;
        // figure out which axis hit by trying revert + axis test
        const txPrev = Math.floor(prevX/TILE), tyPrev = Math.floor(prevY/TILE);
        const hitX = isWall(r, tx, tyPrev);
        const hitY = isWall(r, txPrev, ty);
        if(hitX) b.vx = -b.vx;
        if(hitY) b.vy = -b.vy;
        if(!hitX && !hitY){ b.vx = -b.vx; b.vy = -b.vy; }
        b.x = prevX; b.y = prevY;
        for(let k=0;k<3;k++) spawnPart(b.x, b.y, {vx:rand(-20,20),vy:rand(-20,20),life:0.18,c:b.color,sz:1});
        sfxEnemyHit && sfxEnemyHit();
        continue;
      }
      for(let k=0;k<4;k++) spawnPart(b.x, b.y, {vx:rand(-30,30),vy:rand(-30,30),life:0.25,c:b.color,sz:1});
      if(b.type==='rocket' || b.type==='mortar'){ explode(b.x,b.y, r, b.dmg+1); shakeCam(2); }
      if(b.type==='grenade'){ explode(b.x,b.y, r, b.dmg); shakeCam(3); }
      bullets.splice(i,1); continue;
    }
    // table cover — only flipped tables block bullets
    let coverHit = false;
    for(const p of r.props){
      if(p.type!=='table' || p.hp<=0 || !p.flipped) continue;
      if(b.x > p.x+1 && b.x < p.x+p.w-1 && b.y > p.y+1 && b.y < p.y+p.h-1){
        p.hp -= b.dmg;
        for(let k=0;k<5;k++) spawnPart(b.x, b.y, {vx:rand(-50,50),vy:rand(-50,50),life:0.3,c:'#7c4f2c',sz:1});
        if(p.hp<=0){
          for(let k=0;k<14;k++) spawnPart(p.x+p.w/2, p.y+p.h/2, {vx:rand(-80,80),vy:rand(-80,80),life:0.6,c:'#5a3a20',sz:2,grav:140,fric:0.95});
          sfxKill();
        }
        if(b.type==='rocket'||b.type==='mortar'){ explode(b.x,b.y,r,b.dmg+1); shakeCam(2); }
        coverHit = true;
        break;
      }
    }
    if(coverHit){ bullets.splice(i,1); continue; }
    if(b.friendly){
      // enemies — pick the NEAREST overlapping enemy (not the first found),
      // so a bullet that visually overlaps a target hits THAT target rather
      // than some other enemy whose bounding box happens to be sorted earlier.
      let hit = null, hitD = Infinity;
      for(const e of r.entities){
        if(e.dead) continue;
        if(b.hits && b.hits.includes(e)) continue;
        const dxh = b.x - e.x, dyh = b.y - e.y;
        if(Math.abs(dxh) < e.w/2+2 && Math.abs(dyh) < e.h/2+2){
          const dd = dxh*dxh + dyh*dyh;
          if(dd < hitD){ hitD = dd; hit = e; }
        }
      }
      if(hit){
        let dmg = b.dmg;
        if(hasAug('hollow')) dmg *= 1.15;
        if(hasAug('over') && player.reloading) dmg *= 1.25;
        if(hasAug('crit') && Math.random()<0.15){ dmg *= 2; dmgNum(hit.x, hit.y-8, dmg, '#f0b429'); }
        else dmgNum(hit.x, hit.y-8, dmg, '#fff');
        damageEnemy(hit, dmg, b.vx, b.vy, w.kb||0.6);
        runStats.hits++;
        for(let k=0;k<5;k++) spawnPart(b.x, b.y, {vx:rand(-50,50),vy:rand(-50,50),life:0.3,c:b.color,sz:1});
        if(b.type==='rocket'){ explode(b.x,b.y, r, b.dmg); bullets.splice(i,1); continue; }
        if(b.type==='grenade'){ explode(b.x,b.y, r, b.dmg); bullets.splice(i,1); continue; }
        if(b.type==='flame' && b.burnT){
          hit.burnT = Math.max(hit.burnT||0, b.burnT);
          hit.burnDmg = Math.max(hit.burnDmg||0, b.burnDmg||4);
          // bullet keeps flying through enemies briefly
          b.hits = b.hits||[]; b.hits.push(hit);
          continue;
        }
        if(b.type==='acid' && b.poisonT){
          hit.poisonT = Math.max(hit.poisonT||0, b.poisonT);
          hit.poisonDmg = Math.max(hit.poisonDmg||0, b.poisonDmg||5);
        }
        if(b.type==='plasma' && b.bounces>0){
          // plasma keeps bouncing after hitting an enemy
          b.hits = b.hits||[]; b.hits.push(hit);
          // small bounce effect
          for(let k=0;k<6;k++) spawnPart(b.x,b.y,{vx:rand(-40,40),vy:rand(-40,40),life:0.25,c:'#9be7ff',sz:1});
          continue;
        }
        if(b.type==='chain'){
          // chain to nearest other enemy
          let target=null, td=80;
          for(const e2 of r.entities){
            if(e2===hit||e2.dead) continue;
            const d = dist(hit.x,hit.y,e2.x,e2.y);
            if(d<td){ td=d; target=e2; }
          }
          if(target){
            spawnArc(hit.x,hit.y,target.x,target.y);
            damageEnemy(target, dmg*0.7, target.x-hit.x, target.y-hit.y, 0.2);
            dmgNum(target.x, target.y-8, dmg*0.7, '#39c0ed');
          }
          bullets.splice(i,1); continue;
        }
        if(b.type==='pierce'){
          b.hits = b.hits||[]; b.hits.push(hit);
          continue;
        }
        bullets.splice(i,1); continue;
      }
      // breakable props
      for(const p of r.props){
        if(p.type==='barrel' && p.hp>0){
          if(Math.abs(b.x-(p.x+p.w/2))<p.w/2 && Math.abs(b.y-(p.y+p.h/2))<p.h/2){
            p.hp -= b.dmg;
            for(let k=0;k<5;k++) spawnPart(b.x, b.y, {vx:rand(-50,50),vy:rand(-50,50),life:0.3,c:'#7c4f2c',sz:1});
            if(p.hp<=0){
              p.broken=true;
              if(Math.random()<0.7) spawnPickup('coin', p.x+p.w/2, p.y+p.h/2, 2);
              sfxKill();
            }
            if(b.type==='rocket'){ explode(b.x,b.y,r,b.dmg); }
            bullets.splice(i,1); break;
          }
        }
      }
    } else {
      // enemy bullet -> player
      if(player.invul<=0 && Math.abs(b.x-player.x)<player.w/2+1 && Math.abs(b.y-player.y)<player.h/2+1){
        hurtPlayer(b.dmg, b.vx, b.vy);
        for(let k=0;k<5;k++) spawnPart(b.x, b.y, {vx:rand(-50,50),vy:rand(-50,50),life:0.3,c:b.color,sz:1});
        bullets.splice(i,1); continue;
      }
    }
  }

  // particles
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.life -= dt;
    p.vx *= p.fric; p.vy *= p.fric;
    p.vy += p.grav*dt;
    p.x += p.vx*dt; p.y += p.vy*dt;
    if(p.life<=0) particles.splice(i,1);
  }
  // corpses decay
  for(let i=corpses.length-1;i>=0;i--){
    const c = corpses[i];
    c.life -= dt;
    if(c.life<=0) corpses.splice(i,1);
  }
  // ability cooldowns
  if(player.cloakT) player.cloakT = Math.max(0, player.cloakT - dt);
  if(player.abilityCool) player.abilityCool = Math.max(0, player.abilityCool - dt);
  // ability key (Q)
  if(keys['q'] && state===STATE.RUN && player.abilityCool<=0 && player.abilityCharges>0){
    keys['q']=false;
    useAbility();
  }
  // BLANK key (B) — Enter the Gungeon style screen-clearing bomb.
  // Wipes every enemy bullet on screen, knocks all enemies away from
  // the player, brief invuln, screen flash + shake.
  if(keys['b'] && state===STATE.RUN && player.blanks>0){
    keys['b']=false;
    useBlank();
  }
  if(player.blankFlashT>0) player.blankFlashT = Math.max(0, player.blankFlashT - dt);
  // damage numbers
  for(let i=damageNumbers.length-1;i>=0;i--){
    const d = damageNumbers[i];
    d.y -= dt*16; d.life -= dt;
    if(d.life<=0) damageNumbers.splice(i,1);
  }
  // banners
  for(let i=banners.length-1;i>=0;i--){
    banners[i].dur -= dt;
    if(banners[i].dur<=0) banners.splice(i,1);
  }

  // pickups
  for(let i=pickups.length-1;i>=0;i--){
    const p = pickups[i];
    if(p.life !== Infinity) p.life -= dt;
    if(p.pickupCooldown){ p.pickupCooldown = Math.max(0, p.pickupCooldown - dt); }
    if(p.kind === 'weapon'){ p.pulseT = (p.pulseT||0) + dt; }
    const d = dist(p.x,p.y,player.x,player.y);
    // magnet — small consumables only when room is cleared; weapons stay put
    const _roomCleared2 = curRoom && curRoom().cleared;
    if(p.kind !== 'weapon' && d < 22 && _roomCleared2){
      const a = Math.atan2(player.y-p.y, player.x-p.x);
      p.x += Math.cos(a)*120*dt; p.y += Math.sin(a)*120*dt;
    }
    // pickup radius
    const pickRadius = (p.kind === 'weapon') ? 12 : 8;
    if(d < pickRadius && (!p.pickupCooldown || p.pickupCooldown <= 0)){
      if(p.kind === 'weapon'){
        // Weapons require [E] to pick up; outline + prompt are shown in rendering
        if(keys['e']){
          keys['e'] = false;
          const wpn = WEAPONS.find(w => w.id === p.wid);
          if(wpn){
            acquireWeapon(p.wid, p.x, p.y);
            sfxPickup();
            pickups.splice(i,1);
          }
        }
        continue;
      }
      // noAutoPickup hearts (chest loot) — player must press [E], not auto-collect
      if(p.kind==='heart' && p.noAutoPickup){
        if(keys['e']){ keys['e']=false; player.hp=Math.min(player.maxHp, player.hp+p.amt); sfxPickup(); pickups.splice(i,1); }
        continue;
      }
      if(p.kind==='coin'){ player.credits += p.amt; }
      else if(p.kind==='heart'){ player.hp = Math.min(player.maxHp, player.hp + p.amt); }
      else if(p.kind==='ammo'){ player.ammo = Math.min(player.mag, player.ammo + Math.ceil(player.mag/2)); if(player.ammo===0) player.ammo = player.mag; }
      else if(p.kind==='key'){ player.keys += p.amt; }
      sfxPickup();
      pickups.splice(i,1); continue;
    }
    if(p.life !== Infinity && p.life<=0) pickups.splice(i,1);
  }

  // door check
  if(!isHub){ tryEnterDoor(); }
  else {
    // in hub: east door takes you to first sector
    const r = curRoom();
    if(player.x > ROOM_PX_W-TILE-4 && Math.abs(player.y - ((ROOM_H-1)/2*TILE+TILE/2)) < TILE){
      sfxDoor();
      spawnBanner('DEPLOYING TO SECTOR 01', '', 1.2);
      setTimeout(()=>{ startRun(1); }, 800);
    }
  }

  // ambient torch flicker + barrel rolling + teleporter pulse
  for(const p of (curRoom().props||[])){
    if(p.type==='torch'){ if(Math.random()<0.1) p.frame = (p.frame+1)%4; }
    if(p.type==='teleporter'){ p.tT = (p.tT||0) + dt; }
    if(p.type==='barrel' && p.rolling > 0 && p.hp>0 && !p.broken){
      p.rolling -= dt;
      // motion-line trail
      p.trail = p.trail || [];
      p.trail.push({x:p.x+p.w/2, y:p.y+p.h/2, life:0.35});
      if(p.trail.length > 8) p.trail.shift();
      const cur = curRoom();
      // Helper: is a given barrel bounding box blocked by walls or solid props?
      const barrelBlocked = (bx, by) => {
        const corners = [[bx,by],[bx+p.w-1,by],[bx,by+p.h-1],[bx+p.w-1,by+p.h-1]];
        for(const [cx,cy] of corners){
          if(isWall(cur, Math.floor(cx/TILE), Math.floor(cy/TILE))) return true;
        }
        for(const o of cur.props){
          if(o===p || o.broken) continue;
          if(o.type==='torch'||o.type==='teleporter'||o.type==='skull') continue;
          if(o.type==='chest' && o.opened) continue;
          const ow=o.w||14, oh=o.h||14;
          if(bx < o.x+ow && bx+p.w > o.x && by < o.y+oh && by+p.h > o.y) return true;
        }
        return false;
      };
      // ETG-style: move each axis independently — bounce off walls & props, NEVER break on them
      const nx = p.x + p.vx*dt;
      if(!barrelBlocked(nx, p.y)){
        p.x = nx;
      } else {
        p.vx *= -0.65;
        for(let k=0;k<4;k++) spawnPart(p.x+p.w/2, p.y+p.h/2, {vx:rand(-30,30),vy:rand(-20,20),life:0.22,c:'#7c4f2c',sz:1,fric:0.95});
      }
      const ny = p.y + p.vy*dt;
      if(!barrelBlocked(p.x, ny)){
        p.y = ny;
      } else {
        p.vy *= -0.65;
        for(let k=0;k<4;k++) spawnPart(p.x+p.w/2, p.y+p.h/2, {vx:rand(-20,20),vy:rand(-30,30),life:0.22,c:'#7c4f2c',sz:1,fric:0.95});
      }
      // Player contact — barrel pushes player back, does NOT break
      if(!player.dead){
        const ppx = player.x - player.w/2, ppy = player.y - player.h/2;
        if(p.x < ppx+player.w && p.x+p.w > ppx && p.y < ppy+player.h && p.y+p.h > ppy){
          p.vx *= -0.5; p.vy *= -0.5;
          player.invul = Math.max(player.invul, 0.15);
          shakeCam(1);
        }
      }
      // damage enemies in path — barrel BREAKS only on enemy hit (ETG-style)
      for(const e of (cur.entities||[])){
        if(e.dead) continue;
        if(Math.abs(e.x - (p.x+p.w/2)) < e.w/2+p.w/2 && Math.abs(e.y - (p.y+p.h/2)) < e.h/2+p.h/2){
          damageEnemy(e, 18, p.vx, p.vy, 1.6);
          dmgNum(e.x, e.y-8, 18, '#f0b429');
          p.hp = 0; p.broken = true; sfxKill(); shakeCam(2);
          if(Math.random()<0.7) spawnPickup('coin', p.x+p.w/2, p.y+p.h/2, 2);
          for(let k=0;k<14;k++) spawnPart(p.x+p.w/2, p.y+p.h/2, {vx:rand(-90,90),vy:rand(-90,90),life:0.5,c:'#7c4f2c',sz:2,grav:240,fric:0.94});
          break;
        }
      }
      // friction
      p.vx *= 0.97; p.vy *= 0.97;
      if(p.rolling <= 0 || (Math.abs(p.vx) < 5 && Math.abs(p.vy) < 5)){
        p.vx = p.vy = 0; p.rolling = 0;
      }
    }
    if(p.trail){
      for(let ti=p.trail.length-1; ti>=0; ti--){ p.trail[ti].life -= dt; if(p.trail[ti].life<=0) p.trail.splice(ti,1); }
    }
  }
  // teleporter interaction
  {
    const cur = curRoom();
    if(cur.props){
      for(const tp of cur.props){
        if(tp.type!=='teleporter') continue;
        if(dist(player.x, player.y, tp.x+10, tp.y+11) < 12){
          if(keys['e']){
            keys['e'] = false;
            const wasReturn = !!tp.returnDest;
            // Save exact player position BEFORE room change for precision return
            const fromReturnPos = {x: player.x, y: player.y};
            const savedReturnPos = tp.returnPos || null; // where we came FROM if this is a return portal
            // Determine destination —————————————————————————————————————————
            let destKey = tp.returnDest || null;
            if(!destKey){
              const candidates = Object.keys(dungeon).filter(k=>{
                if(k === curRoomKey) return false;
                const dr = dungeon[k];
                if(!dr.visited) return false;
                if(!dr.props) return false;
                return dr.props.some(p=>p.type==='teleporter');
              });
              if(candidates.length > 0){
                destKey = candidates[Math.floor(Math.random()*candidates.length)];
              }
            }
            // ————————————————————————————————————————————————————————————————
            if(destKey && dungeon[destKey]){
              const fromKey = curRoomKey;
              const pulseCol = wasReturn ? '#b060ff' : '#39c0ed';
              const pulse = ()=>{ for(let k=0;k<24;k++) spawnPart(player.x, player.y, {vx:rand(-160,160),vy:rand(-160,160),life:0.5,c:pulseCol,sz:2}); };
              pulse();
              sfxLockOpen();
              savePickupsToRoom(fromKey);
              curRoomKey = destKey;
              const nr = dungeon[curRoomKey];
              nr.visited = true;
              if(!nr.props || nr.props.length===0) buildRoom(nr);
              restorePickupsFromRoom(nr);
              // Place player: if returning, restore EXACT saved position; else land on dest pad
              let landed = false;
              if(wasReturn && savedReturnPos){
                player.x = savedReturnPos.x; player.y = savedReturnPos.y;
                landed = true;
              }
              if(!landed && nr.props){
                for(const tpd of nr.props){
                  if(tpd.type==='teleporter'){
                    player.x = tpd.x + 10; player.y = tpd.y + 16;
                    // Mark dest pad as return portal (purple) — stores exact origin position
                    tpd.returnDest = fromKey;
                    tpd.returnPos = fromReturnPos;
                    landed = true; break;
                  }
                }
              }
              if(!landed){ player.x = ROOM_PX_W/2; player.y = ROOM_PX_H/2 + 14; }
              // Clear the source pad (no longer a return portal)
              tp.returnDest = null;
              tp.returnPos = null;
              ensureSafeLanding(nr);
              bullets.length = 0;
              pulse();
              spawnBanner(wasReturn ? 'RETURNED' : 'TELEPORTED', '', 1.0);
            } else { sfxDeny(); spawnBanner('NO TELEPORTER NEARBY','CLEAR MORE ROOMS',1.0); }
          }
        }
      }
    }
  }

  // shop trigger / aug trigger when entering room
  if(curRoom().type === RT.SHOP && state===STATE.RUN){
    // open shop UI when player near shopkeeper
    const sk = curRoom().props.find(p=>p.type==='shopkeep');
    if(sk && dist(player.x,player.y, sk.x+7, sk.y+18)<22 && keys['e']){
      keys['e']=false; state = STATE.SHOP;
    }
  }
  if(curRoom().type === RT.AUG && state===STATE.RUN && !curRoom().augTaken){
    const ped = curRoom().props.find(p=>p.type==='pedestal');
    if(ped && dist(player.x,player.y, ped.x+7, ped.y+6)<22){
      state = STATE.AUG;
    }
  }
  // Universal chest interaction — works for RT.CHEST rooms AND boss rooms (black chests)
  for(const ch of (curRoom().props||[]).filter(p=>p.type==='chest')){
    if(!ch.opened && dist(player.x,player.y, ch.x+7, ch.y+6)<14 && keys['e']){
      keys['e']=false;
      if(!ch.isCache && !ch.bossChest && player.keys<=0){ sfxDeny(); spawnBanner('NO KEY','Find a key to unlock this chest',1.4); continue; }
      if(!ch.isCache && !ch.bossChest) player.keys--;
      ch.opened=true; sfxPickup();
      // ── WEAPONS CACHE (hub one-time chest) ──────────────────────────────────
      if(ch.isCache){
        const cachePool = WEAPONS.filter(w=>!w.exclusive);
        const wpn = cachePool[irand(0, cachePool.length-1)];
        spawnWeaponPickup(ch.x+7, ch.y + (ch.h||12) + 10, wpn.id);
        spawnBanner('CACHE OPENED', wpn.name+' · Press [E] to pick up', 2.4);
        spawnPickup('coin', ch.x+7, ch.y, 3);
      } else {
        // Loot quality scales with tier — better chest, better gun + more coins.
        // brown < blue < green < red < black < rainbow.
        const tier = ch.tier || 'brown';
        const tierIdx = ({brown:0, blue:1, green:2, red:3, black:4, rainbow:5})[tier] || 0;
        // black chests: always drop a legendary exclusive weapon
        let wpn;
        if(tier === 'black'){
          const legendaries = WEAPONS.filter(w=>w.exclusive);
          wpn = legendaries[irand(0, legendaries.length-1)];
        } else {
          const nonExclusive = WEAPONS.filter(w=>!w.exclusive);
          const wMin = Math.min(nonExclusive.length-1, 2 + tierIdx);
          wpn = nonExclusive[irand(wMin, nonExclusive.length-1)];
        }
        spawnWeaponPickup(ch.x+7, ch.y+10, wpn.id);
        spawnBanner(wpn.name+' DROPPED', wpn.rarity+' · '+(wpn.dmg)+' DMG · Press [E] to pick up', 2.4);
        const coinAmt = 6 + tierIdx*4;
        spawnPickup('coin', ch.x+7, ch.y, coinAmt);
        if(tier === 'rainbow' && Math.random() < 0.5){
          spawnPickup('heart', ch.x+7, ch.y+6, 1);
          // Mark as interact item — player must press [E], not auto-collect
          pickups[pickups.length-1].noAutoPickup = true;
          pickups[pickups.length-1].life = Infinity;
        }
        if(tier === 'rainbow'){
          player.blanks = Math.min(player.maxBlanks, player.blanks + 1);
        }
      }
    }
  }
  // hub interaction
  if(isHub){
    for(const ped of (curRoom().props||[])){
      if(ped.type==='pedestal' && dist(player.x,player.y, ped.x+7, ped.y+6)<14 && keys['e']){
        keys['e']=false;
        if(ped.action==='deploy'){
          spawnBanner('DEPLOYING TO SECTOR 01', '', 1.2);
          setTimeout(()=>{ startRun(1); }, 800);
        }
      }
    }
  }

  // intensity for music
  const enemiesAlive = (curRoom().entities||[]).length;
  const target = isHub ? 0 : Math.min(1, enemiesAlive/6);
  intensity = lerp(intensity, target, dt*2);
  musicTick(dt, intensity);

  // camera — follows player with clamping (closer Gungeon-style framing via zoom)
  cam.shake = Math.max(0, cam.shake - dt*30);
  cam.shakeX = (Math.random()-0.5)*cam.shake;
  cam.shakeY = (Math.random()-0.5)*cam.shake;
  const z = cam.zoom;
  // viewport in world units (inside HUD bars: top 12px, bottom 22px)
  const vpW = W/z, vpH = (H-12-22)/z;
  const vpCx = vpW/2;
  const vpCy = 12/z + vpH/2; // center y in screen-coord/zoom
  // target offset so player is centered
  let tOffX = vpCx - player.x;
  let tOffY = vpCy - player.y;
  // clamp so room fills viewport (or center if room is smaller than viewport on that axis)
  if(ROOM_PX_W >= vpW){
    tOffX = clamp(tOffX, W/z - ROOM_PX_W, 0);
  } else {
    tOffX = (W/z - ROOM_PX_W)/2;
  }
  if(ROOM_PX_H >= vpH){
    tOffY = clamp(tOffY, (H-26)/z - ROOM_PX_H, 18/z);
  } else {
    tOffY = 12/z + (vpH - ROOM_PX_H)/2;
  }
  cam.offX = tOffX; cam.offY = tOffY;
}

function startReload(){
  if(player.ammo===player.mag) return;
  player.reloading = true;
  player.reloadT = WEAPON_BY_ID[player.weapon].reload;
  sfxReload();
}

function fire(w, x, y, ang){
  sfxShoot(); shakeCam(0.6);
  // muzzle flash
  for(let i=0;i<4;i++) spawnPart(x+Math.cos(ang)*8, y+Math.sin(ang)*8, {vx:Math.cos(ang)*60+rand(-30,30), vy:Math.sin(ang)*60+rand(-30,30), life:0.15, c:'#f7c14a', sz:1});
  for(let i=0;i<w.count;i++){
    const a = ang + (Math.random()*2-1)*w.spread;
    let bLife;
    if(w.type==='rocket') bLife = 1.4;
    else if(w.type==='flame') bLife = 0.28;
    else if(w.type==='grenade') bLife = 1.1;
    else if(w.type==='plasma') bLife = 1.4;
    else if(w.type==='acid') bLife = 0.9;
    else bLife = 0.7;
    const b = {
      x, y, vx:Math.cos(a)*w.speed, vy:Math.sin(a)*w.speed,
      life: bLife,
      dmg: w.dmg, friendly:true, color:w.color, type:w.type, sz: w.type==='rail'?2:1,
      wid: w.id  // weapon id for per-gun bullet sprite selection
    };
    if(w.type==='plasma') b.bounces = 4;
    if(w.type==='grenade') b.bounces = 2;
    if(w.type==='acid'){ b.poisonDmg = 6; b.poisonT = 2.5; }
    if(w.type==='flame'){ b.burnDmg = 5; b.burnT = 1.8; }
    spawnBullet(b);
  }
  // shells (skip for energy/grenade-style weapons)
  if(w.type==='b' || w.type==='pierce' || w.type==='rifle'){
    spawnPart(x, y, {vx:Math.cos(ang+Math.PI/2)*30, vy:Math.sin(ang+Math.PI/2)*30-20, life:0.6, c:'#f0b429', sz:1, grav:120, fric:0.95});
  }
}

function explode(x,y,room,dmg){
  sfxBoom(); shakeCam(8);
  for(let i=0;i<24;i++) spawnPart(x,y,{vx:rand(-160,160),vy:rand(-160,160),life:0.6,c:i%2?'#f0b429':'#d7263d',sz:2,fric:0.9});
  for(const e of room.entities){
    const d = dist(x,y,e.x,e.y);
    if(d<28){ damageEnemy(e, dmg*1.2*(1-d/30), e.x-x, e.y-y, 1.5); dmgNum(e.x,e.y-8,dmg,'#d7263d'); }
  }
  if(dist(x,y,player.x,player.y)<26 && player.invul<=0){ hurtPlayer(1, player.x-x, player.y-y); }
}

function spawnArc(x1,y1,x2,y2){
  const steps = 6;
  for(let i=0;i<steps;i++){
    const t = i/steps;
    spawnPart(lerp(x1,x2,t)+rand(-3,3), lerp(y1,y2,t)+rand(-3,3), {vx:0,vy:0,life:0.18,c:'#39c0ed',sz:1});
  }
}

function damageEnemy(e, dmg, vx, vy, kb){
  e.hp -= dmg; e.hit = 0.12;
  const a = Math.atan2(vy, vx);
  e.vx += Math.cos(a)*100*kb;
  e.vy += Math.sin(a)*100*kb;
  sfxEnemyHit();
  if(e.hp<=0) e.dead = true;
}

function hurtPlayer(dmg, kx, ky){
  if(hasAug('plate')) dmg *= 0.8;
  player.hp -= Math.ceil(dmg);
  player.invul = 1.0;
  sfxHit(); shakeCam(6);
  for(let i=0;i<14;i++) spawnPart(player.x, player.y, {vx:rand(-80,80),vy:rand(-80,80),life:0.4,c:'#d7263d',sz:1});
  if(hasAug('react')){
    // shockwave
    const r = curRoom();
    for(const e of r.entities){
      const d = dist(player.x,player.y,e.x,e.y);
      if(d<32){ damageEnemy(e, 8, e.x-player.x, e.y-player.y, 1.2); dmgNum(e.x,e.y-8,8,'#39c0ed'); }
    }
  }
  if(player.hp<=0){ player.hp=0; killPlayer(); }
}

function spawnPickup(kind, x, y, amt){
  pickups.push({kind, x, y, amt, life: 30, vx:rand(-20,20), vy:rand(-30,-10)});
}
// Save all live pickups into the room so they survive a room transition.
// Life is set to Infinity so stored pickups never expire on re-entry.
function savePickupsToRoom(roomKey){
  const room = dungeon[roomKey];
  if(!room) return;
  room.savedPickups = pickups.map(p=>Object.assign({}, p, {life: Infinity, vx:0, vy:0}));
}
// Pull stored pickups back into the live array when re-entering a room.
function restorePickupsFromRoom(room){
  pickups.length = 0;
  if(room.savedPickups && room.savedPickups.length){
    for(const p of room.savedPickups) pickups.push(p);
    room.savedPickups = [];
  }
}
// WEAPON pickups don't expire and don't get magneted — the player has to walk
// onto them to swap weapons. wid is a string id from the WEAPONS table.
function spawnWeaponPickup(x, y, wid){
  pickups.push({
    kind: 'weapon', wid, x, y,
    life: Infinity,           // never times out
    vx: rand(-8,8), vy: rand(-12,-4),
    pulseT: 0,                // for the floating glow
    pickupCooldown: 0.7       // small grace so it doesn't insta-pickup as it spawns
  });
}
// pickup gravity-ish (slight drift) + ETG-style coin magnet when room cleared
setInterval(()=>{
  const roomCleared = (typeof curRoom === 'function') && curRoom && curRoom() && curRoom().cleared;
  for(const p of pickups){
    if(p.kind!=='weapon' && roomCleared && (p.kind==='coin'||p.kind==='ammo'||p.kind==='key')){
      // attract coins/ammo/keys to player like ETG room-cleared magnet
      const adx = player.x - p.x, ady = player.y - p.y;
      const ad = Math.hypot(adx,ady)||1;
      const spd = Math.min(280, 60 + 3000/Math.max(ad,8));
      p.vx = lerp(p.vx, (adx/ad)*spd, 0.28);
      p.vy = lerp(p.vy, (ady/ad)*spd, 0.28);
    } else {
      p.vx*=0.85; p.vy*=0.9;
    }
    p.x+=p.vx*0.05; p.y+=p.vy*0.05;
  }
}, 50);

function doInteract(){ /* handled in update for proximity */ }

/* ---------- Enemy AI ---------- */
function applyDoT(e, dt){
  // Burn damage (yellow numbers) — fast ticks
  if(e.burnT && e.burnT>0){
    e.burnT -= dt;
    e.burnTick = (e.burnTick||0) - dt;
    if(e.burnTick<=0){
      e.burnTick = 0.25;
      const dmg = (e.burnDmg||4) * 0.25;
      e.hp -= dmg; e.hit = 0.08;
      dmgNum(e.x, e.y-8, Math.max(1, Math.round(dmg)), '#ff7a18');
      spawnPart(e.x+rand(-4,4), e.y+rand(-6,2), {vx:rand(-10,10),vy:rand(-30,-10),life:0.4,c:'#ff7a18',sz:1,fric:0.95});
      if(e.hp<=0){ e.dead = true; }
    }
  }
  // Poison damage (green numbers) — slow ticks
  if(e.poisonT && e.poisonT>0){
    e.poisonT -= dt;
    e.poisonTick = (e.poisonTick||0) - dt;
    if(e.poisonTick<=0){
      e.poisonTick = 0.4;
      const dmg = (e.poisonDmg||5) * 0.4;
      e.hp -= dmg; e.hit = 0.06;
      dmgNum(e.x, e.y-8, Math.max(1, Math.round(dmg)), '#29c46d');
      spawnPart(e.x+rand(-4,4), e.y+rand(-4,2), {vx:rand(-8,8),vy:rand(-22,-6),life:0.5,c:'#29c46d',sz:1,fric:0.95});
      if(e.hp<=0){ e.dead = true; }
    }
  }
}

function updateEnemy(e, dt, room){
  applyDoT(e, dt);
  e.hit = Math.max(0, e.hit - dt);
  e.atkT = Math.max(0, e.atkT - dt);
  e.anim += dt;
  if(e.frame !== undefined && Math.floor(e.anim*6)%2 !== e.frame) e.frame = Math.floor(e.anim*6)%2;
  if(e.dead) return;
  // cloaked player drops aggression
  const seePlayer = !(player.cloakT && player.cloakT>0);
  const dx = (seePlayer? player.x : e.lastSeenX||player.x) - e.x;
  const dy = (seePlayer? player.y : e.lastSeenY||player.y) - e.y;
  const d = Math.hypot(dx,dy)||1;
  let ax = dx/d, ay = dy/d;
  if(seePlayer){ e.lastSeenX = player.x; e.lastSeenY = player.y; }
  // Pathfinding: when the direct line to the player is blocked by walls/tables,
  // route around obstacles using BFS. Cached frequently per enemy.
  // Flying enemies pathfind too, but only when their direct path is blocked.
  e.pathT = (e.pathT || 0) - dt;
  if(e.pathT <= 0){
    e.pathT = 0.08 + Math.random()*0.07;
    if(losClear(room, e.x, e.y, player.x, player.y)){
      e.pathStep = null;
      e.stuckT = 0;
    } else {
      e.pathStep = findPathStep(room, e.x, e.y, player.x, player.y);
    }
  }
  // detect stuck-against-wall: if barely moving while wanting to move, trigger a path refresh
  const wantSpd = Math.hypot(ax,ay) * (e.speed||30);
  const realSpd = Math.hypot(e.vx||0, e.vy||0);
  if(wantSpd > 8 && realSpd < 4){
    e.stuckT = (e.stuckT || 0) + dt;
    if(e.stuckT > 0.12){
      e.pathStep = findPathStep(room, e.x, e.y, player.x, player.y);
      e.pathT = 0.10;
      e.stuckT = 0;
    }
  } else { e.stuckT = 0; }
  // Wall-repulsion steering: nudge away from immediately adjacent wall tiles
  // so enemies glide around corners instead of hugging them.
  {
    const wtx = Math.floor(e.x/TILE), wty = Math.floor(e.y/TILE);
    let wrx=0, wry=0;
    if(isWall(room,wtx-1,wty)) wrx += 1;
    if(isWall(room,wtx+1,wty)) wrx -= 1;
    if(isWall(room,wtx,wty-1)) wry += 1;
    if(isWall(room,wtx,wty+1)) wry -= 1;
    const wrl = Math.hypot(wrx,wry);
    if(wrl > 0){ ax += (wrx/wrl)*0.30; ay += (wry/wrl)*0.30; }
  }
  if(e.pathStep){
    // override movement direction with the BFS step (slight bias toward direct chase)
    ax = e.pathStep[0]*0.85 + ax*0.15;
    ay = e.pathStep[1]*0.85 + ay*0.15;
  }

  function shoot(angle, speed, dmg, color, opts){
    const o = Object.assign({type:'enemy'}, opts||{});
    spawnBullet(Object.assign({x:e.x, y:e.y, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed,
      life:2.2, dmg:dmg, friendly:false, color:color}, o));
  }

  if(e.isBoss){
    e.fireCool -= dt;
    const lowHP = e.hp < e.maxHp/2;
    if(e.bossKind==='watcher'){
      if(e.fireCool<=0){
        const n = lowHP ? 14 : 9;
        for(let i=0;i<n;i++){
          const a = (i/n)*TAU + Math.random()*0.08 + e.anim*0.4;
          shoot(a, 90, 1, '#5b2a8c', {bossBullet:true, life:2.4});
        }
        sfxShoot(); shakeCam(2);
        e.fireCool = lowHP ? 1.2 : 1.9;
      }
      e.vx = lerp(e.vx, ax*e.speed, 0.05);
      e.vy = lerp(e.vy, ay*e.speed, 0.05);
    } else if(e.bossKind==='twin'){
      // strafing — orbits player and double-shots
      const tang = Math.atan2(dy,dx) + Math.PI/2 + (e.x<player.x?Math.PI:0);
      e.vx = lerp(e.vx, Math.cos(tang)*e.speed, 0.1);
      e.vy = lerp(e.vy, Math.sin(tang)*e.speed, 0.1);
      if(e.fireCool<=0){
        for(let s=-1;s<=1;s+=2){
          shoot(Math.atan2(dy,dx)+s*0.06, 130, 1, '#d7263d', {type:'enemy'});
        }
        sfxShoot();
        e.fireCool = lowHP? 0.45 : 0.7;
      }
    } else if(e.bossKind==='tread'){
      // slowly tracks; long mortar lobs + cannon volleys
      e.vx = lerp(e.vx, ax*e.speed, 0.04);
      e.vy = lerp(e.vy, ay*e.speed, 0.04);
      if(e.fireCool<=0){
        // 5-shot horizontal volley
        const a0 = Math.atan2(dy,dx);
        for(let i=-2;i<=2;i++){
          shoot(a0 + i*0.10, 140, 2, '#39c0ed', {type:'energy'});
        }
        // mortar lob
        shoot(a0, 90, 2, '#3a3a40', {type:'mortar'});
        sfxShoot(); shakeCam(3);
        e.fireCool = lowHP? 1.1 : 1.7;
      }
    } else if(e.bossKind==='mine'){
      // floats around, drops mines + spits sprays
      e.vx = lerp(e.vx, ax*e.speed*0.6, 0.06);
      e.vy = lerp(e.vy, ay*e.speed*0.6, 0.06);
      if(e.fireCool<=0){
        const a0 = Math.atan2(dy,dx);
        // spray of 3
        for(let i=-1;i<=1;i++) shoot(a0 + i*0.18, 110, 1, '#d7263d', {type:'enemy'});
        // drop slow mine bullet at self
        shoot(rand(0,TAU), 30, 2, '#3a3a40', {type:'mortar', life:3.5});
        sfxShoot();
        e.fireCool = lowHP? 0.8 : 1.2;
      }
    } else if(e.bossKind==='lich'){
      // Pursue slowly, alternating twin-pistol bursts. At low HP, fires a radial death wave.
      e.vx = lerp(e.vx, ax*e.speed*0.7, 0.05);
      e.vy = lerp(e.vy, ay*e.speed*0.7, 0.05);
      if(e.fireCool<=0){
        const a0 = Math.atan2(dy,dx);
        e.lichSide = !e.lichSide;
        const offset = e.lichSide ? -0.25 : 0.25;
        const burstSize = lowHP ? 5 : 3;
        for(let i=0;i<burstSize;i++){
          // both pistols fire spread bullets per pulse
          for(let s=-1;s<=1;s+=2){
            shoot(a0 + offset + s*0.05 + (i-burstSize/2)*0.07, 160, 1, '#d7263d', {type:'enemy', life:2.2});
          }
        }
        // low-HP radial death wave
        if(lowHP){
          for(let r=0;r<10;r++){
            shoot((r/10)*TAU + e.anim*0.3, 80, 1, '#5b2a8c', {type:'spore', life:2.4, bossBullet:true});
          }
        }
        sfxShoot(); shakeCam(2);
        e.fireCool = lowHP ? 0.7 : 1.2;
      }
    } else if(e.bossKind==='blobu'){
      // Hops toward player periodically + radial blob bursts.
      e.hopT = (e.hopT||0) - dt;
      if(e.hopT <= 0){
        e.hopT = 0.9 + Math.random()*0.5;
        e.vx = ax * e.speed * 1.8;
        e.vy = ay * e.speed * 1.8;
      }
      if(e.fireCool<=0){
        const n = lowHP ? 12 : 8;
        for(let i=0;i<n;i++){
          const a = (i/n)*TAU + e.anim*0.3;
          shoot(a, 70, 1, '#d7263d', {type:'spore', life:2.5, bossBullet:true});
        }
        sfxShoot();
        e.fireCool = lowHP ? 1.0 : 1.6;
      }
    } else if(e.bossKind==='duke'){
      // DUKE — gunslinger. Periodically dashes to a fresh angle off the player,
      // then unloads a 5-shot rapid burst. Below 50% HP fires double bursts.
      e.dashT = (e.dashT||0) - dt;
      if(e.dashT <= 0){
        // pick a destination ~80px from the player at a fresh angle
        const ang = Math.random()*TAU;
        const tx = clamp(player.x + Math.cos(ang)*90, TILE+8, ROOM_PX_W-TILE-8);
        const ty = clamp(player.y + Math.sin(ang)*90, TILE+8, ROOM_PX_H-TILE-8);
        e.vx = (tx - e.x) * 1.6;
        e.vy = (ty - e.y) * 1.6;
        e.dashT = lowHP ? 1.4 : 2.0;
        for(let k=0;k<8;k++) spawnPart(e.x, e.y, {vx:rand(-60,60),vy:rand(-60,60),life:0.3,c:'#d7263d',sz:1});
      } else {
        // strafe slowly while not dashing
        e.vx = lerp(e.vx, ax*e.speed*0.4, 0.06);
        e.vy = lerp(e.vy, ay*e.speed*0.4, 0.06);
      }
      if(e.fireCool<=0){
        const a0 = Math.atan2(dy,dx);
        // 5-shot rapid burst with slight spread
        for(let i=0;i<5;i++){
          shoot(a0 + (i-2)*0.05, 180, 1, '#f0b429', {type:'enemy', life:1.6});
        }
        if(lowHP){
          // double burst — second wave fans wider
          for(let i=0;i<5;i++){
            shoot(a0 + (i-2)*0.12, 160, 1, '#d7263d', {type:'enemy', life:1.8});
          }
        }
        sfxShoot(); shakeCam(2);
        e.fireCool = lowHP ? 0.7 : 1.1;
      }
    } else if(e.bossKind==='kraken'){
      // KRAKEN — stationary tentacled brain. Continuously fires homing
      // eye-bullets in a slow rotating spiral. Below 50% HP, spiral spins
      // faster and adds extra arms.
      // Drift very slowly toward room center to avoid getting cornered
      const cx = ROOM_PX_W/2, cy = ROOM_PX_H/2;
      const rx = (cx - e.x), ry = (cy - e.y);
      const rd = Math.hypot(rx, ry)||1;
      e.vx = lerp(e.vx, (rx/rd)*e.speed, 0.03);
      e.vy = lerp(e.vy, (ry/rd)*e.speed, 0.03);
      e.spiralAng = (e.spiralAng||0) + dt * (lowHP ? 2.4 : 1.5);
      if(e.fireCool<=0){
        const arms = lowHP ? 4 : 3;
        for(let s=0;s<arms;s++){
          const a = e.spiralAng + (s/arms)*TAU;
          shoot(a, 80, 1, '#9c5cd6', {type:'enemy', life:3.0, bossBullet:true, homing:true});
        }
        sfxShoot();
        e.fireCool = lowHP ? 0.18 : 0.28;
      }
    }
    e.vx *= 0.92; e.vy *= 0.92;
    moveEntity(room, e, e.vx*dt, e.vy*dt);
    return;
  }

  const ai = e.ai || 'rusher';
  if(ai==='shooter'){
    const desired = e.shotPattern==='spread'? 80 : 75;
    const m = (d - desired)/desired;
    e.vx = lerp(e.vx, ax*e.speed*m, 0.1);
    e.vy = lerp(e.vy, ay*e.speed*m, 0.1);
    e.fireCool -= dt;
    if(e.fireCool<=0 && d<170 && seePlayer){
      const a = Math.atan2(dy,dx);
      if(e.shotPattern==='spread'){
        for(let i=-2;i<=2;i++){
          shoot(a + i*0.12, 110, 1, e.shotColor, {type:'shotgun', life:1.0, iceBullet: !!e.iceShot});
        }
        e.fireCool = rand(1.7, 2.4);
      } else {
        shoot(a, 130, 1, e.shotColor, {type:'enemy', life:1.4});
        e.fireCool = rand(1.0, 1.7);
      }
      sfxShoot();
    }
  } else if(ai==='caster'){
    const desired = 90;
    const m = (d - desired)/desired;
    e.vx = lerp(e.vx, ax*e.speed*m, 0.08);
    e.vy = lerp(e.vy, ay*e.speed*m, 0.08);
    e.fireCool -= dt;
    if(e.fireCool<=0 && d<180 && seePlayer){
      const a = Math.atan2(dy,dx);
      // slow magic orb
      shoot(a, 80, 1, '#5b2a8c', {type:'spore', life:2.4});
      sfxShoot();
      e.fireCool = rand(1.6, 2.4);
    }
  } else if(ai==='arcer'){
    // moves to flanking distance, fires arcing (curving) bullets
    e.vx = lerp(e.vx, ax*e.speed, 0.08);
    e.vy = lerp(e.vy, ay*e.speed, 0.08);
    e.fireCool -= dt;
    if(e.fireCool<=0 && d<140 && seePlayer){
      const a = Math.atan2(dy,dx);
      for(let s=-1;s<=1;s+=2){
        shoot(a + s*0.4, 100, 1, e.shotColor, {type:'enemy', life:1.5});
      }
      e.fireCool = rand(1.4, 2.0);
      sfxShoot();
    }
  } else if(ai==='burst'){
    const desired = 80;
    const m = (d - desired)/desired;
    e.vx = lerp(e.vx, ax*e.speed*m, 0.1);
    e.vy = lerp(e.vy, ay*e.speed*m, 0.1);
    e.fireCool -= dt;
    if(e.fireCool<=0 && d<170 && seePlayer){
      if(e.burstLeft<=0) e.burstLeft = 3;
      const a = Math.atan2(dy,dx) + rand(-0.06,0.06);
      shoot(a, 150, 1, e.shotColor, {type:'enemy', life:1.2});
      sfxShoot();
      e.burstLeft--;
      e.fireCool = e.burstLeft>0 ? 0.10 : rand(1.4, 2.0);
    }
  } else if(ai==='mortar'){
    // slow approach, lobs heavy mortar shells with explosion
    e.vx = lerp(e.vx, ax*e.speed*0.6, 0.05);
    e.vy = lerp(e.vy, ay*e.speed*0.6, 0.05);
    e.fireCool -= dt;
    if(e.fireCool<=0 && seePlayer){
      const a = Math.atan2(dy,dx);
      shoot(a, 90, 2, '#3a3a40', {type:'mortar', life:1.6});
      sfxShoot(); shakeCam(1);
      e.fireCool = rand(1.6, 2.2);
    }
  } else if(ai==='homer'){
    // floats above; bullets weak homing
    e.vx = lerp(e.vx, ax*e.speed*0.6, 0.05);
    e.vy = lerp(e.vy, ay*e.speed*0.6, 0.05);
    e.fireCool -= dt;
    if(e.fireCool<=0 && d<200 && seePlayer){
      const a = Math.atan2(dy,dx);
      shoot(a, 90, 1, e.shotColor, {type:'energy', life:2.0, homing:true});
      sfxShoot();
      e.fireCool = rand(1.6, 2.4);
    }
  } else if(ai==='charger'){
    if(e.chargeT>0){
      e.chargeT -= dt;
      e.vx = lerp(e.vx, e.dirX*e.speed*3, 0.15);
      e.vy = lerp(e.vy, e.dirY*e.speed*3, 0.15);
      if(d<14 && player.invul<=0){ hurtPlayer(e.dmg+1, e.dirX, e.dirY); shakeCam(2); e.chargeT=0; }
    } else {
      e.windT -= dt;
      // slow approach
      e.vx = lerp(e.vx, ax*e.speed*0.5, 0.08);
      e.vy = lerp(e.vy, ay*e.speed*0.5, 0.08);
      if(e.windT<=0 && d<140 && seePlayer){
        e.dirX = ax; e.dirY = ay;
        e.chargeT = 0.6;
        e.windT = rand(1.5, 2.5);
        sfxShoot();
      }
    }
  } else if(ai==='mage'){
    e.tpCool -= dt;
    if(e.tpCool<=0 && d<120 && seePlayer){
      // teleport away from player
      let tx=e.x, ty=e.y, ok=false;
      for(let t=0;t<10;t++){
        const a = Math.atan2(dy,dx) + Math.PI + rand(-0.6,0.6);
        const r2 = rand(70,110);
        const nx = clamp(player.x + Math.cos(a)*r2, TILE+8, ROOM_PX_W-TILE-8);
        const ny = clamp(player.y + Math.sin(a)*r2, TILE+8, ROOM_PX_H-TILE-8);
        if(entityCanMove(room, nx-e.w/2, ny-e.h/2, e.w, e.h)){ tx=nx; ty=ny; ok=true; break; }
      }
      if(ok){
        for(let i=0;i<10;i++) spawnPart(e.x,e.y,{vx:rand(-50,50),vy:rand(-50,50),life:0.4,c:'#39c0ed',sz:1});
        e.x=tx; e.y=ty;
        for(let i=0;i<10;i++) spawnPart(e.x,e.y,{vx:rand(-50,50),vy:rand(-50,50),life:0.4,c:'#39c0ed',sz:1});
        sfxShoot();
      }
      e.tpCool = rand(2.5, 4.0);
    }
    e.fireCool -= dt;
    if(e.fireCool<=0 && d<160 && seePlayer){
      const a = Math.atan2(dy,dx);
      for(let i=-1;i<=1;i++) shoot(a + i*0.22, 100, 1, '#39c0ed', {type:'energy', life:1.6});
      sfxShoot();
      e.fireCool = rand(1.4, 2.0);
    }
  } else if(ai==='bigshroom'){
    // BIG MUSHROOM — slow wanderer, periodically puffs floating spores
    e.sporeCool = (e.sporeCool||0) - dt;
    if(e.sporeCool <= 0){
      e.sporeCool = rand(1.8, 3.2);
      const numSpores = irand(5, 9);
      for(let s=0; s<numSpores; s++){
        const a = rand(0, TAU);
        const sp = rand(22, 48);
        spawnBullet({x:e.x, y:e.y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
          life: rand(3.5, 5.5), dmg:1, friendly:false,
          color:'#7e3eb0', type:'spore', parentId: e.id, drift:true, driftT:0});
      }
      // puff particles
      for(let k=0;k<6;k++) spawnPart(e.x,e.y,{vx:rand(-25,25),vy:rand(-30,-8),life:0.5,c:'#9c5cd6',sz:2,fric:0.92});
      sfxShoot && sfxShoot();
    }
    // slow wander
    e.wanderT = (e.wanderT||0) - dt;
    if(e.wanderT <= 0){
      e.wanderT = rand(1.0, 2.5);
      e.wanderVx = rand(-16, 16);
      e.wanderVy = rand(-16, 16);
    }
    e.vx = lerp(e.vx, e.wanderVx||0, dt*1.5);
    e.vy = lerp(e.vy, e.wanderVy||0, dt*1.5);
  } else {
    // rusher / default melee chase
    e.vx = lerp(e.vx, ax*e.speed, 0.1);
    e.vy = lerp(e.vy, ay*e.speed, 0.1);
    if(d<14 && e.atkT<=0 && player.invul<=0){
      hurtPlayer(e.dmg, ax, ay);
      e.atkT = 0.6;
    }
    // BULLAT KAMIKAZE — bats can sacrifice themselves: they turn into a damaging
    // glowing-red bullet that homes in on the player, then the bat dies.
    if(e.type==='bat' && seePlayer && d>32 && d<160 && !e.kamikazed){
      e.kamiCool = (e.kamiCool == null) ? rand(1.5, 3.5) : (e.kamiCool - dt);
      if(e.kamiCool <= 0){
        e.kamikazed = true;
        const a = Math.atan2(dy, dx);
        // Bat literally becomes a purple-tipped homing red ball heading for the player.
        spawnBullet({
          x: e.x, y: e.y,
          vx: Math.cos(a)*180, vy: Math.sin(a)*180,
          dmg: 2, type:'energy', life:1.4,
          friendly:false, color:'#d7263d', homing:true, bossBullet:false
        });
        // burst of dark feathers + red sparks
        for(let p=0; p<12; p++){
          spawnPart(e.x, e.y, {vx:rand(-90,90), vy:rand(-90,90), life:0.5, c:p%2?'#5b2a8c':'#d7263d', sz:2, fric:0.9});
        }
        sfxShoot();
        e.dead = true;
        e.hp = 0;
      }
    }
  }

  // homing on enemy bullets handled in bullet update via b.homing flag (added below)
  e.vx *= 0.9; e.vy *= 0.9;
  moveEntity(room, e, e.vx*dt, e.vy*dt);
}

/* ---------- Render ---------- */
function render(){
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);

  if(state === STATE.BOOT){ renderBoot(); return; }
  if(state === STATE.MENU){ renderMenu(); return; }
  if(state === STATE.INTRO){ renderIntro(); return; }
  if(state === STATE.DEATH){ renderRoom(); renderHUD(); renderDeath(); return; }
  if(state === STATE.WIN){ renderRoom(); renderHUD(); renderWin(); return; }
  if(state === STATE.PAUSE){ renderRoom(); renderHUD(); renderPause(); return; }

  renderRoom();
  // HALLWAY CORRIDOR — overlay shown while moving between rooms. The player is
  // frozen in updateRun while transitionDir is set, so this paints over the
  // current room with a stylised corridor and a small walking sprite.
  if(transitionDir && transitionT > 0){ renderHallway(); }
  renderHUD();
  if(state === STATE.SHOP) renderShop();
  if(state === STATE.AUG)  renderAug();
}

// Visible corridor between rooms — Enter-the-Gungeon style "doorway" pan.
// Draws a black hallway with brick walls on the sides and the player walking
// from one end to the other. Direction matches the door the player entered.
function renderHallway(){
  const p = clamp(1 - (transitionT / TRANS_TIME), 0, 1);  // 0 → 1 over the transition
  const horiz = (transitionDir === 'e' || transitionDir === 'w');
  // full-screen black backdrop
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 18, W, H-26-18);
  // corridor strip dimensions
  const stripW = horiz ? W : 64;
  const stripH = horiz ? 64 : (H-34);
  const sx = horiz ? 0 : Math.floor((W-stripW)/2);
  const sy = horiz ? Math.floor(12 + ((H-34)-stripH)/2) : 12;
  // hallway floor (themed)
  const themeIdx = (curRoom() && curRoom().theme) ? (curRoom().theme % 3 + 3) % 3 : 0;
  const tile = SPR.tiles && SPR.tiles[themeIdx] ? SPR.tiles[themeIdx] : null;
  if(tile && tile.floor){
    const fl = tile.floor[0];
    for(let yy = sy; yy < sy + stripH; yy += fl.height){
      for(let xx = sx; xx < sx + stripW; xx += fl.width){
        ctx.drawImage(fl, xx, yy);
      }
    }
  } else {
    ctx.fillStyle = '#3a2818';
    ctx.fillRect(sx, sy, stripW, stripH);
  }
  // brick walls flanking the corridor
  ctx.fillStyle = '#1a1209';
  if(horiz){
    ctx.fillRect(sx, sy-6, stripW, 6);
    ctx.fillRect(sx, sy+stripH, stripW, 6);
    // brick highlights
    ctx.fillStyle = '#5a3a20';
    for(let i=0; i<stripW; i+=12){
      ctx.fillRect(sx+i, sy-3, 8, 1);
      ctx.fillRect(sx+i+4, sy+stripH+2, 8, 1);
    }
  } else {
    ctx.fillRect(sx-6, sy, 6, stripH);
    ctx.fillRect(sx+stripW, sy, 6, stripH);
    ctx.fillStyle = '#5a3a20';
    for(let i=0; i<stripH; i+=12){
      ctx.fillRect(sx-3, sy+i, 1, 8);
      ctx.fillRect(sx+stripW+2, sy+i+4, 1, 8);
    }
  }
  // soft vignette at the entry/exit ends to suggest depth
  const grad = ctx.createLinearGradient(
    horiz ? 0 : sx, horiz ? sy : 0,
    horiz ? W : sx, horiz ? sy+stripH : H
  );
  grad.addColorStop(0, 'rgba(0,0,0,0.55)');
  grad.addColorStop(0.5, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = grad;
  ctx.fillRect(sx, sy, stripW, stripH);
  // ETG-style hallway: clean static brick walls, no animated dust/speed lines.
  // Add a subtle floor seam down the corridor center for depth.
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  if(horiz){
    ctx.fillRect(sx, sy + Math.floor(stripH/2), stripW, 1);
  } else {
    ctx.fillRect(sx + Math.floor(stripW/2), sy, 1, stripH);
  }
  // chunky stone trim along the top wall edge (gungeon-style cap)
  ctx.fillStyle = '#33291f';
  if(horiz){
    ctx.fillRect(sx, sy-1, stripW, 1);
    ctx.fillRect(sx, sy+stripH, stripW, 1);
  } else {
    ctx.fillRect(sx-1, sy, 1, stripH);
    ctx.fillRect(sx+stripW, sy, 1, stripH);
  }
  // PLAYER SPRITE — walking through the corridor, animated
  const charSpr = (SPR.chars && SPR.chars[player.charId]) ? SPR.chars[player.charId] : SPR.player;
  const pf = Math.floor(performance.now()/110) % charSpr.length;
  const psp = charSpr[pf];
  let plx = 0, ply = 0, flipX = false;
  if(transitionDir === 'e'){
    plx = sx - psp.width + p * (stripW + psp.width);
    ply = sy + Math.floor(stripH/2 - psp.height/2);
    flipX = false;
  } else if(transitionDir === 'w'){
    plx = sx + stripW - p * (stripW + psp.width);
    ply = sy + Math.floor(stripH/2 - psp.height/2);
    flipX = true;
  } else if(transitionDir === 's'){
    plx = sx + Math.floor(stripW/2 - psp.width/2);
    ply = sy - psp.height + p * (stripH + psp.height);
  } else { // 'n'
    plx = sx + Math.floor(stripW/2 - psp.width/2);
    ply = sy + stripH - p * (stripH + psp.height);
  }
  // shadow under the player
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(Math.floor(plx+1), Math.floor(ply+psp.height-1), psp.width-2, 2);
  ctx.save();
  if(flipX){
    ctx.translate(Math.floor(plx + psp.width), Math.floor(ply));
    ctx.scale(-1, 1);
    ctx.drawImage(psp, 0, 0);
  } else {
    ctx.drawImage(psp, Math.floor(plx), Math.floor(ply));
  }
  ctx.restore();
  // gentle fade-in at the very start and fade-out at the very end so the swap is invisible
  if(p < 0.12){
    ctx.fillStyle = `rgba(0,0,0,${(1 - p/0.12).toFixed(3)})`;
    ctx.fillRect(0, 18, W, H-26-18);
  } else if(p > 0.88){
    ctx.fillStyle = `rgba(0,0,0,${((p-0.88)/0.12).toFixed(3)})`;
    ctx.fillRect(0, 18, W, H-26-18);
  }
}

function renderBoot(){
  const t = performance.now()/1000;
  // ── DEEP DUNGEON BASE ─────────────────────────────────────────────────────
  ctx.fillStyle = '#04030a'; ctx.fillRect(0,0,W,H);

  // ── PERSPECTIVE CORRIDOR FLOOR ────────────────────────────────────────────
  // Vanishing point in upper-center; trapezoid stone rows recede into it
  const vanX = W/2, vanY = Math.floor(H*0.38);
  const floorBase = Math.floor(H*0.52);
  const ROWS = 10;
  for(let r=0; r<ROWS; r++){
    const t0 = r/ROWS, t1 = (r+1)/ROWS;
    const y0 = vanY + (floorBase - vanY)*t0 + (H - floorBase)*t0;
    const y1 = vanY + (floorBase - vanY)*t1 + (H - floorBase)*t1;
    const half0 = (vanX * (y0 - vanY) / (H - vanY));
    const half1 = (vanX * (y1 - vanY) / (H - vanY));
    const shade = r%2===0 ? '#161220' : '#120f1c';
    ctx.fillStyle = shade;
    ctx.beginPath();
    ctx.moveTo(vanX-half0, y0); ctx.lineTo(vanX+half0, y0);
    ctx.lineTo(vanX+half1, y1); ctx.lineTo(vanX-half1, y1);
    ctx.closePath(); ctx.fill();
    // Mortar seam
    ctx.fillStyle = '#08060e';
    ctx.fillRect(Math.floor(vanX-half0), Math.floor(y0), Math.ceil(half0*2), 1);
    // Vertical grout lines at 3rds
    for(const frac of [1/3, 2/3]){
      const gx0 = vanX - half0 + half0*2*frac;
      const gx1 = vanX - half1 + half1*2*frac;
      ctx.fillStyle = '#08060e';
      ctx.beginPath();
      ctx.moveTo(Math.floor(gx0), Math.floor(y0));
      ctx.lineTo(Math.floor(gx1), Math.floor(y1));
      ctx.lineTo(Math.floor(gx1)+1, Math.floor(y1));
      ctx.lineTo(Math.floor(gx0)+1, Math.floor(y0));
      ctx.closePath(); ctx.fill();
    }
  }

  // ── BACK WALL (far end) ───────────────────────────────────────────────────
  ctx.fillStyle = '#0c0b18';
  ctx.fillRect(0, 0, W, Math.floor(H*0.52)+2);
  // Stone brick pattern
  const bW=22, bH=9;
  for(let by=0; by<Math.floor(H*0.52); by+=bH){
    const off=(Math.floor(by/bH)%2)*11;
    for(let bx=-off; bx<W; bx+=bW){
      ctx.fillStyle='#13121e'; ctx.fillRect(bx+1,by+1,bW-2,bH-2);
      ctx.fillStyle='rgba(255,255,255,0.022)'; ctx.fillRect(bx+1,by+1,bW-2,1);
      ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.fillRect(bx+1,by+bH-2,bW-2,1);
    }
  }
  // Floor/wall ledge
  ctx.fillStyle='#1a1828'; ctx.fillRect(0,Math.floor(H*0.52),W,3);
  ctx.fillStyle='rgba(255,255,255,0.04)'; ctx.fillRect(0,Math.floor(H*0.52),W,1);

  // ── SIDE WALLS ────────────────────────────────────────────────────────────
  const sw = Math.floor(W*0.16);
  ctx.fillStyle='#0b0a16'; ctx.fillRect(0,0,sw,H); ctx.fillRect(W-sw,0,sw,H);
  for(let bi=0;bi<20;bi++){
    const col=bi%2, row=Math.floor(bi/2), bw2=Math.floor(sw/2);
    const bxi=col*bw2, byi=row*20+col*10;
    ctx.fillStyle='rgba(16,13,26,0.9)';
    ctx.fillRect(bxi+1,byi+1,bw2-2,17); ctx.fillRect(W-sw+bxi+1,byi+1,bw2-2,17);
    ctx.fillStyle='rgba(255,255,255,0.02)';
    ctx.fillRect(bxi+1,byi+1,bw2-2,1); ctx.fillRect(W-sw+bxi+1,byi+1,bw2-2,1);
  }
  ctx.fillStyle='#1c1830'; ctx.fillRect(sw-1,0,2,H); ctx.fillRect(W-sw-1,0,2,H);
  ctx.fillStyle='rgba(255,255,255,0.03)'; ctx.fillRect(sw,0,1,H); ctx.fillRect(W-sw-1,0,1,H);

  // ── TORCHES ───────────────────────────────────────────────────────────────
  const torchY = Math.floor(H*0.35);
  for(const [tgx, tside] of [[sw,1],[W-sw,-1]]){
    const flk  = Math.sin(t*9.2+tgx*0.01)*0.5+0.5;
    const flk2 = Math.sin(t*13.8+tgx*0.02)*0.5+0.5;
    const gr = ctx.createRadialGradient(tgx,torchY,1,tgx,torchY,Math.floor(W*0.4));
    gr.addColorStop(0,`rgba(255,158,36,${0.30+flk*0.14})`);
    gr.addColorStop(0.18,`rgba(200,88,14,${0.13+flk*0.06})`);
    gr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gr; ctx.fillRect(0,0,W,H);
    const bx=tgx+tside*2;
    ctx.fillStyle='#4a3018'; ctx.fillRect(bx-2,torchY-3,4,8);
    ctx.fillStyle='#3a2210'; ctx.fillRect(bx-3,torchY+2,6,3);
    ctx.fillStyle=`rgba(255,228,72,${0.9+flk*0.1})`; ctx.fillRect(bx-1,torchY-9,2,5);
    ctx.fillStyle=`rgba(255,138,18,${0.7+flk2*0.3})`; ctx.fillRect(bx-1,torchY-12,2,4);
    ctx.fillStyle=`rgba(255,58,8,${0.4+flk*0.3})`; ctx.fillRect(bx,torchY-14,1,3);
    ctx.fillStyle=`rgba(255,255,130,${0.55+flk*0.4})`; ctx.fillRect(bx,torchY-8,1,3);
  }

  // ── DOOR ARCH (center, far wall) ──────────────────────────────────────────
  const archX=Math.floor(W/2-16), archY=Math.floor(H*0.24), archW=32, archH=26;
  ctx.fillStyle='#060510'; ctx.fillRect(archX,archY,archW,archH);
  // Arch stones
  ctx.fillStyle='#1a1830';
  for(let s=0;s<5;s++){
    const sx=archX-2+s*9;
    ctx.fillRect(sx,archY-4,8,5);
  }
  ctx.fillStyle='rgba(255,255,255,0.04)';
  for(let s=0;s<5;s++) ctx.fillRect(archX-1+s*9,archY-4,8,1);
  // Door glow (light from beyond)
  const dgrd=ctx.createRadialGradient(W/2,archY+archH/2,1,W/2,archY+archH/2,archW);
  dgrd.addColorStop(0,`rgba(60,40,100,${0.18+Math.sin(t*1.3)*0.06})`);
  dgrd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=dgrd; ctx.fillRect(archX-10,archY-6,archW+20,archH+16);
  // Door frame outline
  ctx.strokeStyle='#2a2440'; ctx.lineWidth=1;
  ctx.strokeRect(archX+0.5,archY+0.5,archW-1,archH-1);

  // ── VIGNETTE ─────────────────────────────────────────────────────────────
  const vig=ctx.createRadialGradient(W/2,H/2,H*0.06,W/2,H/2,H*0.9);
  vig.addColorStop(0,'rgba(0,0,0,0)'); vig.addColorStop(1,'rgba(0,0,0,0.9)');
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);

  // ── SCANLINES ────────────────────────────────────────────────────────────
  ctx.fillStyle='rgba(0,0,0,0.18)';
  for(let sy=0;sy<H;sy+=2) ctx.fillRect(0,sy,W,1);

  // ── TITLE — ETG-style chunky pixel logo ──────────────────────────────────
  if(bootTime > 0.12){
    const gx = Math.floor(Math.sin(t*17)*1.5);
    // Chromatic aberration cyan layer
    ctx.globalAlpha=0.32;
    drawText('CYCLOPS DUNGEON', W/2+gx*2, H/2-20, true, 14, '#00d0ff');
    drawText('REFORGED',        W/2+gx*2, H/2-1,  true, 10, '#00d0ff');
    // Chromatic aberration red layer
    drawText('CYCLOPS DUNGEON', W/2-gx,   H/2-20, true, 14, '#ff2040');
    drawText('REFORGED',        W/2-gx,   H/2-1,  true, 10, '#ff2040');
    ctx.globalAlpha=1.0;
    // Drop shadow
    ctx.globalAlpha=0.6;
    drawText('CYCLOPS DUNGEON', W/2+2, H/2-18, true, 14, '#160408');
    drawText('REFORGED',        W/2+2, H/2+1,  true, 10, '#0e0210');
    ctx.globalAlpha=1.0;
    // Main title — warm gold top word, red-orange second word, amber subtitle
    drawText('CYCLOPS DUNGEON', W/2, H/2-20, true, 14, '#f0c840');
    drawText('REFORGED',        W/2, H/2-1,  true, 10, '#e05828');
    // Subtle shimmer on subtitle
    ctx.globalAlpha=0.12+Math.sin(t*3)*0.06;
    drawText('REFORGED',        W/2, H/2-1,  true, 10, '#ffd060');
    ctx.globalAlpha=1.0;
    // Decorative rule
    const ry=H/2+12;
    ctx.fillStyle='#1e1418'; ctx.fillRect(W/2-72,ry,144,1);
    ctx.fillStyle='#e05828'; ctx.fillRect(W/2-20,ry-1,40,3);
    ctx.fillStyle='rgba(240,200,64,0.55)'; ctx.fillRect(W/2-18,ry,36,1);
    ctx.fillStyle='#1e1418'; ctx.fillRect(W/2-72,ry+2,144,1);
    ctx.fillStyle='#b05020'; ctx.fillRect(W/2-74,ry,2,3); ctx.fillRect(W/2+72,ry,2,3);
  }

  // ── PRESS ANY KEY ────────────────────────────────────────────────────────
  if(bootTime > 0.5 && Math.floor(t*2)%2===0)
    drawText('PRESS ANY KEY OR CLICK TO ENTER', W/2, H-28, true, 6, '#907848');

  drawText('A REN PRODUCTION', W/2, H-13, true, 5, '#221818');
}

function renderMenu(){
  const t = (performance.now()/1000) || 0;
  const pulse = (Math.sin(t*2.4)+1)*0.5;

  // ── BASE ─────────────────────────────────────────────────────────────────
  ctx.fillStyle = '#04030b'; ctx.fillRect(0,0,W,H);

  // ── BACK WALL — stone brickwork ──────────────────────────────────────────
  const wallFarY = Math.floor(H*0.44);
  ctx.fillStyle = '#0c0b17'; ctx.fillRect(0,0,W,wallFarY+2);
  const bW=22, bH=9;
  for(let by=0; by<wallFarY+2; by+=bH){
    const off=(Math.floor(by/bH)%2)*11;
    for(let bx=-off; bx<W; bx+=bW){
      const v = 0.88+Math.sin(bx*0.31+by*0.53)*0.12;
      ctx.fillStyle=`rgba(${Math.floor(16*v)},${Math.floor(14*v)},${Math.floor(24*v)},1)`;
      ctx.fillRect(bx+1,by+1,bW-2,bH-2);
      ctx.fillStyle='rgba(255,255,255,0.024)'; ctx.fillRect(bx+1,by+1,bW-2,1);
      ctx.fillStyle='rgba(0,0,0,0.28)'; ctx.fillRect(bx+1,by+bH-2,bW-2,1);
    }
  }
  // Stone ledge capping the wall
  ctx.fillStyle='#1c1a2c'; ctx.fillRect(0,wallFarY,W,4);
  ctx.fillStyle='rgba(255,255,255,0.045)'; ctx.fillRect(0,wallFarY,W,1);
  ctx.fillStyle='#080610'; ctx.fillRect(0,wallFarY+4,W,2);

  // ── FLOOR — top-down stone tiles ─────────────────────────────────────────
  const tSz=11, flTop=wallFarY+6;
  for(let ty=flTop; ty<H; ty+=tSz){
    for(let tx=0; tx<W; tx+=tSz){
      const alt=((Math.floor(tx/tSz)+Math.floor(ty/tSz))%2===0);
      ctx.fillStyle=alt?'#17152200':'#13111d';
      ctx.fillStyle=alt?'#171522':'#13111d';
      ctx.fillRect(tx+1,ty+1,tSz-2,tSz-2);
      ctx.fillStyle='#07060e'; ctx.fillRect(tx,ty,tSz,1); ctx.fillRect(tx,ty,1,tSz);
    }
  }
  // Subtle depth gradient on floor
  const flGrd=ctx.createLinearGradient(0,flTop,0,H);
  flGrd.addColorStop(0,'rgba(0,0,0,0.45)'); flGrd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=flGrd; ctx.fillRect(0,flTop,W,H-flTop);

  // ── SIDE WALLS ────────────────────────────────────────────────────────────
  const wallW=Math.floor(W*0.155);
  ctx.fillStyle='#0a0916'; ctx.fillRect(0,0,wallW,H); ctx.fillRect(W-wallW,0,wallW,H);
  // Brick rows on side walls
  for(let bi=0;bi<22;bi++){
    const col=bi%2, row=Math.floor(bi/2), bw2=Math.floor(wallW/2);
    const bxi=col*bw2, byi=row*20+col*10;
    ctx.fillStyle='rgba(14,11,22,0.92)';
    ctx.fillRect(bxi+1,byi+1,bw2-2,17); ctx.fillRect(W-wallW+bxi+1,byi+1,bw2-2,17);
    ctx.fillStyle='rgba(255,255,255,0.02)';
    ctx.fillRect(bxi+1,byi+1,bw2-2,1); ctx.fillRect(W-wallW+bxi+1,byi+1,bw2-2,1);
  }
  // Wall/room dividers — highlighted seam
  ctx.fillStyle='#201c34'; ctx.fillRect(wallW-1,0,2,H); ctx.fillRect(W-wallW-1,0,2,H);
  ctx.fillStyle='rgba(255,255,255,0.035)'; ctx.fillRect(wallW,0,1,H); ctx.fillRect(W-wallW-1,0,1,H);

  // ── DOOR ARCH (center of far wall) ───────────────────────────────────────
  const archW=36, archH=28, archX=Math.floor(W/2-archW/2), archY=Math.floor(wallFarY-archH);
  ctx.fillStyle='#050410'; ctx.fillRect(archX,archY,archW,archH);
  // Arch keystone blocks
  ctx.fillStyle='#1e1c30';
  for(let s=0;s<5;s++) ctx.fillRect(archX-3+s*9,archY-5,8,5);
  ctx.fillStyle='rgba(255,255,255,0.035)';
  for(let s=0;s<5;s++) ctx.fillRect(archX-3+s*9,archY-5,8,1);
  // Mystical glow from within the door
  const dgrd=ctx.createRadialGradient(W/2,archY+archH*0.6,1,W/2,archY+archH*0.5,archW*0.9);
  dgrd.addColorStop(0,`rgba(70,48,120,${0.22+Math.sin(t*1.5)*0.07})`);
  dgrd.addColorStop(0.5,`rgba(40,20,80,${0.1+Math.sin(t*1.2)*0.04})`);
  dgrd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=dgrd; ctx.fillRect(archX-12,archY-8,archW+24,archH+20);
  ctx.strokeStyle='#2e2848'; ctx.lineWidth=1;
  ctx.strokeRect(archX+0.5,archY+0.5,archW-1,archH-1);

  // ── TORCHES (both sides of far wall) ─────────────────────────────────────
  const torchY=Math.floor(H*0.28);
  for(const [tgx, tside] of [[wallW,1],[W-wallW,-1]]){
    const flk  = Math.sin(t*8.8+tgx*0.01)*0.5+0.5;
    const flk2 = Math.sin(t*14.1+tgx*0.013)*0.5+0.5;
    const flk3 = Math.sin(t*6.3+tgx*0.007)*0.5+0.5;
    // Warm radial glow
    const gr=ctx.createRadialGradient(tgx,torchY,1,tgx,torchY,Math.floor(W*0.44));
    gr.addColorStop(0,`rgba(255,155,34,${0.28+flk*0.13})`);
    gr.addColorStop(0.14,`rgba(200,85,12,${0.11+flk*0.06})`);
    gr.addColorStop(0.4,`rgba(140,50,0,${0.04+flk3*0.03})`);
    gr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gr; ctx.fillRect(0,0,W,H);
    // Wall sconce bracket
    const bx=tgx+tside*3;
    ctx.fillStyle='#4e3415'; ctx.fillRect(bx-2,torchY-2,4,9);
    ctx.fillStyle='#3a2410'; ctx.fillRect(bx-3,torchY+5,6,3);
    ctx.fillStyle='rgba(255,255,255,0.06)'; ctx.fillRect(bx-2,torchY-2,4,1);
    // Flame — layered for depth
    ctx.fillStyle=`rgba(255,232,70,${0.92+flk*0.08})`; ctx.fillRect(bx-1,torchY-11,2,6);
    ctx.fillStyle=`rgba(255,145,18,${0.75+flk2*0.25})`; ctx.fillRect(bx-1,torchY-14,2,5);
    ctx.fillStyle=`rgba(255,60,10,${0.45+flk*0.3})`; ctx.fillRect(bx,torchY-16,1,3);
    ctx.fillStyle=`rgba(255,255,150,${0.6+flk*0.4})`; ctx.fillRect(bx,torchY-10,1,4);
    // Tiny ember spark
    if(flk2>0.7){ ctx.fillStyle='rgba(255,200,60,0.6)'; ctx.fillRect(bx+tside,torchY-17,1,1); }
  }

  // ── FLOATING DUST & EMBERS ───────────────────────────────────────────────
  for(let pi=0;pi<30;pi++){
    const px=(pi*71+t*14*(pi%2===0?1:-0.6))%W;
    const py=flTop+((pi*53+t*6*(0.3+pi*0.055))%(H-flTop));
    ctx.fillStyle=`rgba(200,155,75,${0.05+Math.sin(t*2.1+pi)*0.03})`;
    ctx.fillRect(Math.floor(px),Math.floor(py),1,1);
  }
  for(let ei=0;ei<14;ei++){
    const et=((t*0.65+ei*0.5)%2.5);
    const tgxE = ei<7 ? wallW : W-wallW;
    const epx=tgxE+Math.sin(t*2.1+ei)*9;
    const epy=torchY-et*28-ei*4;
    if(epy<0||epy>torchY) continue;
    const ea=(1-et/2.5)*0.45;
    ctx.fillStyle=`rgba(255,165,36,${ea})`; ctx.fillRect(Math.floor(epx),Math.floor(epy),1,1);
  }

  // ── VIGNETTE ─────────────────────────────────────────────────────────────
  const vig=ctx.createRadialGradient(W/2,H/2,H*0.09,W/2,H/2,H*0.92);
  vig.addColorStop(0,'rgba(0,0,0,0)'); vig.addColorStop(1,'rgba(0,0,0,0.88)');
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);

  // ── SCANLINES ────────────────────────────────────────────────────────────
  ctx.fillStyle='rgba(0,0,0,0.13)';
  for(let sy=0;sy<H;sy+=2) ctx.fillRect(0,sy,W,1);

  // ── TITLE LOGO — ETG-inspired ─────────────────────────────────────────────
  const titY=8;
  // Title area glow
  const titGrd=ctx.createRadialGradient(W/2,titY+20,2,W/2,titY+20,100);
  titGrd.addColorStop(0,`rgba(220,155,10,${0.16+pulse*0.09})`);
  titGrd.addColorStop(0.5,`rgba(180,80,8,${0.07+pulse*0.04})`);
  titGrd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=titGrd; ctx.fillRect(W/2-105,titY-6,210,54);
  // Drop shadow layer
  ctx.globalAlpha=0.65;
  drawText('CYCLOPS',   W/2+2, titY+2,    true, 16, '#120206');
  drawText('DUNGEON',   W/2+2, titY+20+2, true, 16, '#120206');
  drawText('REFORGED',  W/2+2, titY+38+2, true, 9,  '#0e0206');
  ctx.globalAlpha=1.0;
  // 1px outline pass
  ctx.globalAlpha=0.75;
  for(const [ox,oy] of [[-1,-1],[1,-1],[-1,1],[1,1]]){
    drawText('CYCLOPS',  W/2+ox, titY+oy,    true, 16, '#2a1204');
    drawText('DUNGEON',  W/2+ox, titY+20+oy, true, 16, '#2a0804');
    drawText('REFORGED', W/2+ox, titY+38+oy, true, 9,  '#220604');
  }
  ctx.globalAlpha=1.0;
  // Main title — warm gold / ETG red-orange / amber
  drawText('CYCLOPS',   W/2, titY,    true, 16, '#f4cc44');
  drawText('DUNGEON',   W/2, titY+20, true, 16, '#e85030');
  // Glow shimmer on the red word
  ctx.globalAlpha=0.14+pulse*0.10;
  drawText('DUNGEON',   W/2, titY+20, true, 16, '#ffa060');
  ctx.globalAlpha=1.0;
  drawText('REFORGED',  W/2, titY+38, true, 9,  '#c8942c');
  // Decorative horizontal rule — ETG style
  const ruleY=titY+50;
  ctx.fillStyle='#1c1420'; ctx.fillRect(W/2-82,ruleY,164,1);
  ctx.fillStyle='#e85030'; ctx.fillRect(W/2-26,ruleY-1,52,3);
  ctx.fillStyle='rgba(244,204,68,0.5)'; ctx.fillRect(W/2-24,ruleY,48,1);

  if(menuSubState==='main'){
